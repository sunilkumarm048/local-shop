<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout · Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:120px;}
button{font-family:inherit;cursor:pointer;border:none;}

.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.4);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}
.titleBlock{flex:1;min-width:0;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#1f1f1f;}
.pageSub{font-size:12px;color:#3a3a3a;margin-top:2px;}

.container{max-width:900px;margin:0 auto;padding:14px 12px 0;}

.section{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.sectionLabel{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:800;color:#0C831F;
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:10px;
}
.sectionLabel::before{
  content:"";width:18px;height:2px;background:#0C831F;border-radius:1px;
}

.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.fieldLabel{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:5px;}
.inputWrap{
  display:flex;align-items:stretch;
  border:1.5px solid #e5e5e5;border-radius:10px;
  background:#fafafa;overflow:hidden;
  transition:all .15s;
}
.inputWrap.focused{border-color:#0C831F;background:#fff;}
.inputWrap.error{border-color:#d23030;background:#fff5f5;}
.phonePrefix{
  padding:0 10px;display:flex;align-items:center;
  font-size:13px;font-weight:700;color:#555;
  background:#f0f0f0;border-right:1.5px solid #e5e5e5;
}
.inputWrap.focused .phonePrefix{
  background:#dcf3e1;color:#0C831F;border-right-color:#dcf3e1;
}
.inputField{
  flex:1;border:none;background:transparent;
  padding:11px 12px;font-size:14px;font-weight:500;
  font-family:inherit;color:#1f1f1f;outline:none;
  width:100%;min-width:0;
}
.inputField.textarea{resize:vertical;min-height:60px;padding:10px 12px;}
.errorText{display:none;font-size:11px;color:#d23030;font-weight:500;margin-top:4px;}
.errorText.show{display:block;}

.locBtn{
  background:#dcf3e1;color:#0C831F;
  padding:9px 14px;border-radius:8px;
  font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;margin-top:6px;
}
.locBtn:active{transform:scale(.96);}
.locConfirm{
  margin-top:6px;font-size:11px;font-weight:600;
  display:none;padding:6px 10px;border-radius:6px;
}
.locConfirm.show{display:block;}
.locConfirm.success{background:#dcf3e1;color:#0C831F;}
.locConfirm.warn{background:#fff5d6;color:#8a6500;}
.locConfirm.error{background:#fde0e0;color:#c41818;}
.locConfirm.loading{background:#dbe9ff;color:#1857c1;}

/* Global discount banner */
.globalOfferBanner{
  background:linear-gradient(135deg,#dcf3e1 0%,#b3e5bf 100%);
  border:1px solid #0C831F;border-radius:12px;
  padding:12px 14px;margin-bottom:12px;
  display:flex;gap:10px;align-items:center;
}
.globalOfferBanner .ic{font-size:24px;flex-shrink:0;}
.globalOfferBanner .txt{flex:1;line-height:1.3;}
.globalOfferBanner .ttl{font-size:13px;font-weight:800;color:#0C831F;}
.globalOfferBanner .sub{font-size:11px;color:#0C831F;opacity:.85;margin-top:2px;}

.multiShopNotice{
  background:linear-gradient(135deg,#dbe9ff 0%,#c4dbff 100%);
  border:1px solid #a3c5ff;
  border-radius:12px;padding:12px 14px;margin-bottom:12px;
  display:flex;gap:10px;align-items:flex-start;
}
.msIcon{font-size:22px;flex-shrink:0;}
.msText{flex:1;line-height:1.4;}
.msTitle{font-size:13px;font-weight:700;color:#1857c1;}
.msSub{font-size:12px;color:#1857c1;opacity:.85;margin-top:2px;}

.shopGroup{
  background:#fff;border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
}
.shopHeader{
  padding:12px 14px;
  background:linear-gradient(135deg,#fff5d6 0%,#ffeec1 100%);
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #f0d76a;
}
.shopAvatar{
  width:40px;height:40px;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.shopInfo{flex:1;min-width:0;line-height:1.3;}
.shopName{font-size:14px;font-weight:700;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shopMeta{font-size:11px;color:#8a6500;font-weight:600;margin-top:2px;
  display:flex;flex-wrap:wrap;gap:8px;}
.shopMeta span{display:inline-flex;align-items:center;gap:3px;}

.shopOfferTag{
  display:inline-block;
  background:#0C831F;color:#fff;
  padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:800;
  letter-spacing:.3px;margin-top:3px;
}

.shopBody{padding:12px 14px;}

.distBanner{
  background:#dbe9ff;color:#1857c1;
  padding:8px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:6px;
  margin-bottom:10px;
}
.distBanner.warn{background:#fff5d6;color:#8a6500;}
.distBanner .ic{font-size:14px;}

.itemsList{margin-bottom:12px;}
.itemRow{
  display:flex;justify-content:space-between;
  padding:6px 0;font-size:13px;
  border-bottom:1px dashed #f4f4f4;
}
.itemRow:last-child{border-bottom:none;}
.itemRow .iName{flex:1;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.itemRow .iQty{color:#888;font-weight:600;margin:0 8px;}
.itemRow .iWt{color:#888;font-weight:500;font-size:11px;margin-right:8px;}
.itemRow .iAmt{font-weight:700;color:#1f1f1f;flex-shrink:0;}

.vehicleSection{
  background:#fafafa;
  border-radius:10px;padding:12px;
  margin-bottom:12px;
}
.vehicleSectionLabel{
  font-size:11px;font-weight:700;color:#0C831F;
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;flex-wrap:wrap;
}
.weightBadge{
  background:#dcf3e1;color:#0C831F;
  padding:3px 8px;border-radius:8px;
  font-size:10px;font-weight:800;
}

.vehicleGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
@media(min-width:560px){.vehicleGrid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.vehicleGrid{grid-template-columns:repeat(5,1fr);}}

.vehOpt{
  background:#fff;border:2px solid #e5e5e5;
  border-radius:10px;padding:10px 8px;
  text-align:center;cursor:pointer;
  transition:all .15s;position:relative;
}
.vehOpt:hover:not(.disabled){border-color:#b3e5bf;}
.vehOpt.selected{
  border-color:#0C831F;background:#f0fbf2;
  box-shadow:0 2px 8px rgba(12,131,31,.15);
}
.vehOpt.disabled{
  opacity:.5;cursor:not-allowed;
  background:#f6f6f6;
}
.vehOpt.disabled .vehEmoji{filter:grayscale(.7);}

.vehEmoji{font-size:28px;line-height:1;margin-bottom:4px;}
.vehName{font-size:12px;font-weight:700;color:#1f1f1f;line-height:1.2;}
.vehOpt.selected .vehName{color:#0C831F;}
.vehFee{
  font-size:13px;font-weight:800;color:#0C831F;
  margin-top:4px;
}
.vehOpt.disabled .vehFee{color:#999;text-decoration:line-through;}
.vehRate{font-size:9px;color:#888;font-weight:600;margin-top:2px;}
.vehTooSmall{
  font-size:9px;color:#d23030;font-weight:700;
  margin-top:3px;letter-spacing:.2px;text-transform:uppercase;
}

.billRow{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:13px;
}
.billRow:not(:last-child){border-bottom:1px dashed #f4f4f4;}
.billRow .lbl{color:#666;}
.billRow .lblHint{font-size:10px;color:#999;font-weight:500;display:block;margin-top:1px;}
.billRow .val{font-weight:600;color:#1f1f1f;text-align:right;}
.billRow.discount .lbl{color:#0C831F;font-weight:700;}
.billRow.discount .val{color:#0C831F;font-weight:800;}

.shopSubtotal{
  background:#dcf3e1;color:#0C831F;
  padding:6px 12px;border-radius:8px;
  font-size:13px;font-weight:700;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:4px;
}

.grandTotalCard{
  background:linear-gradient(135deg,#0C831F 0%,#0fa029 100%);
  color:#fff;border-radius:14px;
  padding:16px;margin-bottom:14px;
  box-shadow:0 6px 18px rgba(12,131,31,.25);
}
.grandLabel{
  font-size:11px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;opacity:.9;
}
.grandAmount{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-top:2px;}
.grandSplit{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.2);
  font-size:12px;font-weight:500;opacity:.95;
}
.grandSavings{
  background:rgba(255,255,255,.18);
  padding:6px 10px;border-radius:8px;margin-top:8px;
  font-size:11px;font-weight:700;text-align:center;
}

.actionBar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid #ececec;
  padding:12px 16px;z-index:900;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.actionInner{
  max-width:900px;margin:0 auto;
  display:flex;gap:10px;align-items:center;
}
.actionInfo{flex:1;min-width:0;line-height:1.2;}
.actionFare{font-size:18px;font-weight:800;color:#1f1f1f;}
.actionFareSub{font-size:11px;color:#888;font-weight:500;margin-top:2px;}

.btnPlace{
  flex:1;max-width:240px;
  background:#0C831F;color:#fff;
  padding:14px;border-radius:10px;
  font-size:14px;font-weight:800;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .12s;position:relative;
}
.btnPlace:active{transform:scale(.98);}
.btnPlace:hover{background:#0a6e1a;}
.btnPlace:disabled{background:#a0d3a8;cursor:not-allowed;}
.btnPlace.loading{color:transparent;}
.btnPlace.loading::after{
  content:"";position:absolute;
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:1700;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;line-height:1.5;margin-bottom:18px;}
.empty .btn{
  background:#0C831F;color:#fff;
  padding:12px 22px;border-radius:10px;
  font-size:13px;font-weight:700;
}

.modalBg{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:none;align-items:center;justify-content:center;
  z-index:2000;padding:20px;
}
.modalBg.show{display:flex;animation:fadeIn .25s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal{
  background:#fff;width:100%;max-width:380px;border-radius:18px;
  padding:30px 24px 24px;text-align:center;
  animation:scaleIn .3s ease;
}
@keyframes scaleIn{
  from{transform:scale(.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.successIcon{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#0C831F,#0fa029);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:42px;color:#fff;
  box-shadow:0 8px 22px rgba(12,131,31,.3);
  animation:popIn .5s ease;
}
@keyframes popIn{
  0%{transform:scale(0);}60%{transform:scale(1.15);}100%{transform:scale(1);}
}
.modal h3{font-size:20px;font-weight:800;color:#1f1f1f;margin-bottom:6px;}
.modal p{font-size:13px;color:#666;line-height:1.5;margin-bottom:18px;}
.btnPrimary{
  width:100%;background:#0C831F;color:#fff;
  padding:13px;border-radius:10px;font-size:14px;font-weight:700;
}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">🧾 Checkout</div>
      <div class="pageSub" id="pageSub">Loading cart…</div>
    </div>
  </div>
</header>

<main class="container" id="mainContent"></main>

<div class="actionBar" id="actionBar" style="display:none;">
  <div class="actionInner">
    <div class="actionInfo">
      <div class="actionFareSub" id="actionFareSub">—</div>
      <div class="actionFare" id="actionFare">—</div>
    </div>
    <button class="btnPlace" id="btnPlace" onclick="placeOrder()" disabled>Place Order</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="modalBg" id="successModal">
  <div class="modal">
    <div class="successIcon">✓</div>
    <h3 id="successTitle">Order placed! 🎉</h3>
    <p id="successMsg">Your order has been placed. Track it now to see live updates.</p>
    <button class="btnPrimary" onclick="goToTracking()">Track Order</button>
  </div>
</div>

<script type="module">
import { db } from "/local-shop/js/firebase.js";
import {
  collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  parseWeightKg, vehicleFits, haversineKm,
  getDeliveryFee, getDeliveryFeeBreakdown
} from "/local-shop/js/weight-utils.js";
import {
  loadPricingConfig, configToVehiclesArray, calculateDiscount
} from "/local-shop/js/pricing-config.js";

const main = document.getElementById("mainContent");
const toast = document.getElementById("toast");
const actionBar = document.getElementById("actionBar");
const btnPlace = document.getElementById("btnPlace");
const pageSub = document.getElementById("pageSub");

let cart = [];
let shopGroups = [];
let customerLat = null;
let customerLng = null;
let shopMeta = {};
let gpsState = "idle";

/* Loaded from admin pricing config */
let pricingConfig = null;
let VEHICLES = [];

function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){
  return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function updateLocUi(){
  const el = document.getElementById("locConfirm");
  if(!el) return;
  el.classList.remove("success","warn","error","loading","show");

  if(gpsState === "detecting"){
    el.classList.add("show","loading");
    el.innerHTML = `⏳ Detecting your location…`;
  }else if(gpsState === "captured"){
    el.classList.add("show","success");
    el.innerHTML = `✓ Location captured · accurate fees applied`;
  }else if(gpsState === "failed"){
    el.classList.add("show","warn");
    el.innerHTML = `⚠️ GPS not captured · Tap the button to enable accurate distance-based fees`;
  }
}

function recomputeDistances(){
  shopGroups.forEach(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    g.distanceKm = haversineKm(meta.lat, meta.lng, customerLat, customerLng);
  });
}

async function init(){
  /* Load admin pricing config first */
  try{
    pricingConfig = await loadPricingConfig();
    VEHICLES = configToVehiclesArray(pricingConfig);
  }catch(e){
    console.error("Pricing config load failed, using defaults:", e);
    pricingConfig = await loadPricingConfig();
    VEHICLES = configToVehiclesArray(pricingConfig);
  }

  cart = JSON.parse(localStorage.getItem("cart") || "[]");
  if(!cart.length){
    showEmpty();
    return;
  }

  /* Group by shop & compute weights */
  const map = new Map();
  cart.forEach(it=>{
    const key = (it.shopName || "Unknown Shop").toLowerCase();
    if(!map.has(key)){
      map.set(key, {
        shopName: it.shopName || "Unknown Shop",
        items: [],
        weightKg: 0,
        subtotal: 0,
        selectedVehicleId: "bike",
        distanceKm: null,
        shopDiscount: null
      });
    }
    const g = map.get(key);
    const itemWt = parseWeightKg(it.weight) * (it.qty || 1);
    g.items.push({ ...it, __wtKg: itemWt });
    g.weightKg += itemWt;
    g.subtotal += (Number(it.price) || 0) * (it.qty || 1);
  });
  shopGroups = Array.from(map.values());

  /* Default vehicle = smallest that fits */
  shopGroups.forEach(g=>{
    g.selectedVehicleId = (VEHICLES.find(v => g.weightKg <= v.maxKg) || VEHICLES[VEHICLES.length-1]).id;
  });

  await loadShopMeta();
  recomputeDistances();

  /* Attach per-shop discount to each group */
  shopGroups.forEach(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    g.shopDiscount = meta.discount || null;
  });

  pageSub.textContent = `${cart.length} item${cart.length!==1?"s":""} from ${shopGroups.length} shop${shopGroups.length>1?"s":""}`;
  render();
  actionBar.style.display = "block";
  autoCaptureLocation();
}

async function loadShopMeta(){
  try{
    const snap = await getDocs(collection(db, "localshop-details"));
    snap.forEach(d=>{
      const s = d.data();
      const key = (s.shopName || "").toLowerCase();
      if(!key) return;
      shopMeta[key] = {
        lat: s.lat, lng: s.lng,
        icon: s.icon || "🏪",
        isOpen: s.isOpen !== false,
        email: s.email || "",
        category: s.category || "",
        discount: s.discount || null
      };
    });
  }catch(e){
    console.error("Could not load shop meta:", e);
  }
}

function render(){
  let html = "";

  /* Customer info */
  html += `
    <section class="section">
      <div class="sectionLabel">Delivery details</div>
      <div class="field">
        <label class="fieldLabel" for="custName">Your name</label>
        <div class="inputWrap" id="nameWrap">
          <input class="inputField" id="custName" type="text" placeholder="Full name"
            value="${escapeAttr(localStorage.getItem('lastCustomerName') || '')}">
        </div>
        <div class="errorText" id="nameError">Please enter your name</div>
      </div>
      <div class="field">
        <label class="fieldLabel" for="custPhone">Phone</label>
        <div class="inputWrap" id="phoneWrap">
          <span class="phonePrefix">+91</span>
          <input class="inputField" id="custPhone" type="tel" placeholder="10-digit number"
            inputmode="numeric" maxlength="10"
            value="${escapeAttr(localStorage.getItem('lastCustomerPhone') || '')}">
        </div>
        <div class="errorText" id="phoneError">Enter valid 10-digit Indian number</div>
      </div>
      <div class="field">
        <label class="fieldLabel" for="custAddr">Delivery address</label>
        <div class="inputWrap" id="addrWrap">
          <textarea class="inputField textarea" id="custAddr" placeholder="House no, area, landmark, city">${escapeHtml(localStorage.getItem('lastCustomerAddress') || '')}</textarea>
        </div>
        <div class="errorText" id="addrError">Address must be at least 10 characters</div>
        <button class="locBtn" onclick="captureLocation()">📍 Use my GPS location</button>
        <div class="locConfirm" id="locConfirm"></div>
      </div>
    </section>
  `;

  /* Global discount banner */
  const gd = pricingConfig.globalDiscount;
  if(gd && gd.enabled && gd.value > 0){
    const valueText = gd.type === "flat" ? `₹${gd.value} OFF` : `${gd.value}% OFF`;
    html += `
      <div class="globalOfferBanner">
        <div class="ic">🎁</div>
        <div class="txt">
          <div class="ttl">${escapeHtml(gd.label || "Special Offer")} · ${valueText}</div>
          <div class="sub">Auto-applied where eligible · shop offers may override this</div>
        </div>
      </div>`;
  }

  if(shopGroups.length > 1){
    html += `
      <div class="multiShopNotice">
        <div class="msIcon">ℹ️</div>
        <div class="msText">
          <div class="msTitle">Items from ${shopGroups.length} shops</div>
          <div class="msSub">Each shop will be a separate order with its own delivery vehicle.</div>
        </div>
      </div>`;
  }

  shopGroups.forEach((g, idx)=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    const icon = meta.icon || "🏪";
    const isOpen = meta.isOpen !== false;

    html += `<div class="shopGroup" data-idx="${idx}">`;

    let metaLine = `<span>📦 ${g.weightKg.toFixed(1)} kg</span>`;
    if(g.distanceKm !== null){
      metaLine += `<span>📏 ${g.distanceKm.toFixed(1)} km away</span>`;
    }

    /* Per-shop discount tag */
    let shopDiscountTag = "";
    if(g.shopDiscount && g.shopDiscount.enabled && Number(g.shopDiscount.value) > 0){
      const valueText = g.shopDiscount.type === "flat" ? `₹${g.shopDiscount.value} OFF` : `${g.shopDiscount.value}% OFF`;
      shopDiscountTag = `<div class="shopOfferTag">🏷️ ${escapeHtml(g.shopDiscount.label || "Offer")} · ${valueText}</div>`;
    }

    html += `
      <div class="shopHeader">
        <div class="shopAvatar">${icon}</div>
        <div class="shopInfo">
          <div class="shopName">${escapeHtml(g.shopName)}${!isOpen ? ' · CLOSED' : ''}</div>
          <div class="shopMeta">${metaLine}</div>
          ${shopDiscountTag}
        </div>
      </div>
      <div class="shopBody">
    `;

    if(g.distanceKm === null){
      html += `
        <div class="distBanner warn">
          <span class="ic">📍</span>
          <span>Tap GPS button above to get accurate distance-based delivery fee</span>
        </div>`;
    }else{
      html += `
        <div class="distBanner">
          <span class="ic">📏</span>
          <span>Distance from shop: <b>${g.distanceKm.toFixed(1)} km</b></span>
        </div>`;
    }

    /* Items */
    html += `<div class="itemsList">`;
    g.items.forEach(it=>{
      const lineTotal = (Number(it.price)||0) * (it.qty||1);
      const wtDisplay = it.weight || "";
      html += `
        <div class="itemRow">
          <div class="iName">${escapeHtml(it.name || "Item")}</div>
          ${wtDisplay ? `<div class="iWt">${escapeHtml(wtDisplay)}</div>` : ""}
          <div class="iQty">× ${it.qty || 1}</div>
          <div class="iAmt">₹${lineTotal}</div>
        </div>`;
    });
    html += `</div>`;

    /* Vehicle picker */
    html += `
      <div class="vehicleSection">
        <div class="vehicleSectionLabel">
          <span>🚛 Choose delivery vehicle</span>
          <span class="weightBadge">${g.weightKg.toFixed(1)} KG</span>
        </div>
        <div class="vehicleGrid">
    `;
    VEHICLES.forEach(v=>{
      const fits = g.weightKg <= v.maxKg;
      const isSelected = g.selectedVehicleId === v.id;
      const cls = `vehOpt ${isSelected?'selected':''} ${!fits?'disabled':''}`;
      const fee = getDeliveryFee(v.id, g.distanceKm, VEHICLES);
      const breakdown = getDeliveryFeeBreakdown(v.id, g.distanceKm, VEHICLES);

      let rateHint;
      if(g.distanceKm === null){
        rateHint = `min · ₹${v.perKmRate}/km`;
      }else if(breakdown.minApplied){
        rateHint = `min ₹${v.minFee}`;
      }else{
        rateHint = `${g.distanceKm.toFixed(1)}km × ₹${v.perKmRate}`;
      }

      html += `
        <div class="${cls}" data-shop-idx="${idx}" data-vid="${v.id}">
          <div class="vehEmoji">${v.icon}</div>
          <div class="vehName">${v.name}</div>
          <div class="vehFee">₹${fee}</div>
          ${!fits
            ? `<div class="vehTooSmall">Too small</div>`
            : `<div class="vehRate">${rateHint}</div>`}
        </div>`;
    });
    html += `</div></div>`;

    /* Bill for this shop — using config values */
    const selectedVeh = VEHICLES.find(v => v.id === g.selectedVehicleId);
    const deliveryFee = getDeliveryFee(g.selectedVehicleId, g.distanceKm, VEHICLES);
    const breakdown = getDeliveryFeeBreakdown(g.selectedVehicleId, g.distanceKm, VEHICLES);
    const handling = pricingConfig.handlingFee;
    const platformFee = Math.round((g.subtotal + deliveryFee) * pricingConfig.platformFeePercent / 100);

    /* Calculate discount (per-shop overrides global) */
    const discount = calculateDiscount(g.subtotal, pricingConfig.globalDiscount, g.shopDiscount);
    const shopTotal = g.subtotal + deliveryFee + handling + platformFee - discount.amount;

    /* Save to group for later use */
    g.__deliveryFee = deliveryFee;
    g.__handling = handling;
    g.__platformFee = platformFee;
    g.__discount = discount;
    g.__total = shopTotal;

    let deliveryHintText;
    if(g.distanceKm === null){
      deliveryHintText = `Min fee · enable GPS for distance pricing`;
    }else if(breakdown.minApplied){
      deliveryHintText = `${g.distanceKm.toFixed(1)} km × ₹${selectedVeh.perKmRate} = ₹${breakdown.calculated} → min ₹${selectedVeh.minFee} applied`;
    }else{
      deliveryHintText = `${g.distanceKm.toFixed(1)} km × ₹${selectedVeh.perKmRate}/km`;
    }

    html += `
      <div class="billRow">
        <span class="lbl">Items total</span>
        <span class="val">₹${g.subtotal}</span>
      </div>
      <div class="billRow">
        <span class="lbl">
          Delivery fee · ${selectedVeh.name}
          <span class="lblHint">${deliveryHintText}</span>
        </span>
        <span class="val">₹${deliveryFee}</span>
      </div>
      <div class="billRow">
        <span class="lbl">Handling fee</span>
        <span class="val">₹${handling}</span>
      </div>
      <div class="billRow">
        <span class="lbl">Platform fee (${pricingConfig.platformFeePercent}%)</span>
        <span class="val">₹${platformFee}</span>
      </div>`;

    if(discount.amount > 0){
      html += `
        <div class="billRow discount">
          <span class="lbl">🎁 ${escapeHtml(discount.label)}</span>
          <span class="val">−₹${discount.amount}</span>
        </div>`;
    }

    html += `
      <div class="shopSubtotal">
        <span>${escapeHtml(g.shopName)} total</span>
        <span>₹${shopTotal}</span>
      </div>
    `;

    html += `</div></div>`;
  });

  /* Grand total */
  let grandTotal = 0;
  let grandFare = 0;
  let grandSavings = 0;
  shopGroups.forEach(g=>{
    grandFare += g.__deliveryFee;
    grandTotal += g.__total;
    grandSavings += g.__discount.amount;
  });

  let savingsText = "";
  if(grandSavings > 0){
    savingsText = `<div class="grandSavings">🎉 You save ₹${grandSavings} on this order!</div>`;
  }

  html += `
    <div class="grandTotalCard">
      <div class="grandLabel">Grand Total · Pay on Delivery</div>
      <div class="grandAmount">₹${grandTotal}</div>
      <div class="grandSplit">
        <span>${shopGroups.length} order${shopGroups.length>1?"s":""}</span>
        <span>Delivery: ₹${grandFare}</span>
      </div>
      ${savingsText}
    </div>
  `;

  main.innerHTML = html;

  /* Wire up vehicle picker */
  main.querySelectorAll(".vehOpt").forEach(opt=>{
    opt.addEventListener("click", ()=>{
      if(opt.classList.contains("disabled")) return;
      const idx = parseInt(opt.dataset.shopIdx, 10);
      const vid = opt.dataset.vid;
      shopGroups[idx].selectedVehicleId = vid;
      render();
    });
  });

  ["custName", "custPhone", "custAddr"].forEach(id=>{
    const input = document.getElementById(id);
    if(!input) return;
    const wrap = input.closest(".inputWrap");
    input.addEventListener("focus", ()=>{
      wrap.classList.add("focused");
      wrap.classList.remove("error");
      input.parentElement.parentElement.querySelector(".errorText")?.classList.remove("show");
    });
    input.addEventListener("blur", ()=> wrap.classList.remove("focused"));
  });

  const phoneInput = document.getElementById("custPhone");
  if(phoneInput){
    phoneInput.addEventListener("input", ()=>{
      phoneInput.value = phoneInput.value.replace(/\D/g,"").slice(0,10);
    });
  }

  updateLocUi();

  document.getElementById("actionFareSub").textContent =
    `${shopGroups.length} order${shopGroups.length>1?"s":""} · Pay on delivery`;
  document.getElementById("actionFare").textContent = `₹${grandTotal}`;
  btnPlace.disabled = false;
}

function showEmpty(){
  pageSub.textContent = "Cart is empty";
  main.innerHTML = `
    <div class="empty">
      <div class="icon">🛒</div>
      <h3>Your cart is empty</h3>
      <p>Add some items to your cart, then come back here to checkout.</p>
      <button class="btn" onclick="goBack()">Browse Shops</button>
    </div>`;
}

function autoCaptureLocation(){
  if(!navigator.geolocation){ gpsState = "failed"; updateLocUi(); return; }
  if(navigator.permissions && navigator.permissions.query){
    navigator.permissions.query({ name:"geolocation" }).then((result)=>{
      if(result.state === "denied"){ gpsState = "failed"; updateLocUi(); return; }
      requestLocation(true);
    }).catch(()=> requestLocation(true));
  }else{
    requestLocation(true);
  }
}

window.captureLocation = ()=>{
  if(!navigator.geolocation){
    showToast("Geolocation not supported", true);
    gpsState = "failed"; updateLocUi(); return;
  }
  requestLocation(false);
};

function requestLocation(silent){
  gpsState = "detecting";
  updateLocUi();
  if(!silent) showToast("Getting your location…");

  navigator.geolocation.getCurrentPosition((pos)=>{
    customerLat = pos.coords.latitude;
    customerLng = pos.coords.longitude;
    gpsState = "captured";
    recomputeDistances();
    render();
    if(!silent) showToast("✓ Location captured · fees recalculated");
  }, (err)=>{
    gpsState = "failed";
    updateLocUi();
    if(!silent){
      const msg = err.code === 1
        ? "Location permission denied. Tap the button to retry."
        : "Couldn't get location. Tap to retry.";
      showToast(msg, true);
    }
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
}

function validate(){
  const name = document.getElementById("custName").value.trim();
  const phone = document.getElementById("custPhone").value.trim();
  const addr = document.getElementById("custAddr").value.trim();
  let valid = true;

  if(!name){
    document.getElementById("nameWrap").classList.add("error");
    document.getElementById("nameError").classList.add("show");
    valid = false;
  }
  if(phone.length !== 10 || !/^[6-9]/.test(phone)){
    document.getElementById("phoneWrap").classList.add("error");
    document.getElementById("phoneError").classList.add("show");
    valid = false;
  }
  if(addr.length < 10){
    document.getElementById("addrWrap").classList.add("error");
    document.getElementById("addrError").classList.add("show");
    valid = false;
  }

  const closedShops = shopGroups.filter(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    return meta.isOpen === false;
  });
  if(closedShops.length > 0){
    showToast(`${closedShops[0].shopName} is currently closed. Please remove its items.`, true);
    valid = false;
  }

  for(const g of shopGroups){
    if(!vehicleFits(g.selectedVehicleId, g.weightKg, VEHICLES)){
      showToast(`Selected vehicle for ${g.shopName} is too small for the order weight.`, true);
      valid = false;
    }
  }

  return valid ? { name, phone, addr } : null;
}

let createdOrderIds = [];

window.placeOrder = async ()=>{
  const v = validate();
  if(!v){ showToast("Please fix the errors above", true); return; }

  if((!customerLat || !customerLng) && !window.__gpsWarned){
    window.__gpsWarned = true;
    showToast("⚠️ Tap GPS button for accurate fare · or continue with min fee", true);
    return;
  }

  btnPlace.classList.add("loading");
  btnPlace.disabled = true;

  localStorage.setItem("lastCustomerName", v.name);
  localStorage.setItem("lastCustomerPhone", v.phone);
  localStorage.setItem("lastCustomerAddress", v.addr);

  createdOrderIds = [];
  let success = 0, failed = 0;

  for(const g of shopGroups){
    const veh = VEHICLES.find(x => x.id === g.selectedVehicleId);
    const meta = shopMeta[g.shopName.toLowerCase()] || {};

    /* Use the saved values from render to keep what customer saw */
    const deliveryFee = g.__deliveryFee;
    const handling = g.__handling;
    const platformFee = g.__platformFee;
    const discount = g.__discount;
    const total = g.__total;

    const baseOrder = {
      name: v.name,
      phone: v.phone,
      customerPhone: v.phone,
      address: v.addr,
      customerLat, customerLng,
      lat: customerLat, lng: customerLng,

      shopName: g.shopName,
      shopEmail: meta.email || "",
      shopLat: meta.lat || null,
      shopLng: meta.lng || null,
      shopIcon: meta.icon || "🏪",

      items: g.items.map(it=>({
        name: it.name,
        price: Number(it.price) || 0,
        qty: it.qty || 1,
        weight: it.weight || null,
        image: it.image || null,
        productId: it.productId || null,
        weightKg: Number(it.__wtKg.toFixed(2))
      })),
      cartWeightKg: Number(g.weightKg.toFixed(2)),
      distanceKm: g.distanceKm !== null ? Number(g.distanceKm.toFixed(2)) : null,

      vehicleType: veh.id,
      vehicleName: veh.name,
      vehicleIcon: veh.icon,
      vehiclePerKmRate: veh.perKmRate,

      total: g.subtotal,
      deliveryFee,
      handlingFee: handling,
      platformFee,
      platformFeePercent: pricingConfig.platformFeePercent,

      /* Discount snapshot — saves what was applied at order time */
      discountAmount: discount.amount,
      discountLabel: discount.label || "",
      discountSource: discount.source,    // "shop" | "global" | "none"
      discountType: discount.type || "",
      discountValue: discount.value || 0,

      grandTotal: total,
      shopEarning: Math.round(g.subtotal * 0.9),
      deliveryEarning: Math.round(deliveryFee * 0.85),

      status: "Pending",
      deliveryStatus: "Waiting",
      pickupStep: 0,
      deliveryBoyId: null,

      time: new Date()
    };

    const targetCollection = veh.id === "bike" ? "orders" : "transport-orders";

    if(targetCollection === "transport-orders"){
      baseOrder.pickupAddress = `${g.shopName} (Shop pickup)`;
      baseOrder.pickupLat = meta.lat || null;
      baseOrder.pickupLng = meta.lng || null;
      baseOrder.pickupContactName = meta.email || g.shopName;
      baseOrder.pickupContactPhone = "";

      baseOrder.dropAddress = v.addr;
      baseOrder.dropLat = customerLat;
      baseOrder.dropLng = customerLng;
      baseOrder.dropContactName = v.name;
      baseOrder.dropContactPhone = v.phone;

      baseOrder.estimatedFare = deliveryFee;
      baseOrder.goodsType = "groceries";
      baseOrder.fromShopOrder = true;
    }

    try{
      const ref = await addDoc(collection(db, targetCollection), baseOrder);
      createdOrderIds.push({ id: ref.id, col: targetCollection });
      success++;
    }catch(e){
      console.error(e);
      failed++;
    }
  }

  btnPlace.classList.remove("loading");

  if(success === 0){
    btnPlace.disabled = false;
    showToast("Could not place orders. Try again.", true);
    return;
  }

  if(failed > 0){
    showToast(`${success} of ${shopGroups.length} orders placed. ${failed} failed.`, true);
  }

  if(createdOrderIds[0]){
    localStorage.setItem("lastOrderId", createdOrderIds[0].id);
    localStorage.setItem("lastOrderCol", createdOrderIds[0].col);

    const myOrders = JSON.parse(localStorage.getItem("myOrders") || "[]");
    createdOrderIds.forEach(o => myOrders.unshift(o.id));
    localStorage.setItem("myOrders", JSON.stringify(myOrders));
  }

  localStorage.removeItem("cart");

  const modal = document.getElementById("successModal");
  document.getElementById("successTitle").textContent =
    success > 1 ? `${success} orders placed! 🎉` : "Order placed! 🎉";
  document.getElementById("successMsg").textContent =
    success > 1
      ? `Your ${success} orders are now being processed. Track each shop's order separately.`
      : "Your order is now being processed. Track it for live updates.";
  modal.classList.add("show");
};

window.goToTracking = ()=>{
  if(createdOrderIds.length === 0){
    location.href = "/local-shop/index.html";
    return;
  }
  const first = createdOrderIds[0];
  if(first.col === "orders"){
    location.href = `tracking.html?orderId=${first.id}`;
  }else{
    location.href = `transport-tracking.html?orderId=${first.id}`;
  }
};

window.goBack = ()=> location.href = "/local-shop/index.html";

init();
</script>
