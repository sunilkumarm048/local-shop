<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
max-width:420px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.item{
padding:8px 0;
border-bottom:1px solid #eee;
}

.total{
font-size:18px;
margin-top:10px;
font-weight:bold;
}

.empty{
text-align:center;
color:gray;
padding:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>🧾 Checkout</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<hr>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🛒 LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

let total = 0;

// SHOW CART
if(cart.length === 0){
cartDiv.innerHTML = `<div class="empty">🛒 Cart is empty</div>`;
}else{
cart.forEach(item=>{
let t = item.price * item.qty;
total += t;

cartDiv.innerHTML += `
<div class="item">
${item.name} x${item.qty} = ₹${t}
</div>
`;
});
}

document.getElementById("total").innerText = total;

// 🌍 GET LOCATION
function getLocation(){
return new Promise((resolve)=>{
navigator.geolocation.getCurrentPosition(pos=>{

resolve({
lat: pos.coords.latitude,
lng: pos.coords.longitude
});

},()=>{
resolve(null);
},{
enableHighAccuracy:true,
timeout:5000
});
});
}

// 📏 ACCURATE DISTANCE (KM)
function getDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;
}

// 🚀 PLACE ORDER
window.placeOrder = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

if(!name || !phone || !address){
alert("⚠️ Please fill all details");
return;
}

if(cart.length === 0){
alert("🛒 Cart is empty");
return;
}

// 📍 GET LOCATION
const location = await getLocation();

if(!location){
alert("⚠️ Please allow location access");
return;
}

// 🔥 GET SHOPS
const snapshot = await getDocs(collection(db,"localshop-details"));

let nearestShop = null;
let minDist = Infinity;

snapshot.forEach(doc=>{
let s = doc.data();

if(s.lat && s.lng){

let dist = getDistance(
location.lat,
location.lng,
s.lat,
s.lng
);

if(dist < minDist){
minDist = dist;
nearestShop = s;
}

}
});

// ❌ NO SHOP
if(!nearestShop){
alert("❌ No nearby shop found");
return;
}

// 💾 SAVE ORDER
const docRef = await addDoc(collection(db,"orders"),{

// 👤 CUSTOMER
name,
phone,
address,

// 📍 LOCATION (IMPORTANT FIX)
lat: location.lat,
lng: location.lng,

// 🏪 SHOP
shopEmail: nearestShop.email,
shopName: nearestShop.shopName,
shopLat: nearestShop.lat,
shopLng: nearestShop.lng,

// 🛒 ORDER
items: cart,
total: total,

// 📦 STATUS
status:"Pending",
deliveryStatus:"Waiting",
deliveryBoy:null,

// 💰 EARNINGS
shopEarning: total * 0.9,
deliveryEarning: total * 0.1,
platformFee: total * 0.05,

// ⏱ TIME
time:new Date()

});

// CLEAR CART
localStorage.removeItem("cart");

// SAVE ORDER ID
localStorage.setItem("lastOrderId", docRef.id);

alert("✅ Order placed successfully!");

// REDIRECT
window.location.href = "tracking.html?orderId=" + docRef.id;

};

</script>

</body>
</html>
