<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
max-width:420px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.item{
padding:8px 0;
border-bottom:1px solid #eee;
}

.total{
font-size:18px;
margin-top:10px;
font-weight:bold;
}

.empty{
text-align:center;
color:gray;
padding:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>🧾 Checkout</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<hr>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🛒 LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

let total = 0;

// DISPLAY CART
if(cart.length === 0){
cartDiv.innerHTML = `<div class="empty">🛒 Cart is empty</div>`;
}else{
cart.forEach(item=>{
let t = item.price * item.qty;
total += t;

cartDiv.innerHTML += `
<div class="item">
${item.name} x${item.qty} = ₹${t}
</div>
`;
});
}

document.getElementById("total").innerText = total;

// 🌍 GET LOCATION
function getLocation(){
return new Promise((resolve)=>{
navigator.geolocation.getCurrentPosition(pos=>{
console.log("GPS:", pos.coords);

resolve({
lat: pos.coords.latitude,
lng: pos.coords.longitude
});

},(err)=>{
console.error("GPS error:", err);
resolve({lat:null,lng:null});
},{
enableHighAccuracy:true,
timeout:5000
});
});
}

// 📏 DISTANCE FUNCTION
function getDistance(lat1,lng1,lat2,lng2){
return Math.sqrt((lat1-lat2)**2 + (lng1-lng2)**2);
}

// 🚀 PLACE ORDER
window.placeOrder = async function(){

console.log("STEP 1: Start placing order");

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

if(!name || !phone || !address){
alert("⚠️ Please fill all details");
return;
}

if(cart.length === 0){
alert("🛒 Cart is empty");
return;
}

try{

// 📍 LOCATION
const location = await getLocation();
console.log("STEP 2: Location:", location);

if(!location.lat){
alert("⚠️ Allow location permission");
return;
}

// 🔥 GET SHOPS
const snapshot = await getDocs(collection(db,"localshop-details"));
console.log("STEP 3: Shops fetched");

let nearestShop = null;
let minDist = Infinity;

snapshot.forEach(doc=>{
let s = doc.data();

if(s.lat && s.lng){

let dist = getDistance(
location.lat,
location.lng,
s.lat,
s.lng
);

if(dist < minDist){
minDist = dist;
nearestShop = s;
}

}
});

console.log("STEP 4: Nearest shop:", nearestShop);

// ❌ NO SHOP
if(!nearestShop){
alert("❌ No nearby shop found");
return;
}

// 💾 SAVE ORDER
console.log("STEP 5: Saving order...");

const docRef = await addDoc(collection(db,"orders"),{

// CUSTOMER
name,
phone,
address,

// LOCATION
customerLat: location.lat,
customerLng: location.lng,

// SHOP AUTO
shopEmail: nearestShop.email,
shopName: nearestShop.shopName,
shopLat: nearestShop.lat,
shopLng: nearestShop.lng,

// ORDER
items: cart,
total: total,

// STATUS
status: "Pending",
deliveryStatus: "Waiting",
deliveryBoy: null,

// EARNINGS
shopEarning: total * 0.9,
deliveryEarning: total * 0.1,
platformFee: total * 0.05,

time: new Date()

});

console.log("STEP 6: Order saved:", docRef.id);

// CLEAR CART
localStorage.removeItem("cart");

// SAVE ORDER ID
localStorage.setItem("lastOrderId", docRef.id);

alert("✅ Order placed successfully!");

// REDIRECT
window.location.href = "tracking.html?orderId=" + docRef.id;

}catch(e){

console.error("❌ FULL ERROR:", e);
alert("Error: " + e.message);

}

};

</script>

</body>
</html>
