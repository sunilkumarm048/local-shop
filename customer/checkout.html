<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

/* BOX */
.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
max-width:420px;
margin:auto;
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* ITEM */
.item{
padding:8px 0;
border-bottom:1px solid #eee;
}

/* TOTAL */
.total{
font-size:18px;
margin-top:10px;
font-weight:bold;
}

/* EMPTY */
.empty{
text-align:center;
color:gray;
padding:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>🧾 Checkout</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<hr>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🛒 LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

let total = 0;

// 🔄 DISPLAY CART
if(cart.length === 0){

cartDiv.innerHTML = `<div class="empty">🛒 Cart is empty</div>`;

}else{

cart.forEach(item=>{

let t = item.price * item.qty;
total += t;

cartDiv.innerHTML += `
<div class="item">
${item.name} x${item.qty} = ₹${t}
</div>
`;

});

}

document.getElementById("total").innerText = total;

// 🚀 PLACE ORDER
window.placeOrder = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

// 🔥 GET SHOP INFO
let shopEmail = localStorage.getItem("shopEmail");
let shopName = localStorage.getItem("shopName");

// VALIDATION
if(!name || !phone || !address){
alert("⚠️ Please fill all details");
return;
}

if(cart.length === 0){
alert("🛒 Cart is empty");
return;
}

if(!shopEmail){
alert("❌ No shop selected / login required");
return;
}

try{

const docRef = await addDoc(collection(db,"orders"),{

// 👤 CUSTOMER
name: name,
phone: phone,
address: address,

// 🏪 SHOP (VERY IMPORTANT 🔥)
shopEmail: shopEmail,
shopName: shopName,

// 🛒 ORDER DATA
items: cart,
total: total,

// 📦 STATUS
status: "Pending",
deliveryStatus: "Waiting",

// 🚚 DELIVERY
deliveryBoy: null,

// 💰 EARNINGS
shopEarning: total * 0.9,
deliveryEarning: total * 0.1,
platformFee: total * 0.05,

// ⏱ TIME
time: new Date()

});

// 🧹 CLEAR CART
localStorage.removeItem("cart");

// 💾 SAVE ORDER ID
localStorage.setItem("lastOrderId", docRef.id);

alert("✅ Order placed successfully!");

// 🚀 REDIRECT
window.location.href = "tracking.html?orderId=" + docRef.id;

}catch(e){

alert("❌ Error placing order");
console.error(e);

}

};

</script>

</body>
</html>
