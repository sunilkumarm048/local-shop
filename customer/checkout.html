<script type="module">

import { db } from "../js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

let total = 0;

// SHOW CART
if(cart.length === 0){
cartDiv.innerHTML = `<div class="empty">🛒 Cart is empty</div>`;
}else{
cart.forEach(item=>{
let t = item.price * item.qty;
total += t;

cartDiv.innerHTML += `
<div class="item">
${item.name} x${item.qty} = ₹${t}
</div>`;
});
}

document.getElementById("total").innerText = total;

// 🚀 PLACE ORDER
window.placeOrder = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

// 🔥 GET SHOP INFO
let shopEmail = localStorage.getItem("shopEmail");
let shopName = localStorage.getItem("shopName");

// VALIDATION
if(!name || !phone || !address){
alert("⚠️ Fill all details");
return;
}

if(cart.length === 0){
alert("🛒 Cart empty");
return;
}

if(!shopEmail){
alert("❌ No shop selected");
return;
}

try{

const docRef = await addDoc(collection(db,"orders"),{

// 👤 CUSTOMER
name,
phone,
address,

// 🏪 SHOP (IMPORTANT)
shopEmail: shopEmail,
shopName: shopName,

// 🛒 ORDER
items: cart,
total: total,

// 📦 STATUS
status:"Pending",
deliveryStatus:"Waiting",

// 🚚 DELIVERY
deliveryBoy:null,

// 💰 EARNINGS
shopEarning: total * 0.9,
deliveryEarning: total * 0.1,
platformFee: total * 0.05,

// ⏱ TIME
time:new Date()

});

// CLEAR CART
localStorage.removeItem("cart");

// SAVE ORDER ID
localStorage.setItem("lastOrderId", docRef.id);

alert("✅ Order placed!");

// REDIRECT
window.location.href = "tracking.html?orderId=" + docRef.id;

}catch(e){
alert("❌ Error placing order");
console.error(e);
}

}

</script>
