<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout · Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:120px;}
button{font-family:inherit;cursor:pointer;border:none;}

.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.4);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}
.titleBlock{flex:1;min-width:0;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#1f1f1f;}
.pageSub{font-size:12px;color:#3a3a3a;margin-top:2px;}

.container{max-width:900px;margin:0 auto;padding:14px 12px 0;}

.section{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.sectionLabel{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:800;color:#0C831F;
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:10px;
}
.sectionLabel::before{
  content:"";width:18px;height:2px;background:#0C831F;border-radius:1px;
}

/* ============ DELIVERY MODE TOGGLE ============ */
.modeToggle{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:14px;
}
.modeOpt{
  background:#fff;border:2px solid #e5e5e5;border-radius:12px;
  padding:14px 10px;text-align:center;cursor:pointer;
  transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.modeOpt:hover{border-color:#b3e5bf;}
.modeOpt.selected{
  border-color:#0C831F;background:#f0fbf2;
  box-shadow:0 2px 8px rgba(12,131,31,.15);
}
.modeOpt .modeIcon{font-size:28px;line-height:1;}
.modeOpt .modeName{font-size:13px;font-weight:700;color:#1f1f1f;}
.modeOpt.selected .modeName{color:#0C831F;}
.modeOpt .modeDesc{font-size:10px;color:#888;font-weight:500;line-height:1.3;}

.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.fieldLabel{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:5px;}
.fieldLabel .req{color:#d23030;font-weight:700;}
.inputWrap{
  display:flex;align-items:stretch;
  border:1.5px solid #e5e5e5;border-radius:10px;
  background:#fafafa;overflow:hidden;
  transition:all .15s;
}
.inputWrap.focused{border-color:#0C831F;background:#fff;}
.inputWrap.error{border-color:#d23030;background:#fff5f5;}
.phonePrefix{
  padding:0 10px;display:flex;align-items:center;
  font-size:13px;font-weight:700;color:#555;
  background:#f0f0f0;border-right:1.5px solid #e5e5e5;
}
.inputWrap.focused .phonePrefix{
  background:#dcf3e1;color:#0C831F;border-right-color:#dcf3e1;
}
.inputField{
  flex:1;border:none;background:transparent;
  padding:11px 12px;font-size:14px;font-weight:500;
  font-family:inherit;color:#1f1f1f;outline:none;
  width:100%;min-width:0;
}
.inputField.textarea{resize:vertical;min-height:60px;padding:10px 12px;}
.errorText{display:none;font-size:11px;color:#d23030;font-weight:500;margin-top:4px;}
.errorText.show{display:block;}

.subSectionLabel{
  font-size:11px;font-weight:800;color:#666;
  letter-spacing:.4px;text-transform:uppercase;
  margin:14px 0 8px;
  display:flex;align-items:center;gap:6px;
}
.subSectionLabel .ic{font-size:14px;}
.subSectionLabel:first-child{margin-top:0;}

.locBtn{
  background:#dcf3e1;color:#0C831F;
  padding:9px 14px;border-radius:8px;
  font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;margin-top:6px;
}
.locBtn:active{transform:scale(.96);}
.locConfirm{
  margin-top:6px;font-size:11px;font-weight:600;
  display:none;padding:6px 10px;border-radius:6px;
}
.locConfirm.show{display:block;}
.locConfirm.success{background:#dcf3e1;color:#0C831F;}
.locConfirm.warn{background:#fff5d6;color:#8a6500;}
.locConfirm.error{background:#fde0e0;color:#c41818;}
.locConfirm.loading{background:#dbe9ff;color:#1857c1;}

/* ============ MAP PICKER (For Other mode) ============ */
.mapPickerWrap{
  margin-top:8px;
  border:1.5px solid #e5e5e5;border-radius:12px;
  overflow:hidden;background:#fafafa;
}
.searchBox{
  position:relative;
  border-bottom:1.5px solid #e5e5e5;
  background:#fff;
}
.searchBox input{
  width:100%;border:none;background:transparent;
  padding:11px 12px 11px 38px;font-size:13px;font-weight:500;
  font-family:inherit;color:#1f1f1f;outline:none;
}
.searchBox .searchIcon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:#888;
}
.searchBox .clearBtn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:#f0f0f0;color:#666;
  width:24px;height:24px;border-radius:50%;
  font-size:14px;font-weight:700;
  display:none;align-items:center;justify-content:center;
}
.searchBox .clearBtn.show{display:flex;}
.searchSpinner{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border:2px solid #e5e5e5;
  border-top-color:#0C831F;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.searchSpinner.show{display:block;}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg);}}

.searchResults{
  max-height:200px;overflow-y:auto;
  background:#fff;border-bottom:1.5px solid #e5e5e5;
  display:none;
}
.searchResults.show{display:block;}
.searchResult{
  padding:10px 12px;font-size:13px;
  border-bottom:1px solid #f4f4f4;
  cursor:pointer;display:flex;gap:10px;align-items:flex-start;
}
.searchResult:hover{background:#fafafa;}
.searchResult:last-child{border-bottom:none;}
.searchResult .pin{font-size:14px;flex-shrink:0;margin-top:1px;}
.searchResult .info{flex:1;min-width:0;line-height:1.3;}
.searchResult .ttl{font-weight:600;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.searchResult .sub{font-size:11px;color:#888;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

#pickerMap{
  height:260px;width:100%;background:#e9e9e9;
  position:relative;
}
.mapHint{
  position:absolute;bottom:10px;left:50%;
  transform:translateX(-50%);
  background:rgba(31,31,31,.85);color:#fff;
  padding:6px 12px;border-radius:18px;
  font-size:11px;font-weight:600;
  z-index:401;pointer-events:none;
  white-space:nowrap;
}

.useMyLocBtn{
  background:#fff;color:#0C831F;border:1px solid #b3e5bf;
  padding:8px 14px;border-radius:8px;
  font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;
  margin:10px;
}
.useMyLocBtn:active{transform:scale(.96);}
.useMyLocBtn:hover{background:#f0fbf2;}

.mapAddressBox{
  padding:10px 12px;background:#fff;
  border-top:1.5px solid #e5e5e5;font-size:12px;
}
.mapAddressBox .lbl{
  font-size:10px;font-weight:700;color:#888;
  letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px;
}
.mapAddressBox .val{font-size:13px;color:#1f1f1f;font-weight:500;line-height:1.4;
  word-break:break-word;}
.mapAddressBox.empty .val{color:#999;font-style:italic;}

.globalOfferBanner{
  background:linear-gradient(135deg,#dcf3e1 0%,#b3e5bf 100%);
  border:1px solid #0C831F;border-radius:12px;
  padding:12px 14px;margin-bottom:12px;
  display:flex;gap:10px;align-items:center;
}
.globalOfferBanner .ic{font-size:24px;flex-shrink:0;}
.globalOfferBanner .txt{flex:1;line-height:1.3;}
.globalOfferBanner .ttl{font-size:13px;font-weight:800;color:#0C831F;}
.globalOfferBanner .sub{font-size:11px;color:#0C831F;opacity:.85;margin-top:2px;}

.multiShopNotice{
  background:linear-gradient(135deg,#dbe9ff 0%,#c4dbff 100%);
  border:1px solid #a3c5ff;
  border-radius:12px;padding:12px 14px;margin-bottom:12px;
  display:flex;gap:10px;align-items:flex-start;
}
.msIcon{font-size:22px;flex-shrink:0;}
.msText{flex:1;line-height:1.4;}
.msTitle{font-size:13px;font-weight:700;color:#1857c1;}
.msSub{font-size:12px;color:#1857c1;opacity:.85;margin-top:2px;}

.shopGroup{
  background:#fff;border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
}
.shopHeader{
  padding:12px 14px;
  background:linear-gradient(135deg,#fff5d6 0%,#ffeec1 100%);
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #f0d76a;
}
.shopAvatar{
  width:40px;height:40px;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.shopInfo{flex:1;min-width:0;line-height:1.3;}
.shopName{font-size:14px;font-weight:700;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shopMeta{font-size:11px;color:#8a6500;font-weight:600;margin-top:2px;
  display:flex;flex-wrap:wrap;gap:8px;}
.shopMeta span{display:inline-flex;align-items:center;gap:3px;}

.shopOfferTag{
  display:inline-block;
  background:#0C831F;color:#fff;
  padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:800;
  letter-spacing:.3px;margin-top:3px;
}

.shopBody{padding:12px 14px;}

.distBanner{
  background:#dbe9ff;color:#1857c1;
  padding:8px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:6px;
  margin-bottom:10px;
}
.distBanner.warn{background:#fff5d6;color:#8a6500;}
.distBanner .ic{font-size:14px;}

.itemsList{margin-bottom:12px;}
.itemRow{
  display:flex;justify-content:space-between;
  padding:6px 0;font-size:13px;
  border-bottom:1px dashed #f4f4f4;
}
.itemRow:last-child{border-bottom:none;}
.itemRow .iName{flex:1;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.itemRow .iQty{color:#888;font-weight:600;margin:0 8px;}
.itemRow .iWt{color:#888;font-weight:500;font-size:11px;margin-right:8px;}
.itemRow .iAmt{font-weight:700;color:#1f1f1f;flex-shrink:0;}

.vehicleSection{
  background:#fafafa;
  border-radius:10px;padding:12px;
  margin-bottom:12px;
}
.vehicleSectionLabel{
  font-size:11px;font-weight:700;color:#0C831F;
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;flex-wrap:wrap;
}
.weightBadge{
  background:#dcf3e1;color:#0C831F;
  padding:3px 8px;border-radius:8px;
  font-size:10px;font-weight:800;
}

.vehicleGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
@media(min-width:560px){.vehicleGrid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:768px){.vehicleGrid{grid-template-columns:repeat(5,1fr);}}

.vehOpt{
  background:#fff;border:2px solid #e5e5e5;
  border-radius:10px;padding:10px 8px;
  text-align:center;cursor:pointer;
  transition:all .15s;position:relative;
}
.vehOpt:hover:not(.disabled){border-color:#b3e5bf;}
.vehOpt.selected{
  border-color:#0C831F;background:#f0fbf2;
  box-shadow:0 2px 8px rgba(12,131,31,.15);
}
.vehOpt.disabled{
  opacity:.5;cursor:not-allowed;
  background:#f6f6f6;
}
.vehOpt.disabled .vehEmoji{filter:grayscale(.7);}

.vehEmoji{font-size:28px;line-height:1;margin-bottom:4px;}
.vehName{font-size:12px;font-weight:700;color:#1f1f1f;line-height:1.2;}
.vehOpt.selected .vehName{color:#0C831F;}
.vehFee{
  font-size:13px;font-weight:800;color:#0C831F;
  margin-top:4px;
}
.vehOpt.disabled .vehFee{color:#999;text-decoration:line-through;}
.vehRate{font-size:9px;color:#888;font-weight:600;margin-top:2px;}
.vehTooSmall{
  font-size:9px;color:#d23030;font-weight:700;
  margin-top:3px;letter-spacing:.2px;text-transform:uppercase;
}

.billRow{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:13px;
}
.billRow:not(:last-child){border-bottom:1px dashed #f4f4f4;}
.billRow .lbl{color:#666;}
.billRow .lblHint{font-size:10px;color:#999;font-weight:500;display:block;margin-top:1px;}
.billRow .val{font-weight:600;color:#1f1f1f;text-align:right;}
.billRow.discount .lbl{color:#0C831F;font-weight:700;}
.billRow.discount .val{color:#0C831F;font-weight:800;}

.shopSubtotal{
  background:#dcf3e1;color:#0C831F;
  padding:6px 12px;border-radius:8px;
  font-size:13px;font-weight:700;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:4px;
}

.grandTotalCard{
  background:linear-gradient(135deg,#0C831F 0%,#0fa029 100%);
  color:#fff;border-radius:14px;
  padding:16px;margin-bottom:14px;
  box-shadow:0 6px 18px rgba(12,131,31,.25);
}
.grandLabel{
  font-size:11px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;opacity:.9;
}
.grandAmount{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-top:2px;}
.grandSplit{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.2);
  font-size:12px;font-weight:500;opacity:.95;
}
.grandSavings{
  background:rgba(255,255,255,.18);
  padding:6px 10px;border-radius:8px;margin-top:8px;
  font-size:11px;font-weight:700;text-align:center;
}

.actionBar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid #ececec;
  padding:12px 16px;z-index:900;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.actionInner{
  max-width:900px;margin:0 auto;
  display:flex;gap:10px;align-items:center;
}
.actionInfo{flex:1;min-width:0;line-height:1.2;}
.actionFare{font-size:18px;font-weight:800;color:#1f1f1f;}
.actionFareSub{font-size:11px;color:#888;font-weight:500;margin-top:2px;}

.btnPlace{
  flex:1;max-width:240px;
  background:#0C831F;color:#fff;
  padding:14px;border-radius:10px;
  font-size:14px;font-weight:800;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .12s;position:relative;
}
.btnPlace:active{transform:scale(.98);}
.btnPlace:hover{background:#0a6e1a;}
.btnPlace:disabled{background:#a0d3a8;cursor:not-allowed;}
.btnPlace.loading{color:transparent;}
.btnPlace.loading::after{
  content:"";position:absolute;
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:spin2 .7s linear infinite;
}
@keyframes spin2{to{transform:translate(-50%,-50%) rotate(360deg);}}

.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:1700;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;line-height:1.5;margin-bottom:18px;}
.empty .btn{
  background:#0C831F;color:#fff;
  padding:12px 22px;border-radius:10px;
  font-size:13px;font-weight:700;
}

.modalBg{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:none;align-items:center;justify-content:center;
  z-index:2000;padding:20px;
}
.modalBg.show{display:flex;animation:fadeIn .25s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal{
  background:#fff;width:100%;max-width:380px;border-radius:18px;
  padding:30px 24px 24px;text-align:center;
  animation:scaleIn .3s ease;
}
@keyframes scaleIn{
  from{transform:scale(.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.successIcon{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#0C831F,#0fa029);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:42px;color:#fff;
  box-shadow:0 8px 22px rgba(12,131,31,.3);
  animation:popIn .5s ease;
}
@keyframes popIn{
  0%{transform:scale(0);}60%{transform:scale(1.15);}100%{transform:scale(1);}
}
.modal h3{font-size:20px;font-weight:800;color:#1f1f1f;margin-bottom:6px;}
.modal p{font-size:13px;color:#666;line-height:1.5;margin-bottom:18px;}
.btnPrimary{
  width:100%;background:#0C831F;color:#fff;
  padding:13px;border-radius:10px;font-size:14px;font-weight:700;
}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
  #pickerMap{height:320px;}
}

.leaflet-popup-content-wrapper{border-radius:8px;}
.leaflet-popup-content{font-family:inherit;font-size:13px;font-weight:600;margin:8px 12px;}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">🧾 Checkout</div>
      <div class="pageSub" id="pageSub">Loading cart…</div>
    </div>
  </div>
</header>

<main class="container" id="mainContent"></main>

<div class="actionBar" id="actionBar" style="display:none;">
  <div class="actionInner">
    <div class="actionInfo">
      <div class="actionFareSub" id="actionFareSub">—</div>
      <div class="actionFare" id="actionFare">—</div>
    </div>
    <button class="btnPlace" id="btnPlace" onclick="placeOrder()" disabled>Place Order</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="modalBg" id="successModal">
  <div class="modal">
    <div class="successIcon">✓</div>
    <h3 id="successTitle">Order placed! 🎉</h3>
    <p id="successMsg">Your order has been placed. Track it now to see live updates.</p>
    <button class="btnPrimary" onclick="goToTracking()">Track Order</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { db } from "/js/firebase.js";
import {
  collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  parseWeightKg, vehicleFits, haversineKm,
  getDeliveryFee, getDeliveryFeeBreakdown
} from "/js/weight-utils.js";
import {
  loadPricingConfig, configToVehiclesArray, calculateDiscount
} from "/js/pricing-config.js";

const main = document.getElementById("mainContent");
const toast = document.getElementById("toast");
const actionBar = document.getElementById("actionBar");
const btnPlace = document.getElementById("btnPlace");
const pageSub = document.getElementById("pageSub");

let cart = [];
let shopGroups = [];
let shopMeta = {};

/* Delivery state — split into self vs other */
let deliveryMode = "self";   // "self" | "other"

/* For "self" mode — uses GPS */
let myGpsLat = null, myGpsLng = null;
let myGpsState = "idle";

/* For "other" mode — uses map picker */
let pickedLat = null, pickedLng = null;
let pickedAddress = "";
let pickerMap = null, pickerMarker = null;
let searchDebounce = null;

/* Computed final delivery point (used for distance calculation) */
function getDeliveryPoint(){
  if(deliveryMode === "other"){
    return { lat: pickedLat, lng: pickedLng };
  }
  return { lat: myGpsLat, lng: myGpsLng };
}

let pricingConfig = null;
let VEHICLES = [];

function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){
  return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function updateLocUi(){
  const el = document.getElementById("locConfirm");
  if(!el) return;
  el.classList.remove("success","warn","error","loading","show");

  if(myGpsState === "detecting"){
    el.classList.add("show","loading");
    el.innerHTML = `⏳ Detecting your location…`;
  }else if(myGpsState === "captured"){
    el.classList.add("show","success");
    el.innerHTML = `✓ Location captured · accurate fees applied`;
  }else if(myGpsState === "failed"){
    el.classList.add("show","warn");
    el.innerHTML = `⚠️ GPS not captured · Tap the button to enable accurate distance-based fees`;
  }
}

function recomputeDistances(){
  const point = getDeliveryPoint();
  shopGroups.forEach(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    g.distanceKm = haversineKm(meta.lat, meta.lng, point.lat, point.lng);
  });
}

async function init(){
  try{
    pricingConfig = await loadPricingConfig();
    VEHICLES = configToVehiclesArray(pricingConfig);
  }catch(e){
    console.error("Pricing config load failed, using defaults:", e);
    pricingConfig = await loadPricingConfig();
    VEHICLES = configToVehiclesArray(pricingConfig);
  }

  cart = JSON.parse(localStorage.getItem("cart") || "[]");
  if(!cart.length){
    showEmpty();
    return;
  }

  const map = new Map();
  cart.forEach(it=>{
    const key = (it.shopName || "Unknown Shop").toLowerCase();
    if(!map.has(key)){
      map.set(key, {
        shopName: it.shopName || "Unknown Shop",
        items: [],
        weightKg: 0,
        subtotal: 0,
        selectedVehicleId: "bike",
        distanceKm: null,
        shopDiscount: null
      });
    }
    const g = map.get(key);
    const itemWt = parseWeightKg(it.weight) * (it.qty || 1);
    g.items.push({ ...it, __wtKg: itemWt });
    g.weightKg += itemWt;
    g.subtotal += (Number(it.price) || 0) * (it.qty || 1);
  });
  shopGroups = Array.from(map.values());

  shopGroups.forEach(g=>{
    g.selectedVehicleId = (VEHICLES.find(v => g.weightKg <= v.maxKg) || VEHICLES[VEHICLES.length-1]).id;
  });

  await loadShopMeta();
  recomputeDistances();

  shopGroups.forEach(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    g.shopDiscount = meta.discount || null;
  });

  pageSub.textContent = `${cart.length} item${cart.length!==1?"s":""} from ${shopGroups.length} shop${shopGroups.length>1?"s":""}`;
  render();
  actionBar.style.display = "block";
  autoCaptureLocation();
}

async function loadShopMeta(){
  try{
    const snap = await getDocs(collection(db, "localshop-details"));
    snap.forEach(d=>{
      const s = d.data();
      const key = (s.shopName || "").toLowerCase();
      if(!key) return;
      shopMeta[key] = {
        lat: s.lat, lng: s.lng,
        icon: s.icon || "🏪",
        isOpen: s.isOpen !== false,
        email: s.email || "",
        category: s.category || "",
        discount: s.discount || null
      };
    });
  }catch(e){
    console.error("Could not load shop meta:", e);
  }
}

/* =========== MAP PICKER (For Other mode) =========== */
function initPickerMap(){
  const el = document.getElementById("pickerMap");
  if(!el) return;

  /* Destroy old map if it exists */
  if(pickerMap){
    try{ pickerMap.remove(); }catch(e){}
    pickerMap = null;
    pickerMarker = null;
  }

  /* Default center: India / Bhubaneswar */
  let center = [20.2961, 85.8245];
  let zoom = 12;

  if(pickedLat && pickedLng){
    center = [pickedLat, pickedLng];
    zoom = 16;
  }else if(myGpsLat && myGpsLng){
    center = [myGpsLat, myGpsLng];
    zoom = 14;
  }

  pickerMap = L.map(el, { zoomControl:true }).setView(center, zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:19
  }).addTo(pickerMap);

  /* Tap to place pin */
  pickerMap.on("click", (e)=>{
    setPickedLocation(e.latlng.lat, e.latlng.lng, true);
  });

  /* Restore previous pin if exists */
  if(pickedLat && pickedLng){
    placePinAt(pickedLat, pickedLng);
  }

  setTimeout(()=> pickerMap.invalidateSize(), 100);

  /* Wire up search box */
  const searchInput = document.getElementById("addrSearch");
  if(searchInput){
    searchInput.addEventListener("input", onSearchInput);
    searchInput.addEventListener("focus", ()=>{
      if(searchInput.value.trim().length >= 3){
        document.getElementById("searchResults").classList.add("show");
      }
    });
  }

  /* Hide results when clicking outside */
  document.addEventListener("click", (e)=>{
    if(!e.target.closest(".searchBox") && !e.target.closest(".searchResults")){
      const r = document.getElementById("searchResults");
      if(r) r.classList.remove("show");
    }
  });
}

function placePinAt(lat, lng){
  if(!pickerMap) return;
  const pinIcon = L.divIcon({
    className:"",
    html:`<div style="background:#0C831F;width:34px;height:34px;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
          box-shadow:0 3px 8px rgba(0,0,0,.3);border:3px solid #fff;">
          <div style="transform:rotate(45deg);font-size:14px;color:#fff;font-weight:800;">📍</div>
          </div>`,
    iconSize:[34,34], iconAnchor:[17,34]
  });

  if(pickerMarker){
    pickerMarker.setLatLng([lat, lng]);
  }else{
    pickerMarker = L.marker([lat, lng], { icon: pinIcon, draggable: true }).addTo(pickerMap);
    pickerMarker.on("dragend", (e)=>{
      const p = e.target.getLatLng();
      setPickedLocation(p.lat, p.lng, true);
    });
  }
}

async function setPickedLocation(lat, lng, doReverseGeocode){
  pickedLat = lat;
  pickedLng = lng;
  placePinAt(lat, lng);
  recomputeDistances();
  render();
  setTimeout(initPickerMap, 50);   /* re-init since render replaces DOM */

  if(doReverseGeocode){
    const text = await reverseGeocode(lat, lng);
    pickedAddress = text || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    updatePickedAddressUi();
  }
}

function updatePickedAddressUi(){
  const box = document.getElementById("mapAddressBox");
  const txt = document.getElementById("pickedAddrText");
  if(!box || !txt) return;
  if(pickedAddress){
    box.classList.remove("empty");
    txt.textContent = pickedAddress;
  }else{
    box.classList.add("empty");
    txt.textContent = "Tap the map to select a location";
  }
}

async function reverseGeocode(lat, lng){
  try{
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    return data.display_name || "";
  }catch(e){
    console.error("Reverse geocode failed:", e);
    return "";
  }
}

function onSearchInput(e){
  const q = e.target.value.trim();
  const clearBtn = document.getElementById("searchClearBtn");
  clearBtn.classList.toggle("show", q.length > 0);

  clearTimeout(searchDebounce);
  if(q.length < 3){
    document.getElementById("searchResults").classList.remove("show");
    return;
  }
  searchDebounce = setTimeout(()=> doSearch(q), 350);
}

async function doSearch(query){
  const spinner = document.getElementById("searchSpinner");
  const resultsBox = document.getElementById("searchResults");
  spinner.classList.add("show");

  try{
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&countrycodes=in&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();

    if(!data.length){
      resultsBox.innerHTML = `<div style="padding:14px;text-align:center;color:#888;font-size:13px;">No results found</div>`;
      resultsBox.classList.add("show");
      return;
    }

    let html = "";
    data.forEach(item=>{
      const display = item.display_name || "";
      const parts = display.split(", ");
      const main = parts[0] || display;
      const sub = parts.slice(1, 4).join(", ") || "";
      html += `
        <div class="searchResult" data-lat="${item.lat}" data-lng="${item.lon}" data-display="${escapeAttr(display)}">
          <div class="pin">📍</div>
          <div class="info">
            <div class="ttl">${escapeHtml(main)}</div>
            ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ""}
          </div>
        </div>`;
    });
    resultsBox.innerHTML = html;
    resultsBox.classList.add("show");

    resultsBox.querySelectorAll(".searchResult").forEach(r=>{
      r.addEventListener("click", ()=>{
        const lat = parseFloat(r.dataset.lat);
        const lng = parseFloat(r.dataset.lng);
        const display = r.dataset.display;

        pickedAddress = display;
        document.getElementById("addrSearch").value = display.split(", ").slice(0,2).join(", ");
        resultsBox.classList.remove("show");

        if(pickerMap){
          pickerMap.setView([lat, lng], 16);
        }
        setPickedLocation(lat, lng, false);   // already have address from search
        updatePickedAddressUi();
      });
    });
  }catch(err){
    console.error("Search failed:", err);
    resultsBox.innerHTML = `<div style="padding:14px;text-align:center;color:#d23030;font-size:13px;">Search error · check connection</div>`;
    resultsBox.classList.add("show");
  }finally{
    spinner.classList.remove("show");
  }
}

window.clearSearch = ()=>{
  document.getElementById("addrSearch").value = "";
  document.getElementById("searchClearBtn").classList.remove("show");
  document.getElementById("searchResults").classList.remove("show");
};

window.centerOnMyGps = ()=>{
  if(myGpsLat && myGpsLng){
    if(pickerMap){
      pickerMap.setView([myGpsLat, myGpsLng], 16);
    }
    setPickedLocation(myGpsLat, myGpsLng, true);
    showToast("✓ Centered on your location");
  }else{
    showToast("Getting your location…");
    requestLocation(false, (lat, lng)=>{
      if(pickerMap){
        pickerMap.setView([lat, lng], 16);
      }
      setPickedLocation(lat, lng, true);
    });
  }
};

/* =========== GPS (For Self mode) =========== */
function autoCaptureLocation(){
  if(!navigator.geolocation){ myGpsState = "failed"; updateLocUi(); return; }
  if(navigator.permissions && navigator.permissions.query){
    navigator.permissions.query({ name:"geolocation" }).then((result)=>{
      if(result.state === "denied"){ myGpsState = "failed"; updateLocUi(); return; }
      requestLocation(true);
    }).catch(()=> requestLocation(true));
  }else{
    requestLocation(true);
  }
}

window.captureLocation = ()=>{
  if(!navigator.geolocation){
    showToast("Geolocation not supported", true);
    myGpsState = "failed"; updateLocUi(); return;
  }
  requestLocation(false);
};

function requestLocation(silent, cb){
  myGpsState = "detecting";
  updateLocUi();
  if(!silent && deliveryMode === "self") showToast("Getting your location…");

  navigator.geolocation.getCurrentPosition((pos)=>{
    myGpsLat = pos.coords.latitude;
    myGpsLng = pos.coords.longitude;
    myGpsState = "captured";

    if(deliveryMode === "self"){
      recomputeDistances();
      render();
      if(!silent) showToast("✓ Location captured · fees recalculated");
    }
    if(cb) cb(myGpsLat, myGpsLng);
  }, (err)=>{
    myGpsState = "failed";
    updateLocUi();
    if(!silent){
      const msg = err.code === 1
        ? "Location permission denied. Tap the button to retry."
        : "Couldn't get location. Tap to retry.";
      showToast(msg, true);
    }
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
}

/* =========== VALIDATION =========== */
function validate(){
  let valid = true;

  if(deliveryMode === "self"){
    const name = document.getElementById("custName").value.trim();
    const phone = document.getElementById("custPhone").value.trim();
    const addr = document.getElementById("custAddr").value.trim();

    if(!name){
      document.getElementById("nameWrap").classList.add("error");
      document.getElementById("nameError").classList.add("show");
      valid = false;
    }
    if(phone.length !== 10 || !/^[6-9]/.test(phone)){
      document.getElementById("phoneWrap").classList.add("error");
      document.getElementById("phoneError").classList.add("show");
      valid = false;
    }
    if(addr.length < 10){
      document.getElementById("addrWrap").classList.add("error");
      document.getElementById("addrError").classList.add("show");
      valid = false;
    }

    if(!commonValidate()) valid = false;
    if(!valid) return null;

    return {
      mode: "self",
      senderName: name, senderPhone: phone,
      recipientName: name, recipientPhone: phone,
      address: addr,
      lat: myGpsLat, lng: myGpsLng
    };
  }else{
    /* Other mode */
    const senderName = document.getElementById("senderName").value.trim();
    const senderPhone = document.getElementById("senderPhone").value.trim();
    const recName = document.getElementById("recName").value.trim();
    const recPhone = document.getElementById("recPhone").value.trim();
    const recExtra = document.getElementById("recExtra").value.trim();

    if(!senderName){
      document.getElementById("senderNameWrap").classList.add("error");
      document.getElementById("senderNameError").classList.add("show");
      valid = false;
    }
    if(senderPhone.length !== 10 || !/^[6-9]/.test(senderPhone)){
      document.getElementById("senderPhoneWrap").classList.add("error");
      document.getElementById("senderPhoneError").classList.add("show");
      valid = false;
    }
    if(!recName){
      document.getElementById("recNameWrap").classList.add("error");
      document.getElementById("recNameError").classList.add("show");
      valid = false;
    }
    if(recPhone.length !== 10 || !/^[6-9]/.test(recPhone)){
      document.getElementById("recPhoneWrap").classList.add("error");
      document.getElementById("recPhoneError").classList.add("show");
      valid = false;
    }

    if(!pickedLat || !pickedLng){
      document.getElementById("pickedError").classList.add("show");
      showToast("Please pick the recipient's location on the map", true);
      valid = false;
    }

    if(!commonValidate()) valid = false;
    if(!valid) return null;

    /* Combine address: reverse-geocoded text + extra instructions */
    let fullAddr = pickedAddress || `${pickedLat.toFixed(4)}, ${pickedLng.toFixed(4)}`;
    if(recExtra) fullAddr = `${recExtra} · ${fullAddr}`;

    return {
      mode: "other",
      senderName, senderPhone,
      recipientName: recName, recipientPhone: recPhone,
      address: fullAddr,
      lat: pickedLat, lng: pickedLng,
      extraNotes: recExtra
    };
  }
}

function commonValidate(){
  const closedShops = shopGroups.filter(g=>{
    const meta = shopMeta[g.shopName.toLowerCase()] || {};
    return meta.isOpen === false;
  });
  if(closedShops.length > 0){
    showToast(`${closedShops[0].shopName} is currently closed. Please remove its items.`, true);
    return false;
  }

  for(const g of shopGroups){
    if(!vehicleFits(g.selectedVehicleId, g.weightKg, VEHICLES)){
      showToast(`Selected vehicle for ${g.shopName} is too small for the order weight.`, true);
      return false;
    }
  }
  return true;
}

let createdOrderIds = [];

window.placeOrder = async ()=>{
  const v = validate();
  if(!v){ showToast("Please fix the errors above", true); return; }

  if((!v.lat || !v.lng) && !window.__locWarned){
    window.__locWarned = true;
    if(v.mode === "self"){
      showToast("⚠️ Tap GPS button for accurate fare · or continue with min fee", true);
    }else{
      showToast("⚠️ Pin recipient location on the map for accurate fare", true);
    }
    return;
  }

  btnPlace.classList.add("loading");
  btnPlace.disabled = true;

  /* Save sender info (always — doesn't matter if recipient or self) */
  localStorage.setItem("lastCustomerName", v.senderName);
  localStorage.setItem("lastCustomerPhone", v.senderPhone);
  if(v.mode === "self"){
    localStorage.setItem("lastCustomerAddress", v.address);
  }

  createdOrderIds = [];
  let success = 0, failed = 0;

  for(const g of shopGroups){
    const veh = VEHICLES.find(x => x.id === g.selectedVehicleId);
    const meta = shopMeta[g.shopName.toLowerCase()] || {};

    const deliveryFee = g.__deliveryFee;
    const handling = g.__handling;
    const platformFee = g.__platformFee;
    const discount = g.__discount;
    const total = g.__total;

    const baseOrder = {
      /* RECIPIENT (where order goes — used by driver for delivery) */
      name: v.recipientName,
      phone: v.recipientPhone,
      customerPhone: v.recipientPhone,
      address: v.address,
      customerLat: v.lat, customerLng: v.lng,
      lat: v.lat, lng: v.lng,

      /* SENDER (paying customer — for "for someone else" orders) */
      senderName: v.senderName,
      senderPhone: v.senderPhone,

      /* MODE flag */
      deliveryMode: v.mode,    // "self" | "other"
      isGiftOrder: v.mode === "other",
      extraNotes: v.extraNotes || null,

      shopName: g.shopName,
      shopEmail: meta.email || "",
      shopLat: meta.lat || null,
      shopLng: meta.lng || null,
      shopIcon: meta.icon || "🏪",

      items: g.items.map(it=>({
        name: it.name,
        price: Number(it.price) || 0,
        qty: it.qty || 1,
        weight: it.weight || null,
        image: it.image || null,
        productId: it.productId || null,
        weightKg: Number(it.__wtKg.toFixed(2))
      })),
      cartWeightKg: Number(g.weightKg.toFixed(2)),
      distanceKm: g.distanceKm !== null ? Number(g.distanceKm.toFixed(2)) : null,

      vehicleType: veh.id,
      vehicleName: veh.name,
      vehicleIcon: veh.icon,
      vehiclePerKmRate: veh.perKmRate,

      total: g.subtotal,
      deliveryFee,
      handlingFee: handling,
      platformFee,
      platformFeePercent: pricingConfig.platformFeePercent,

      discountAmount: discount.amount,
      discountLabel: discount.label || "",
      discountSource: discount.source,
      discountType: discount.type || "",
      discountValue: discount.value || 0,

      grandTotal: total,
      shopEarning: Math.round(g.subtotal * 0.9),
      deliveryEarning: Math.round(deliveryFee * 0.85),

      status: "Pending",
      deliveryStatus: "Waiting",
      pickupStep: 0,
      deliveryBoyId: null,

      time: new Date()
    };

    const targetCollection = veh.id === "bike" ? "orders" : "transport-orders";

    if(targetCollection === "transport-orders"){
      baseOrder.pickupAddress = `${g.shopName} (Shop pickup)`;
      baseOrder.pickupLat = meta.lat || null;
      baseOrder.pickupLng = meta.lng || null;
      baseOrder.pickupContactName = meta.email || g.shopName;
      baseOrder.pickupContactPhone = "";

      baseOrder.dropAddress = v.address;
      baseOrder.dropLat = v.lat;
      baseOrder.dropLng = v.lng;
      baseOrder.dropContactName = v.recipientName;
      baseOrder.dropContactPhone = v.recipientPhone;

      baseOrder.estimatedFare = deliveryFee;
      baseOrder.goodsType = "groceries";
      baseOrder.fromShopOrder = true;
    }

    try{
      const ref = await addDoc(collection(db, targetCollection), baseOrder);
      createdOrderIds.push({ id: ref.id, col: targetCollection });
      success++;
    }catch(e){
      console.error(e);
      failed++;
    }
  }

  btnPlace.classList.remove("loading");

  if(success === 0){
    btnPlace.disabled = false;
    showToast("Could not place orders. Try again.", true);
    return;
  }

  if(failed > 0){
    showToast(`${success} of ${shopGroups.length} orders placed. ${failed} failed.`, true);
  }

  if(createdOrderIds[0]){
    localStorage.setItem("lastOrderId", createdOrderIds[0].id);
    localStorage.setItem("lastOrderCol", createdOrderIds[0].col);

    const myOrders = JSON.parse(localStorage.getItem("myOrders") || "[]");
    createdOrderIds.forEach(o => myOrders.unshift(o.id));
    localStorage.setItem("myOrders", JSON.stringify(myOrders));
  }

  localStorage.removeItem("cart");

  const modal = document.getElementById("successModal");
  document.getElementById("successTitle").textContent =
    success > 1 ? `${success} orders placed! 🎉` : "Order placed! 🎉";

  let successMsg;
  if(deliveryMode === "other"){
    successMsg = success > 1
      ? `${success} orders are on their way to ${v.recipientName}. They'll get an SMS update.`
      : `Your order is being processed and will be delivered to ${v.recipientName}.`;
  }else{
    successMsg = success > 1
      ? `Your ${success} orders are now being processed. Track each shop's order separately.`
      : "Your order is now being processed. Track it for live updates.";
  }
  document.getElementById("successMsg").textContent = successMsg;
  modal.classList.add("show");
};

window.goToTracking = ()=>{
  if(createdOrderIds.length === 0){
    location.href = "/index.html";
    return;
  }
  const first = createdOrderIds[0];
  if(first.col === "orders"){
    location.href = `tracking.html?orderId=${first.id}`;
  }else{
    location.href = `transport-tracking.html?orderId=${first.id}`;
  }
};

window.goBack = ()=> location.href = "/index.html";

init();
</script>
