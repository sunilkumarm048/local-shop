<!DOCTYPE html>
<html>
<head>

<title>Customer App</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
}

/* HEADER */
.header{
background:#ff5a5f;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

/* SEARCH */
.search{
padding:10px;
text-align:center;
background:#f0f2f5;
}

.search input{
width:90%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* CONTAINER */
.container{
padding:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
display:flex;
align-items:center;
gap:15px;
}

.card:hover{
transform:scale(1.02);
}

/* HIDE WHEN SEARCH */
.hidden{
display:none;
}

/* ICON */
.icon{
font-size:30px;
}

/* TEXT */
.title{
font-size:18px;
font-weight:bold;
}

.subtitle{
font-size:13px;
color:gray;
}

</style>

</head>

<body>

<div class="header">
🛒 Local Market
</div>

<div class="search">
<input id="search" placeholder="Search shop..." onkeyup="searchShop()">
</div>

<div class="container">

<div class="card" onclick="openShop('Bakery')">
<div class="icon">🍞</div>
<div>
<div class="title">Bakery</div>
<div class="subtitle">Puff, Samosa, Snacks</div>
</div>
</div>

<div class="card" onclick="openShop('Tea Shop')">
<div class="icon">☕</div>
<div>
<div class="title">Tea Shop</div>
<div class="subtitle">Tea, Coffee</div>
</div>
</div>

<div class="card" onclick="openShop('Fast Food')">
<div class="icon">🍔</div>
<div>
<div class="title">Fast Food</div>
<div class="subtitle">Burger, Pizza</div>
</div>
</div>

</div>

<script>

// SEARCH FUNCTION
function searchShop(){

let input = document.getElementById("search").value.toLowerCase()
let cards = document.querySelectorAll(".card")

cards.forEach(card=>{

let text = card.innerText.toLowerCase()

if(text.includes(input)){
card.classList.remove("hidden")
}else{
card.classList.add("hidden")
}

})

}

// OPEN SHOP
function openShop(shop){

localStorage.setItem("shop",shop)

// small animation delay
setTimeout(()=>{
window.location.href="product.html"
},200)

}

</script>

</body>
</html>
