<!DOCTYPE html>
<html>
<head>

<title>Customer App</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
🛒 Local Market
</div>

<div class="container">

<div class="card" onclick="openShop('Bakery')">
🍞 Bakery
</div>

<div class="card" onclick="openShop('Tea Shop')">
☕ Tea Shop
</div>

<div class="card" onclick="openShop('Fast Food')">
🍔 Fast Food
</div>

</div>

<script>

function openShop(shop){
localStorage.setItem("shop",shop)
window.location.href="product.html"
}

</script>

</body>
</html>
