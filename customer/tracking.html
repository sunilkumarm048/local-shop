<!DOCTYPE html>
<html>
<head>

<title>Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}
#map{
height:400px;
margin:15px;
border-radius:10px;
}
.box{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.pending{color:orange;}
.accepted{color:green;}
.ready{color:blue;}
.out{color:#ff9800;}
.delivered{color:purple;}
</style>

</head>

<body>

<div class="header">📍 Live Order Tracking</div>

<div class="box">
Order ID: <span id="orderId"></span><br><br>
Status: <b id="status">Loading...</b><br><br>
Delivery Boy: <span id="boy">Not assigned</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ORDER ID
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("orderId") || localStorage.getItem("lastOrderId");

document.getElementById("orderId").innerText = orderId;

// 🌍 MAP
let map = L.map('map').setView([20.2961,85.8245], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// MARKERS
let deliveryMarker=null, customerMarker=null, shopMarker=null, routeLine=null;
let deliveredShown=false;

// 🔥 YOUR API KEY (ADDED)
const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImZiNTA0NmI1ZTc3ZDQwZjVhMjA0ZWEyZDg2ZTFlNjY4IiwiaCI6Im11cm11cjY0In0=";

// ROUTE FUNCTION
async function drawRoute(start,end){

if(routeLine){
map.removeLayer(routeLine);
}

try{
let res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Authorization": API_KEY,
"Content-Type":"application/json"
},
body: JSON.stringify({
coordinates:[
[start.lng,start.lat],
[end.lng,end.lat]
]
})
});

let data = await res.json();

if(!data.features){
console.error("Route error:", data);
return;
}

let coords = data.features[0].geometry.coordinates;
let latlngs = coords.map(c => [c[1],c[0]]);

routeLine = L.polyline(latlngs,{
color:"blue",
weight:5
}).addTo(map);

}catch(e){
console.error("Route fetch error:", e);
}
}

// 🔴 LIVE DATA
onSnapshot(doc(db,"orders",orderId),(docSnap)=>{

if(!docSnap.exists()){
document.getElementById("status").innerText = "Order not found";
return;
}

let data = docSnap.data();

// STATUS
document.getElementById("status").innerText = data.status;
document.getElementById("boy").innerText = data.deliveryBoy || "Not assigned";

// COLOR
let statusEl = document.getElementById("status");
statusEl.className="";

if(data.status==="Pending") statusEl.classList.add("pending");
if(data.status==="Accepted") statusEl.classList.add("accepted");
if(data.status==="Ready") statusEl.classList.add("ready");
if(data.status==="Out for Delivery") statusEl.classList.add("out");
if(data.status==="Delivered") statusEl.classList.add("delivered");

// CUSTOMER
if(data.customerLat && data.customerLng){
let pos=[data.customerLat,data.customerLng];
if(!customerMarker){
customerMarker=L.marker(pos).addTo(map).bindPopup("👤 Customer");
}else{
customerMarker.setLatLng(pos);
}
}

// SHOP
if(data.shopLat && data.shopLng){
let pos=[data.shopLat,data.shopLng];
if(!shopMarker){
shopMarker=L.marker(pos).addTo(map).bindPopup("🏪 Shop");
}else{
shopMarker.setLatLng(pos);
}
}

// DELIVERY
if(data.deliveryLat && data.deliveryLng){

let pos=[data.deliveryLat,data.deliveryLng];

if(!deliveryMarker){
deliveryMarker=L.marker(pos).addTo(map).bindPopup("🚚 Delivery");
}else{
deliveryMarker.setLatLng(pos);
}

map.panTo(pos);
map.setZoom(15);

// 🔥 ROUTE SWITCH
if(data.status==="Out for Delivery"){
drawRoute(
{lat:data.deliveryLat,lng:data.deliveryLng},
{lat:data.customerLat,lng:data.customerLng}
);
}else{
drawRoute(
{lat:data.deliveryLat,lng:data.deliveryLng},
{lat:data.shopLat,lng:data.shopLng}
);
}

}

// DELIVERY ALERT
if(data.status==="Delivered" && !deliveredShown){
deliveredShown=true;
alert("🎉 Order Delivered Successfully!");
}

});

</script>

</body>
</html>
