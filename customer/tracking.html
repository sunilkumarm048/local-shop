<!DOCTYPE html>
<html>
<head>

<title>Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
}

#map{
height:350px;
margin:15px;
border-radius:10px;
}

.box{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">📍 Live Tracking</div>

<div class="box">
Order ID: <span id="orderId"></span><br>
Status: <b id="status">Loading...</b>
</div>

<div id="map"></div>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const orderId = localStorage.getItem("lastOrderId");
document.getElementById("orderId").innerText = orderId;

// DEFAULT LOCATION (Bhubaneswar)
let delivery = [20.2961, 85.8245];

// INIT MAP
let map = L.map('map').setView(delivery, 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// MARKER
let marker = L.marker(delivery).addTo(map);

// FIRESTORE LIVE UPDATE
onSnapshot(doc(db,"orders",orderId),(docSnap)=>{

let data = docSnap.data();

document.getElementById("status").innerText = data.status;

// MOVE MARKER (DEMO)
delivery[0] += 0.0005;
delivery[1] += 0.0005;

marker.setLatLng(delivery);

});

</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
