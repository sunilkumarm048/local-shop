<!DOCTYPE html>
<html>
<head>

<title>Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{background:#ff5a5f;color:white;padding:15px;text-align:center;}
#map{height:400px;margin:15px;border-radius:10px;}
.box{background:white;margin:15px;padding:15px;border-radius:10px;}
</style>

</head>

<body>

<div class="header">📍 Live Order Tracking</div>

<div class="box">
Order ID: <span id="orderId"></span><br><br>
Status: <b id="status"></b><br><br>
Delivery Boy: <span id="boy"></span>
</div>

<div id="map"></div>

<div id="confirmBox" class="box"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, onSnapshot, updateDoc, getDocs, collection } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const orderId = new URLSearchParams(location.search).get("orderId");
document.getElementById("orderId").innerText = orderId;

let map = L.map('map').setView([20.2961,85.8245], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let deliveryMarker;

// LIVE DATA
onSnapshot(doc(db,"orders",orderId),(snap)=>{

if(!snap.exists()) return;

let data = snap.data();

document.getElementById("status").innerText = data.status;
document.getElementById("boy").innerText = data.deliveryBoyId || "Not assigned";

// DELIVERY MARKER
if(data.deliveryLat){

let pos=[data.deliveryLat,data.deliveryLng];

if(!deliveryMarker){
deliveryMarker=L.marker(pos).addTo(map);
}else{
deliveryMarker.setLatLng(pos);
}

map.setView(pos,15);
}

// ✅ SHOW CONFIRM BUTTON
if(data.deliveryStatus==="WaitingCustomerConfirm"){

document.getElementById("confirmBox").innerHTML=`
<h3>📦 Order Delivered?</h3>
<button onclick="confirmDelivery('${orderId}')">✅ Yes Received</button>
<button onclick="reportIssue()">❌ Not Received</button>
`;

}

// AUTO REDIRECT AFTER DELIVERY
if(data.deliveryStatus==="Delivered"){
alert("🎉 Delivered!");
location.href="index.html";
}

});

// CONFIRM DELIVERY
window.confirmDelivery = async(id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered",
status:"Delivered"
});

// UPDATE SPLIT ORDERS
const snap = await getDocs(collection(db,"split-orders"));

snap.forEach(async(d)=>{
if(d.data().parentOrderId===id){
await updateDoc(doc(db,"split-orders",d.id),{
deliveryStatus:"Delivered",
status:"Delivered"
});
}
});

};

// ISSUE
window.reportIssue = ()=>{
alert("Support will contact you");
};

</script>

</body>
</html>
