<!DOCTYPE html>
<html>
<head>

<title>Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* MAP */
#map{
height:350px;
margin:15px;
border-radius:10px;
}

/* BOX */
.box{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* STATUS COLORS */
.pending{color:orange;}
.accepted{color:green;}
.ready{color:blue;}
.out{color:#ff9800;}
.delivered{color:purple;}

</style>

</head>

<body>

<div class="header">📍 Live Order Tracking</div>

<div class="box">
Order ID: <span id="orderId"></span><br><br>
Status: <b id="status">Loading...</b><br><br>
Delivery Boy: <span id="boy">Not assigned</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 GET ORDER ID FROM URL (NEW)
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("orderId") || localStorage.getItem("lastOrderId");

document.getElementById("orderId").innerText = orderId;

// DEFAULT LOCATION (Bhubaneswar)
let delivery = [20.2961, 85.8245];

// INIT MAP
let map = L.map('map').setView(delivery, 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// MARKER
let marker = L.marker(delivery).addTo(map);

// LIVE FIRESTORE
onSnapshot(doc(db,"orders",orderId),(docSnap)=>{

if(!docSnap.exists()){
document.getElementById("status").innerText = "Order not found";
return;
}

let data = docSnap.data();

// STATUS TEXT
document.getElementById("status").innerText = data.status;

// DELIVERY BOY NAME
document.getElementById("boy").innerText = data.deliveryBoy || "Not assigned";

// STATUS COLOR
let statusEl = document.getElementById("status");

statusEl.className = "";

if(data.status === "Pending") statusEl.classList.add("pending");
if(data.status === "Accepted") statusEl.classList.add("accepted");
if(data.status === "Ready") statusEl.classList.add("ready");
if(data.status === "Out for Delivery") statusEl.classList.add("out");
if(data.status === "Delivered") statusEl.classList.add("delivered");

// 🔥 GPS UPDATE
if(data.deliveryLat && data.deliveryLng){

let newPos = [data.deliveryLat, data.deliveryLng];

marker.setLatLng(newPos);
map.setView(newPos);

}

// 🎉 AUTO SUCCESS MESSAGE
if(data.status === "Delivered"){
alert("🎉 Order Delivered Successfully!");
}

});

</script>

</body>
</html>
