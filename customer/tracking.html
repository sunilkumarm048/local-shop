<!DOCTYPE html>
<html>
<head>

<title>Order Tracking</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

/* STATUS BOX */
.statusBox{
padding:15px;
background:white;
margin:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* MAP */
#map{
height:300px;
width:100%;
margin-top:10px;
border-radius:10px;
}

.status{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
📍 Live Order Tracking
</div>

<div class="statusBox">

<div>
Order ID: <span id="orderId"></span>
</div>

<div class="status">
Status: <span id="status">Loading...</span>
</div>

<div id="map"></div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// GET LAST ORDER
const orderId = localStorage.getItem("lastOrderId");

document.getElementById("orderId").innerText = orderId;

// DEFAULT LOCATION (you can change)
let userLocation = { lat: 20.2961, lng: 85.8245 }; // Bhubaneswar
let deliveryLocation = { lat: 20.3000, lng: 85.8200 };

// MAP
let map, marker;

// INIT MAP
window.initMap = function(){

map = new google.maps.Map(document.getElementById("map"),{
center: userLocation,
zoom: 14
});

marker = new google.maps.Marker({
position: deliveryLocation,
map: map,
title: "Delivery Partner"
});

}

// REALTIME ORDER STATUS
onSnapshot(doc(db,"orders",orderId),(docSnap)=>{

let data = docSnap.data();

document.getElementById("status").innerText = data.status;

// 🔥 SIMULATE MOVEMENT (future real GPS)
moveMarker();

});

// MOVE DELIVERY (DEMO)
function moveMarker(){

deliveryLocation.lat += 0.0005;
deliveryLocation.lng += 0.0005;

marker.setPosition(deliveryLocation);

}

</script>

<!-- GOOGLE MAP -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
