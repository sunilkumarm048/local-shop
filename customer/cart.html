<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.item{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

button{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Your Cart</h2>

<div id="cart"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="checkout()">Checkout</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let cartDiv = document.getElementById("cart")
let total = 0

cart.forEach((item,index)=>{

let t = item.price * item.qty
total += t

cartDiv.innerHTML += `
<div class="item">
${item.name} x${item.qty} = ₹${t}
<button onclick="remove(${index})">Remove</button>
</div>
`

})

document.getElementById("total").innerText = total

function remove(i){
cart.splice(i,1)
localStorage.setItem("cart",JSON.stringify(cart))
location.reload()
}

function checkout(){
window.location.href = "checkout.html"
}

</script>

</body>
</html>
