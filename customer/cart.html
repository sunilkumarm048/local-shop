<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart · Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:90px;}
button{font-family:inherit;cursor:pointer;border:none;}

/* HEADER */
.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;
  position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.4);width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}

.titleBlock{flex:1;min-width:0;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#1f1f1f;}
.pageSub{font-size:13px;color:#3a3a3a;margin-top:2px;}

/* DELIVERY BANNER */
.deliveryBanner{
  max-width:900px;margin:12px auto 0;
  background:#fff;border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.bannerIcon{
  width:42px;height:42px;background:#fff5d6;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.bannerText{flex:1;line-height:1.25;}
.bannerTitle{font-size:14px;font-weight:700;color:#1f1f1f;}
.bannerSub{font-size:12px;color:#666;margin-top:2px;}

/* MAIN */
.container{max-width:900px;margin:0 auto;padding:14px 12px 0;}

.section{
  background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}

.sectionHeader{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.sectionTitle{font-size:15px;font-weight:700;color:#1f1f1f;}
.itemCount{font-size:12px;color:#666;font-weight:500;}

/* SHOP HEADER (when items grouped by shop) */
.shopHeader{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:#666;
  margin:10px 0 6px;padding:6px 10px;
  background:#fafafa;border-radius:8px;
  border:1px solid #f0f0f0;
}
.shopHeader:first-child{margin-top:0;}
.shopHeader .ic{
  width:22px;height:22px;border-radius:50%;
  background:#fff5d6;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}

/* MULTI-SHOP NOTICE */
.multiShopNote{
  background:#dbe9ff;
  border-radius:10px;
  padding:10px 12px;
  font-size:12px;color:#1857c1;line-height:1.4;
  display:flex;align-items:flex-start;gap:8px;
  margin-bottom:10px;
}
.multiShopNote .ic{font-size:16px;flex-shrink:0;}

/* ITEM ROW */
.item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;border-bottom:1px solid #f0f0f0;
}
.item:last-child{border-bottom:none;padding-bottom:4px;}

.itemImg{
  width:60px;height:60px;border-radius:10px;
  background:#f5f5f5;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.itemImg img{width:100%;height:100%;object-fit:cover;}

.itemInfo{flex:1;min-width:0;line-height:1.3;}

.itemName{
  font-size:14px;font-weight:600;color:#1f1f1f;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

.itemMeta{
  font-size:11px;color:#888;margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.itemPrice{
  font-size:13px;color:#666;
  margin-top:5px;
  display:flex;align-items:center;gap:6px;
  flex-wrap:wrap;
}
.itemPrice b{color:#1f1f1f;font-weight:700;}
.itemPrice .mrpStrike{color:#bbb;text-decoration:line-through;font-size:11px;}
.itemPrice .pct{
  background:#dcf3e1;color:#0C831F;
  font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:4px;
}

.itemRight{
  display:flex;flex-direction:column;
  align-items:flex-end;gap:6px;
  flex-shrink:0;
}

/* QTY */
.qtyBox{
  display:flex;align-items:center;
  background:#0C831F;color:#fff;
  border-radius:7px;overflow:hidden;
  min-width:78px;
}
.qtyBox button{
  background:transparent;color:#fff;
  width:24px;height:30px;
  font-size:16px;font-weight:700;
}
.qtyBox span{
  flex:1;text-align:center;
  font-size:13px;font-weight:700;
}

.removeBtn{
  background:transparent;color:#d23030;
  font-size:11px;font-weight:600;
  padding:2px 6px;border-radius:5px;
}
.removeBtn:hover{background:#fde0e0;}

/* BILL */
.billRow{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:13px;color:#3a3a3a;
}
.billRow b{font-weight:600;color:#1f1f1f;}
.billDivider{border-top:1px dashed #e0e0e0;margin:8px 0;}
.billTotal{font-size:15px;font-weight:800;color:#1f1f1f;padding-top:6px;}

.savings{
  background:#e8f8eb;color:#0C831F;
  padding:8px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  margin-top:10px;text-align:center;
}

.freeTag{color:#0C831F;font-weight:700;}
.strike{
  text-decoration:line-through;color:#999;
  margin-right:4px;font-weight:400;
}

/* EMPTY */
.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;margin-top:20px;
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;margin-bottom:20px;}

.shopBtn{
  background:#0C831F;color:#fff;
  padding:12px 26px;border-radius:10px;
  font-size:14px;font-weight:700;letter-spacing:.3px;
}
.shopBtn:active{transform:scale(.97);}

/* CHECKOUT BAR */
.checkoutBar{
  position:fixed;bottom:0;left:0;right:0;
  background:#0C831F;color:#fff;padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;z-index:999;
  box-shadow:0 -2px 12px rgba(0,0,0,.15);
  transition:opacity .2s, transform .2s;
}
.checkoutBar.hidden{
  opacity:0;transform:translateY(100%);pointer-events:none;
}

.coLeft{display:flex;flex-direction:column;line-height:1.2;}
.coAmount{font-size:17px;font-weight:800;}
.coLabel{font-size:12px;font-weight:500;opacity:.9;margin-top:2px;}

.coRight{
  display:flex;align-items:center;gap:6px;
  font-size:14px;font-weight:700;
}

/* TOAST */
.toast{
  position:fixed;bottom:90px;
  left:50%;transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;
  padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;
  z-index:1500;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
  .container{padding:18px 20px 0;}
  .section{padding:18px;}
  .sectionTitle{font-size:16px;}
  .itemImg{width:70px;height:70px;}
  .itemName{font-size:15px;}
  .checkoutBar{padding:14px 24px;}
  .coAmount{font-size:18px;}
}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">My Cart</div>
      <div class="pageSub" id="headerSub">0 items</div>
    </div>
  </div>

  <div class="deliveryBanner" id="deliveryBanner" style="display:none;">
    <div class="bannerIcon">⚡</div>
    <div class="bannerText">
      <div class="bannerTitle">Delivery in 15 minutes</div>
      <div class="bannerSub">Shipment of <span id="bannerCount">0</span> items</div>
    </div>
  </div>
</header>

<main class="container" id="mainArea"></main>

<div id="checkoutBar" class="checkoutBar hidden" onclick="checkout()">
  <div class="coLeft">
    <div class="coAmount">₹<span id="payAmount">0</span></div>
    <div class="coLabel">TOTAL · <span id="payCount">0</span> items</div>
  </div>
  <div class="coRight">
    Proceed to Pay <span>→</span>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const mainArea       = document.getElementById("mainArea");
const headerSub      = document.getElementById("headerSub");
const deliveryBanner = document.getElementById("deliveryBanner");
const bannerCount    = document.getElementById("bannerCount");
const checkoutBar    = document.getElementById("checkoutBar");
const payAmount      = document.getElementById("payAmount");
const payCount       = document.getElementById("payCount");
const toast          = document.getElementById("toast");

const DELIVERY_FEE = 0;
const HANDLING_FEE = 5;
const FREE_DELIVERY_OVER = 199;

const COLORS = ["#FF6B6B","#4ECDC4","#FFA94D","#845EC2","#0C831F","#F4A261","#2A9D8F","#E76F51"];
function colorFor(name){
  let h = 0;
  for(let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
  return COLORS[h % COLORS.length];
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

/* TOAST */
function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}

/* CART SYNC (FIX #1) */
function reloadCart(){
  cart = JSON.parse(localStorage.getItem("cart")) || [];
  render();
}
window.addEventListener("pageshow", (e)=>{ if(e.persisted) reloadCart(); });
window.addEventListener("storage", (e)=>{ if(e.key === "cart") reloadCart(); });
window.addEventListener("focus", reloadCart);

/* IMAGE ERROR HANDLER (FIX #3) */
window.handleImgError = (img)=>{
  const wrap = img.parentElement;
  if(!wrap) return;
  wrap.innerHTML = wrap.dataset.initial || "?";
  wrap.style.background = wrap.dataset.bg || "#999";
  wrap.style.color = "#fff";
  wrap.style.fontWeight = "800";
};

/* RENDER */
function render(){
  if(cart.length === 0){
    renderEmpty();
    return;
  }

  /* FIX #7: Group items by shop */
  const groups = new Map();
  cart.forEach((item, idx)=>{
    const shop = item.shopName || "Other items";
    if(!groups.has(shop)) groups.set(shop, []);
    groups.get(shop).push({ ...item, __idx: idx });
  });

  let itemTotal = 0;
  let totalQty  = 0;
  let mrpTotal  = 0;
  let itemsHtml = "";

  /* Multi-shop notice */
  if(groups.size > 1){
    itemsHtml += `
      <div class="multiShopNote">
        <div class="ic">ℹ️</div>
        <div>You have items from <b>${groups.size} shops</b>. Each shop will receive its own order at checkout.</div>
      </div>`;
  }

  groups.forEach((items, shopName)=>{
    if(groups.size > 1){
      itemsHtml += `
        <div class="shopHeader">
          <div class="ic">🏪</div>
          ${escapeHtml(shopName)}
        </div>`;
    }

    items.forEach(item=>{
      const lineTotal = item.price * item.qty;
      itemTotal += lineTotal;
      totalQty  += item.qty;
      mrpTotal  += (item.mrp || item.price) * item.qty;

      const initial = (item.name || "?").trim().charAt(0).toUpperCase();
      const bgColor = colorFor(item.name || "");

      const imgInner = item.image
        ? `<img src="${escapeHtml(item.image)}" alt="" onerror="handleImgError(this)">`
        : escapeHtml(initial);
      const imgStyle = item.image ? "" : `background:${bgColor};color:#fff;font-weight:800;`;

      let mrpHtml = "";
      if(item.mrp && item.mrp > item.price){
        const off = Math.round(((item.mrp - item.price) / item.mrp) * 100);
        mrpHtml = `
          <span class="mrpStrike">₹${item.mrp}</span>
          <span class="pct">${off}% OFF</span>
        `;
      }

      itemsHtml += `
        <div class="item">
          <div class="itemImg" style="${imgStyle}"
               data-initial="${escapeHtml(initial)}"
               data-bg="${bgColor}">
            ${imgInner}
          </div>
          <div class="itemInfo">
            <div class="itemName">${escapeHtml(item.name)}</div>
            ${item.weight ? `<div class="itemMeta">${escapeHtml(item.weight)}</div>` : ""}
            <div class="itemPrice">
              <b>₹${item.price}</b>
              ${mrpHtml}
            </div>
          </div>
          <div class="itemRight">
            <div class="qtyBox">
              <button onclick="changeQty(${item.__idx},-1)" aria-label="Decrease">−</button>
              <span>${item.qty}</span>
              <button onclick="changeQty(${item.__idx},1)" aria-label="Increase">+</button>
            </div>
            <button class="removeBtn" onclick="removeItem(${item.__idx})">Remove</button>
          </div>
        </div>`;
    });
  });

  /* Bill */
  const deliveryFee = itemTotal >= FREE_DELIVERY_OVER ? 0 : DELIVERY_FEE;
  const handling    = HANDLING_FEE;
  const grandTotal  = itemTotal + deliveryFee + handling;
  const mrpSavings  = mrpTotal - itemTotal;

  headerSub.textContent = `${totalQty} item${totalQty>1?"s":""}`;
  bannerCount.textContent = totalQty;
  deliveryBanner.style.display = "flex";

  mainArea.innerHTML = `
    <div class="section">
      <div class="sectionHeader">
        <div class="sectionTitle">Items in your cart</div>
        <div class="itemCount">${totalQty} item${totalQty>1?"s":""}</div>
      </div>
      ${itemsHtml}
    </div>

    <div class="section">
      <div class="sectionTitle" style="margin-bottom:10px;">Bill details</div>

      <div class="billRow">
        <span>🧾 Item total</span>
        <span><b>₹${itemTotal}</b></span>
      </div>

      <div class="billRow">
        <span>🛵 Delivery charge</span>
        <span>
          ${deliveryFee === 0
            ? `<span class="strike">₹25</span><span class="freeTag">FREE</span>`
            : `<b>₹${deliveryFee}</b>`}
        </span>
      </div>

      <div class="billRow">
        <span>🛍️ Handling charge</span>
        <span><b>₹${handling}</b></span>
      </div>

      <div class="billDivider"></div>

      <div class="billRow billTotal">
        <span>To Pay</span>
        <span>₹${grandTotal}</span>
      </div>

      ${mrpSavings > 0
        ? `<div class="savings">🎉 You're saving ₹${mrpSavings} on this order</div>`
        : ``}
    </div>

    <div class="section" style="font-size:12px;color:#777;line-height:1.5;">
      <b style="color:#1f1f1f;font-size:13px;">Cancellation Policy</b><br>
      Orders cannot be cancelled once packed for delivery. In case of unexpected delays, a refund will be provided if applicable.
    </div>
  `;

  payAmount.textContent = grandTotal;
  payCount.textContent  = totalQty;
  checkoutBar.classList.remove("hidden");
}

function renderEmpty(){
  headerSub.textContent = "0 items";
  deliveryBanner.style.display = "none";
  checkoutBar.classList.add("hidden");
  mainArea.innerHTML = `
    <div class="empty">
      <div class="icon">🛒</div>
      <h3>Your cart is empty</h3>
      <p>Looks like you haven't added anything yet.<br>Let's fix that!</p>
      <button class="shopBtn" onclick="goBack()">Start Shopping</button>
    </div>
  `;
}

/* ACTIONS */
window.changeQty = (i, delta)=>{
  if(!cart[i]) return;
  cart[i].qty += delta;
  if(cart[i].qty <= 0) cart.splice(i, 1);
  save();
};

window.removeItem = (i)=>{
  if(!cart[i]) return;
  const name = cart[i].name;
  cart.splice(i, 1);
  save();
  showToast(`${name} removed from cart`);
};

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

/* FIX #4: absolute paths */
window.goBack = ()=> window.location.href = "/local-shop/index.html";

window.checkout = ()=>{
  if(cart.length === 0){
    showToast("Your cart is empty", true);
    return;
  }
  window.location.href = "/local-shop/customer/checkout.html";
};

render();
</script>

</body>
</html>
