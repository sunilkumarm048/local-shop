```html
<!DOCTYPE html>
<html>

<head>
<title>Shop Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
padding:6px 10px;
margin-right:6px;
border:none;
border-radius:5px;
cursor:pointer;
}

.accept{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

</style>

</head>

<body>

<h2>Shop Orders Dashboard</h2>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDiENWyBsHdVCNszjPb_gKT_JqBWxkKPfU",
authDomain: "local-shop-orders-d48d0.firebaseapp.com",
projectId: "local-shop-orders-d48d0",
storageBucket: "local-shop-orders-d48d0.firebasestorage.app",
messagingSenderId: "750524308284",
appId: "1:750524308284:web:d2a047c93580635e4e5c39"
};

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

const ordersDiv = document.getElementById("orders")

onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML=""

snapshot.forEach((docSnap)=>{

const order = docSnap.data()
const id = docSnap.id

let itemsHTML=""

if(order.items){
order.items.forEach(i=>{
itemsHTML += i.item + " x" + i.qty + "<br>"
})
}

ordersDiv.innerHTML += `

<div class="order">

<b>Customer:</b> ${order.name}<br>
<b>Phone:</b> ${order.phone}<br>

<b>Items:</b><br>
${itemsHTML}

<b>Total:</b> ₹${order.total}<br>
<b>Status:</b> ${order.status || "Pending"}<br><br>

<button class="accept" onclick="acceptOrder('${id}')">Accept</button>
<button class="reject" onclick="rejectOrder('${id}')">Reject</button>

</div>

`

})

})

window.acceptOrder = async function(id){
const ref = doc(db,"orders",id)
await updateDoc(ref,{status:"Accepted"})
}

window.rejectOrder = async function(id){
const ref = doc(db,"orders",id)
await updateDoc(ref,{status:"Rejected"})
}

</script>

</body>
</html>
