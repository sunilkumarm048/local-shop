<!DOCTYPE html>
<html>

<head>
    <title>Shop Dashboard</title>
</head>

<body>

    <h2>Shop Orders Dashboard</h2>

    <div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiENWyBsHdVCNszjPb_gKT_JqBWxkKPfU",
  authDomain: "local-shop-orders-d48d0.firebaseapp.com",
  projectId: "local-shop-orders-d48d0",
  storageBucket: "local-shop-orders-d48d0.firebasestorage.app",
  messagingSenderId: "750524308284",
  appId: "1:750524308284:web:d2a047c93580635e4e5c39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordersDiv = document.getElementById("orders");

onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML="";

snapshot.forEach((docSnap)=>{

const order = docSnap.data();
const id = docSnap.id;

ordersDiv.innerHTML += `
<hr>
<b>Customer:</b> ${order.name}<br>
<b>Phone:</b> ${order.phone}<br>
<b>Product:</b> ${order.product}<br>
<b>Quantity:</b> ${order.qty}<br>
<b>Status:</b> ${order.status || "Pending"}<br><br>

<button onclick="acceptOrder('${id}')">Accept</button>
<button onclick="rejectOrder('${id}')">Reject</button>
`;

});

});

window.acceptOrder = async function(id){
const orderRef = doc(db,"orders",id);
await updateDoc(orderRef,{status:"Accepted"});
}

window.rejectOrder = async function(id){
const orderRef = doc(db,"orders",id);
await updateDoc(orderRef,{status:"Rejected"});
}

</script>

</body>

</html>
