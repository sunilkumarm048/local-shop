<!DOCTYPE html>
<html>

<head>
    <title>Track Order</title>
</head>

<body>

    <h2>Track Your Order</h2>

    Phone Number:
    <input id="phone">

    <button onclick="searchOrder()">Check Status</button>

    <hr>

    <div id="result"></div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiENWyBsHdVCNszjPb_gKT_JqBWxkKPfU",
            authDomain: "local-shop-orders-d48d0.firebaseapp.com",
            projectId: "local-shop-orders-d48d0",
            storageBucket: "local-shop-orders-d48d0.firebasestorage.app",
            messagingSenderId: "750524308284",
            appId: "1:750524308284:web:d2a047c93580635e4e5c39"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.searchOrder = async function () {

            const phone = document.getElementById("phone").value;
            const querySnapshot = await getDocs(collection(db, "orders"));

            let resultHTML = "";

            querySnapshot.forEach((doc) => {

                const order = doc.data();

                if (order.phone === phone) {

                    resultHTML += `
<hr>
Customer: ${order.name}<br>
Product: ${order.product}<br>
Quantity: ${order.qty}<br>
Status: ${order.status || "Pending"}
`;

                }

            });

            document.getElementById("result").innerHTML = resultHTML || "No orders found.";

     }

    </script>

</body>

</html>
