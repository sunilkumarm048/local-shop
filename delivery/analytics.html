<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analytics · Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:30px;}
button{font-family:inherit;cursor:pointer;border:none;}

.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.4);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}
.titleBlock{flex:1;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#1f1f1f;}
.pageSub{font-size:12px;color:#3a3a3a;margin-top:2px;}

.tabs{
  display:flex;gap:8px;
  padding:12px 12px 4px;max-width:1100px;margin:0 auto;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}

.tab{
  padding:8px 16px;
  background:#fff;border:1px solid #e5e5e5;border-radius:22px;
  font-size:13px;font-weight:600;color:#444;
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.tab.active{background:#0C831F;color:#fff;border-color:#0C831F;}

.container{max-width:1100px;margin:0 auto;padding:14px 12px 0;}

/* Hero earnings card */
.heroCard{
  background:linear-gradient(135deg,#0C831F 0%,#0fa029 100%);
  color:#fff;border-radius:14px;
  padding:20px;margin-bottom:14px;
  box-shadow:0 4px 16px rgba(12,131,31,.25);
  position:relative;overflow:hidden;
}
.heroCard::before{
  content:"";position:absolute;top:-30px;right:-30px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.heroLabel{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;opacity:.9;}
.heroAmount{font-size:34px;font-weight:800;letter-spacing:-.5px;line-height:1;margin-top:4px;}
.heroSub{
  font-size:12px;font-weight:500;opacity:.92;margin-top:6px;
  display:flex;justify-content:space-between;
}
.heroSub strong{font-weight:800;}

.statsRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.statBox{
  background:#fff;border-radius:12px;
  padding:12px 8px;text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.statBox .ic{font-size:18px;margin-bottom:4px;}
.statValue{font-size:16px;font-weight:800;color:#1f1f1f;line-height:1.1;}
.statLabel{font-size:10px;color:#666;font-weight:500;margin-top:3px;letter-spacing:.2px;text-transform:uppercase;}
.statValue.loading{
  display:inline-block;width:50px;height:14px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:4px;
}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

.chartCard{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.chartTitle{
  font-size:13px;font-weight:800;color:#1f1f1f;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.chartTitle .ic{
  width:26px;height:26px;border-radius:7px;
  background:#dcf3e1;color:#0C831F;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;margin-right:8px;
}
.chartTitle .lhs{display:flex;align-items:center;}
.chartHeader{
  display:flex;align-items:center;gap:8px;
}

.dailyChart{
  display:flex;align-items:flex-end;gap:4px;
  height:140px;padding:0 4px;border-bottom:2px solid #f0f0f0;
}
.dailyBar{
  flex:1;min-width:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  position:relative;cursor:pointer;
}
.dailyBar .bar{
  width:100%;max-width:24px;
  background:linear-gradient(180deg,#0fa029 0%,#0C831F 100%);
  border-radius:4px 4px 0 0;
  transition:all .15s;
}
.dailyBar .bar.empty{background:#f0f0f0;}
.dailyBar:hover .bar{transform:scaleY(1.05);transform-origin:bottom;}
.dailyBar .label{
  font-size:9px;color:#888;font-weight:600;
  margin-top:5px;
}
.dailyBar .value{
  position:absolute;top:-22px;left:50%;
  transform:translateX(-50%);
  background:#1f1f1f;color:#fff;
  font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:4px;
  white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .15s;
}
.dailyBar:hover .value{opacity:1;}

.weekdayChart{
  display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
}
.wkBar{text-align:center;}
.wkBar .barWrap{
  height:80px;display:flex;flex-direction:column;justify-content:flex-end;
  background:#fafafa;border-radius:6px;padding:3px;margin-bottom:4px;
}
.wkBar .bar{
  background:linear-gradient(180deg,#1857c1 0%,#144aa3 100%);
  border-radius:3px;width:100%;
  display:flex;align-items:flex-start;justify-content:center;
  color:#fff;font-size:10px;font-weight:700;
  padding-top:3px;
}
.wkBar .lbl{font-size:10px;color:#666;font-weight:600;}

.peakHoursChart{
  position:relative;height:140px;
  padding:8px 4px 22px;
}
.peakLine{
  stroke:#F0B91D;stroke-width:2.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.peakArea{
  fill:url(#peakGrad);
  opacity:.4;
}
.peakDot{
  fill:#F0B91D;stroke:#fff;stroke-width:2;
}
.peakDot.max{fill:#0C831F;r:5;}
.hourLabel{
  font-size:9px;fill:#888;font-weight:600;
  text-anchor:middle;
}

.empty{
  text-align:center;padding:30px 20px;
  font-size:12px;color:#999;
}
.empty .ic{font-size:36px;display:block;margin-bottom:8px;opacity:.5;}

.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:1500;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .heroAmount{font-size:42px;}
}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">📊 Analytics</div>
      <div class="pageSub">Performance insights</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab" data-period="7">Last 7 days</div>
    <div class="tab active" data-period="30">Last 30 days</div>
    <div class="tab" data-period="90">Last 90 days</div>
    <div class="tab" data-period="all">All time</div>
  </div>
</header>

<main class="container">

  <div class="heroCard">
    <div class="heroLabel">Total earnings</div>
    <div class="heroAmount" id="heroEarning">₹0</div>
    <div class="heroSub">
      <span><strong id="heroCount">0</strong> deliveries</span>
      <span>Avg <strong id="heroAvg">₹0</strong></span>
    </div>
  </div>

  <div class="statsRow">
    <div class="statBox">
      <div class="ic">⚡</div>
      <div class="statValue loading" id="stPerHour"></div>
      <div class="statLabel">Per active hr</div>
    </div>
    <div class="statBox">
      <div class="ic">📦</div>
      <div class="statValue loading" id="stPerDay"></div>
      <div class="statLabel">Per day avg</div>
    </div>
    <div class="statBox">
      <div class="ic">🎯</div>
      <div class="statValue loading" id="stCompleted"></div>
      <div class="statLabel">Completion</div>
    </div>
  </div>

  <div class="chartCard">
    <div class="chartTitle">
      <div class="lhs"><div class="ic">📈</div>Daily Earnings</div>
    </div>
    <div id="dailyChart"></div>
  </div>

  <div class="chartCard">
    <div class="chartTitle">
      <div class="lhs"><div class="ic">📅</div>By Day of Week</div>
    </div>
    <div id="weekdayChart"></div>
  </div>

  <div class="chartCard">
    <div class="chartTitle">
      <div class="lhs"><div class="ic">⏰</div>Peak Hours</div>
    </div>
    <div id="peakHoursChart"></div>
  </div>

</main>

<div id="toast" class="toast"></div>

<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const toast = document.getElementById("toast");
let myEmail = null;
let allOrders = [];
let currentPeriod = 30;

function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}

window.goBack = ()=> location.href = "dashboard.html";

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentPeriod = tab.dataset.period === "all" ? "all" : parseInt(tab.dataset.period, 10);
    renderAll();
  });
});

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    showToast("Login required", true);
    setTimeout(()=> location.href = "login.html", 800);
    return;
  }
  myEmail = user.email;
  await loadOrders();
});

function isDelivered(o){
  const status  = (o.status || "").toLowerCase();
  const dStatus = (o.deliveryStatus || "").toLowerCase();
  return status === "delivered" || dStatus === "delivered" || dStatus === "completed";
}
function isCancelled(o){
  const s = (o.status || "").toLowerCase();
  return s === "cancelled" || s === "rejected";
}

async function loadOrders(){
  try{
    allOrders = [];

    /* Pull from all 3 collections */
    for(const col of ["orders", "split-orders", "transport-orders"]){
      try{
        const snap = await getDocs(query(
          collection(db, col),
          where("deliveryBoyId", "==", myEmail)
        ));
        snap.forEach(d=>{
          const o = d.data();
          o.__id = d.id;
          o.__col = col;
          allOrders.push(o);
        });
      }catch(e){ console.error(`Could not load ${col}:`, e); }
    }

    renderAll();
  }catch(err){
    console.error(err);
    showToast("Could not load analytics", true);
  }
}

function getFilteredOrders(){
  if(currentPeriod === "all") return allOrders.slice();
  const cutoff = new Date(Date.now() - currentPeriod * 86400000);
  return allOrders.filter(o=>{
    const t = o.time?.toDate ? o.time.toDate() : new Date(o.time);
    return t >= cutoff;
  });
}

function renderAll(){
  const filtered = getFilteredOrders();
  const delivered = filtered.filter(isDelivered);
  const cancelled = filtered.filter(isCancelled);

  /* Totals */
  const totalEarn = delivered.reduce((s,o)=> s + Number(o.deliveryEarning||0), 0);
  const avg = delivered.length ? totalEarn / delivered.length : 0;

  document.getElementById("heroEarning").textContent = "₹" + Math.round(totalEarn).toLocaleString("en-IN");
  document.getElementById("heroCount").textContent = delivered.length;
  document.getElementById("heroAvg").textContent = "₹" + Math.round(avg);

  /* Stats: per active hour, per day avg, completion rate */
  const perDayDays = currentPeriod === "all" ? 30 : currentPeriod;
  const perDay = (delivered.length / perDayDays).toFixed(1);
  const completion = (delivered.length + cancelled.length) > 0
    ? Math.round(delivered.length * 100 / (delivered.length + cancelled.length))
    : 100;

  /* Per active hour: estimate using order count × 0.5 hr per delivery */
  const estHours = delivered.length * 0.5;
  const perHour = estHours > 0 ? totalEarn / estHours : 0;

  setStat("stPerHour", "₹" + Math.round(perHour));
  setStat("stPerDay", perDay);
  setStat("stCompleted", completion + "%");

  renderDailyChart(delivered);
  renderWeekdayChart(delivered);
  renderPeakHours(delivered);
}

function setStat(id, val){
  const el = document.getElementById(id);
  el.classList.remove("loading");
  el.textContent = val;
}

function renderDailyChart(delivered){
  const days = currentPeriod === "all" ? 30 : Math.min(currentPeriod, 30);
  const buckets = new Array(days).fill(0);
  const today = new Date(); today.setHours(0,0,0,0);

  delivered.forEach(o=>{
    const t = o.time?.toDate ? o.time.toDate() : new Date(o.time);
    const d = new Date(t); d.setHours(0,0,0,0);
    const diff = Math.floor((today.getTime() - d.getTime()) / 86400000);
    if(diff >= 0 && diff < days){
      buckets[days - 1 - diff] += Number(o.deliveryEarning || 0);
    }
  });

  const max = Math.max(...buckets, 1);
  const c = document.getElementById("dailyChart");

  if(buckets.every(v=>v===0)){
    c.innerHTML = `<div class="empty"><span class="ic">📊</span>No earnings in this period yet</div>`;
    return;
  }

  let html = `<div class="dailyChart">`;
  buckets.forEach((v, i)=>{
    const h = max > 0 ? (v / max * 100) : 0;
    const isToday = i === days - 1;
    const dayDate = new Date(today.getTime() - (days-1-i)*86400000);
    const dayLbl = isToday ? "Today" : dayDate.getDate();
    html += `
      <div class="dailyBar">
        <div class="value">₹${Math.round(v)}</div>
        <div class="bar ${v===0?'empty':''}" style="height:${Math.max(h,2)}%;"></div>
        <div class="label">${dayLbl}</div>
      </div>`;
  });
  html += `</div>`;
  c.innerHTML = html;
}

function renderWeekdayChart(delivered){
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const buckets = new Array(7).fill(0);

  delivered.forEach(o=>{
    const t = o.time?.toDate ? o.time.toDate() : new Date(o.time);
    buckets[t.getDay()] += Number(o.deliveryEarning || 0);
  });

  const max = Math.max(...buckets, 1);
  const c = document.getElementById("weekdayChart");

  if(buckets.every(v=>v===0)){
    c.innerHTML = `<div class="empty"><span class="ic">📅</span>No data yet</div>`;
    return;
  }

  let html = `<div class="weekdayChart">`;
  buckets.forEach((v, i)=>{
    const h = (v / max * 100);
    html += `
      <div class="wkBar">
        <div class="barWrap">
          ${v > 0 ? `<div class="bar" style="height:${Math.max(h, 12)}%;">₹${v < 1000 ? Math.round(v) : Math.round(v/1000)+'k'}</div>` : ""}
        </div>
        <div class="lbl">${days[i]}</div>
      </div>`;
  });
  html += `</div>`;
  c.innerHTML = html;
}

function renderPeakHours(delivered){
  const buckets = new Array(24).fill(0);
  delivered.forEach(o=>{
    const t = o.time?.toDate ? o.time.toDate() : new Date(o.time);
    buckets[t.getHours()]++;
  });

  const max = Math.max(...buckets, 1);
  const c = document.getElementById("peakHoursChart");

  if(buckets.every(v=>v===0)){
    c.innerHTML = `<div class="empty"><span class="ic">⏰</span>No data yet</div>`;
    return;
  }

  /* Build SVG line chart */
  const W = 600, H = 100, padL = 0, padR = 0, padT = 8, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const points = buckets.map((v, i)=>{
    const x = padL + (i / 23) * innerW;
    const y = padT + innerH - (v / max) * innerH;
    return { x, y, v, h: i };
  });

  const pathD = points.map((p, i)=> (i===0?"M":"L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(padT+innerH).toFixed(1)} L${points[0].x.toFixed(1)},${(padT+innerH).toFixed(1)} Z`;
  const maxIdx = buckets.indexOf(max);

  let svgHtml = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:120px;">
      <defs>
        <linearGradient id="peakGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F0B91D" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#F0B91D" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" class="peakArea"></path>
      <path d="${pathD}" class="peakLine"></path>
  `;
  points.forEach((p, i)=>{
    if(p.v > 0){
      const cls = (i === maxIdx) ? "peakDot max" : "peakDot";
      svgHtml += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" class="${cls}"></circle>`;
    }
  });
  /* Hour labels every 4 hours */
  for(let h = 0; h < 24; h += 4){
    const x = padL + (h / 23) * innerW;
    const lbl = h === 0 ? "12a" : h === 12 ? "12p" : (h > 12 ? (h-12)+"p" : h+"a");
    svgHtml += `<text x="${x.toFixed(1)}" y="${(H-6).toFixed(1)}" class="hourLabel">${lbl}</text>`;
  }
  svgHtml += `</svg>`;
  c.innerHTML = svgHtml;
}
</script>

</body>
</html>
