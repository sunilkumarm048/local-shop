<!DOCTYPE html>
<html>
<head>

<title>Delivery Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>🚚 Delivery Partner Registration</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="phone" placeholder="Phone Number">

<input id="license" placeholder="Driving License Number">
<input id="bikeNo" placeholder="Bike Number">

<button onclick="register()">Register</button>

</div>

<script type="module">

import { auth, db } from "../js/firebase.js";

import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 📍 GET LOCATION
function getLocation(){
return new Promise((resolve)=>{
navigator.geolocation.getCurrentPosition(pos=>{
resolve({
lat: pos.coords.latitude,
lng: pos.coords.longitude
});
},()=>{
resolve({lat:null,lng:null});
});
});
}

// 🚀 REGISTER
window.register = async function(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();
let phone = document.getElementById("phone").value.trim();
let license = document.getElementById("license").value.trim();
let bikeNo = document.getElementById("bikeNo").value.trim();

if(!name || !email || !password || !phone || !license || !bikeNo){
alert("⚠️ Fill all details");
return;
}

try{

// 🔐 CREATE USER
await createUserWithEmailAndPassword(auth,email,password);

// 📍 LOCATION
const location = await getLocation();

// 💾 SAVE DELIVERY DATA
await setDoc(doc(db,"delivery",email),{

name,
email,
phone,

licenseNumber: license,
bikeNumber: bikeNo,

lat: location.lat,
lng: location.lng,

available: true,
verified: true, // skip approval for now

createdAt: new Date()

});

alert("✅ Registered successfully");

// 🔄 REDIRECT TO LOGIN
window.location.href = "login.html";

}catch(e){
alert("❌ " + e.message);
}

};

</script>

</body>
</html>
