<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const newOrderDiv = document.getElementById("newOrder");

let notifySound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let lastStatus = "";

// 📍 LOCATION TRACK
function startLiveLocation(){
navigator.geolocation.watchPosition((pos)=>{
window.myLat=pos.coords.latitude;
window.myLng=pos.coords.longitude;
});
}

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

// ⏱ ETA
function calculateETA(distanceKm){
let speed = 30;
return Math.round((distanceKm / speed) * 60);
}

// 🔐 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

startLiveLocation();

// 🔥 LISTEN BOTH COLLECTIONS
listenOrders("orders");
listenOrders("split-orders");

function listenOrders(colName){

onSnapshot(collection(db,colName),(snapshot)=>{

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ✅ ONLY READY ORDERS
if(order.deliveryStatus !== "Ready") return;

// 🔔 SOUND
if(order.deliveryStatus !== lastStatus){
notifySound.play();
lastStatus = order.deliveryStatus;
}

// 📏 DISTANCE
let dist = 0;
if(window.myLat){
dist = getDistance(
window.myLat, window.myLng,
order.customerLat, order.customerLng
);
}

let eta = calculateETA(dist);

// 🆕 SHOW NEW ORDER
newOrderDiv.innerHTML=`
<h3>🆕 New Order (${colName})</h3>

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

📏 ${dist.toFixed(2)} km<br>
⏱ ETA: ${eta} mins<br><br>

💰 ₹${order.total}<br><br>

<button class="accept" onclick="acceptOrder('${id}','${colName}')">Accept</button>
<button class="reject" onclick="rejectOrder('${id}','${colName}')">Reject</button>
`;

});

// 🔄 SHOW ACTIVE ORDERS
onSnapshot(collection(db,colName),(snapshot2)=>{

snapshot2.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// 👇 ONLY MY ORDERS
if(order.deliveryBoyId !== user.email) return;

// UI
ordersDiv.innerHTML+=`
<div class="order">

<b>${order.name}</b> (${colName})<br>
📍 ${order.address}<br>
💰 ₹${order.total}<br><br>

<button class="start" onclick="startDelivery('${id}','${colName}')">Start</button>
<button class="complete" onclick="complete('${id}','${colName}')">Delivered</button>

<button onclick="openNavigation(${order.customerLat},${order.customerLng})">
🧭 Navigate
</button>

<div id="map_${id}" class="map"></div>

</div>
`;

setTimeout(()=>{
let map=L.map(`map_${id}`).setView(
[order.customerLat,order.customerLng],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([order.customerLat,order.customerLng]).addTo(map);

if(window.myLat){
L.marker([window.myLat,window.myLng]).addTo(map);
}

},100);

});

});

});

}

});

// ✅ ACCEPT
window.acceptOrder = async(id,col)=>{
await updateDoc(doc(db,col,id),{
deliveryBoyId: auth.currentUser.email,
deliveryStatus:"Accepted"
});
};

// ❌ REJECT
window.rejectOrder = async(id,col)=>{
await updateDoc(doc(db,col,id),{
deliveryBoyId:null,
deliveryStatus:"Ready"
});
};

// 🚚 START
window.startDelivery = async(id,col)=>{
await updateDoc(doc(db,col,id),{
deliveryStatus:"On the way"
});
};

// ✅ COMPLETE
window.complete = async(id,col)=>{
await updateDoc(doc(db,col,id),{
deliveryStatus:"Delivered",
status:"Delivered"
});
alert("✅ Delivered");
};

</script>
