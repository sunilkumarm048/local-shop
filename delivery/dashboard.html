<!DOCTYPE html>
<html>
<head>

<title>Delivery App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.start{background:orange;}
.complete{background:blue;}
.mapBtn{background:black;}

.status{
font-weight:bold;
margin-top:5px;
}

.distance{
color:#555;
font-size:14px;
margin:5px 0;
}

</style>

</head>

<body>

<div class="header">🚚 Delivery Dashboard</div>

<div class="container" id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

let deliveryLat = null;
let deliveryLng = null;
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// 📏 DISTANCE CALCULATION (REAL)
function getDistance(lat1, lon1, lat2, lon2) {
const R = 6371;
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return (R * c).toFixed(2);
}

// 📍 LIVE LOCATION
function startLiveLocation(){

navigator.geolocation.watchPosition(async(pos)=>{

deliveryLat = pos.coords.latitude;
deliveryLng = pos.coords.longitude;

// 🔥 UPDATE DELIVERY LOCATION
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
lat: deliveryLat,
lng: deliveryLng
});

},()=>{},{
enableHighAccuracy:true
});

}

// 🔐 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

startLiveLocation();

// 📦 LISTEN ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ REMOVE COMPLETED
if(order.deliveryStatus === "Delivered") return;

// 🔥 SHOW IF ASSIGNED OR AVAILABLE
if(order.deliveryBoy === user.email || (!order.deliveryBoy && order.status==="Ready")){

// 🔔 NEW ORDER SOUND
if(!order.deliveryBoy){
audio.play();
}

let items = "";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

// 📍 DISTANCE
let distance = "Calculating...";
if(deliveryLat && order.customerLat){
distance = getDistance(
deliveryLat,
deliveryLng,
order.customerLat,
order.customerLng
) + " km";
}

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>

<div class="distance">📏 Distance: ${distance}</div>

${items}

💰 ₹${order.total}<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="start" onclick="startDelivery('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>
<button class="mapBtn" onclick="openMap(${order.customerLat},${order.customerLng})">📍 Navigate</button>

</div>
`;

}

});

});

});

// ✅ ACCEPT ORDER
window.accept = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryBoy: auth.currentUser.email,
deliveryStatus:"Accepted"
});

// 🔒 SET BUSY
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:false
});

};

// 🚚 START DELIVERY
window.startDelivery = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"On the way"
});

};

// ✅ COMPLETE DELIVERY
window.complete = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered"
});

// 🔓 FREE DELIVERY BOY
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:true
});

alert("✅ Delivery Completed");

};

// 🗺 GOOGLE MAP
window.openMap = (lat,lng)=>{
window.open(`https://www.google.com/maps?q=${lat},${lng}`);
};

</script>

</body>
</html>
