<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:#ff5a5f;color:white;padding:15px;text-align:center;
font-size:18px;font-weight:bold;
}

.container{padding:15px;}

.order{
background:white;padding:15px;margin-bottom:15px;
border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
margin:5px;padding:8px 12px;border:none;
border-radius:5px;color:white;cursor:pointer;
}

.accept{background:green;}
.reject{background:red;}
.start{background:orange;}
.complete{background:blue;}

.status{font-weight:bold;margin-top:5px;}

.map{height:200px;margin-top:10px;border-radius:10px;}

/* 🔔 POPUP */
.popup{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:280px;
z-index:9999;
}
</style>

</head>

<body>

<div class="header">🚚 Smart Delivery Dashboard</div>

<div class="container" id="orders"></div>

<div id="popupContainer"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 📍 DISTANCE FUNCTION
function getDistance(lat1, lon1, lat2, lon2){
let R = 6371;
let dLat = (lat2-lat1)*Math.PI/180;
let dLon = (lon2-lon1)*Math.PI/180;

let a =
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return (R*c).toFixed(2);
}

// 📍 LIVE LOCATION
function startLiveLocation(){
navigator.geolocation.watchPosition((pos)=>{
window.myLat = pos.coords.latitude;
window.myLng = pos.coords.longitude;
},{enableHighAccuracy:true});
}

// 🔔 SHOW NOTIFICATION
function showPopup(order,id){

let shopDist = getDistance(window.myLat,window.myLng,order.shopLat,order.shopLng);
let custDist = getDistance(order.shopLat,order.shopLng,order.customerLat,order.customerLng);
let totalDist = (parseFloat(shopDist)+parseFloat(custDist)).toFixed(2);

let popup = document.createElement("div");
popup.className = "popup";

popup.innerHTML = `
<b>🆕 New Order</b><br><br>
📍 Shop Distance: ${shopDist} km<br>
📍 Customer Distance: ${custDist} km<br>
📍 Total: ${totalDist} km<br><br>
💰 Price: ₹${order.total}<br><br>

<button class="accept" onclick="acceptOrder('${id}')">Accept</button>
<button class="reject" onclick="rejectOrder('${id}')">Reject</button>
`;

document.getElementById("popupContainer").appendChild(popup);

// auto remove after 10 sec
setTimeout(()=>popup.remove(),10000);
}

// 🔐 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

startLiveLocation();

// 🔄 ORDERS LISTENER
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// 🔔 SHOW POPUP ONLY NEW ASSIGNED
if(order.deliveryBoy === user.email && order.deliveryStatus === "Assigned"){
showPopup(order,id);
}

// SHOW CARD
if(order.deliveryBoy === user.email){

let shopDist = getDistance(window.myLat,window.myLng,order.shopLat,order.shopLng);
let custDist = getDistance(order.shopLat,order.shopLng,order.customerLat,order.customerLng);

ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

💰 ₹${order.total}<br>
📍 Shop: ${shopDist} km<br>
📍 Customer: ${custDist} km<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="acceptOrder('${id}')">Accept</button>
<button class="reject" onclick="rejectOrder('${id}')">Reject</button>
<button class="start" onclick="startDelivery('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>

<div id="map_${id}" class="map"></div>

</div>
`;

setTimeout(()=>{
let map = L.map(`map_${id}`).setView(
[order.customerLat, order.customerLng], 13
);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([order.customerLat, order.customerLng]).addTo(map);
if(window.myLat){
L.marker([window.myLat, window.myLng]).addTo(map);
}

},100);

}

});

});

});

// ✅ ACTIONS
window.acceptOrder = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Accepted"
});
};

window.rejectOrder = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryBoy:null,
deliveryStatus:"Pending"
});
};

window.startDelivery = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"On the way"
});
};

window.complete = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered"
});
alert("✅ Delivered");
};

</script>

</body>
</html>
