<!DOCTYPE html>
<html>
<head>

<title>Delivery App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.start{background:orange;}
.complete{background:blue;}

.mapBtn{
background:black;
}

.status{
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<div class="header">🚚 Delivery App</div>

<div class="container" id="orders"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 📍 LIVE LOCATION UPDATE
function startLiveLocation(){

navigator.geolocation.watchPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

// 🔥 UPDATE DELIVERY LOCATION
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
lat,
lng
});

console.log("Live:",lat,lng);

},
(err)=>{
console.log(err);
},
{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});

}

// 🔥 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

startLiveLocation();

// 📦 ORDERS LIST
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ONLY SHOW ASSIGNED ORDERS
if(order.deliveryBoy === user.email){

// ❌ REMOVE DELIVERED
if(order.deliveryStatus === "Delivered") return;

let items = "";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

${items}

💰 ₹${order.total}<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="start" onclick="startDelivery('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>
<button class="mapBtn" onclick="openMap(${order.customerLat},${order.customerLng})">📍 Map</button>

</div>
`;

}

});

});

});

// ✅ ACCEPT DELIVERY
window.accept = async (id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Accepted"
});
};

// 🚚 START DELIVERY
window.startDelivery = async (id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"On the way"
});
};

// ✅ COMPLETE DELIVERY
window.complete = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered"
});

// 🔓 FREE DELIVERY BOY
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:true
});

alert("✅ Delivered");

};

// 🗺 OPEN GOOGLE MAP
window.openMap = (lat,lng)=>{
window.open(`https://www.google.com/maps?q=${lat},${lng}`);
};

</script>

</body>
</html>
