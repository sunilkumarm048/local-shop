<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.busy{
color:red;
font-weight:bold;
margin-bottom:10px;
}
</style>

</head>

<body>

<h2>📦 Available Orders</h2>

<p id="busyStatus" class="busy"></p>

<div id="orders"></div>

<script type="module">

import { db } from "../js/firebase.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc, 
getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const div = document.getElementById("orders");
const busyStatus = document.getElementById("busyStatus");

let activeOrder = null;

// 🔥 CHECK ACTIVE DELIVERY (SMART CHECK)
async function checkActiveOrder(){

let saved = localStorage.getItem("activeDeliveryOrder");

if(!saved){
activeOrder = null;
return;
}

try{

const snap = await getDoc(doc(db,"orders",saved));

if(!snap.exists()){
localStorage.removeItem("activeDeliveryOrder");
activeOrder = null;
return;
}

let data = snap.data();

// ❌ REMOVE IF DELIVERED / COMPLETED
if(data.status === "Delivered" || data.deliveryStatus === "Completed"){
localStorage.removeItem("activeDeliveryOrder");
activeOrder = null;
return;
}

// ✅ VALID ACTIVE ORDER
activeOrder = saved;
busyStatus.innerHTML = "🚚 You already have an active delivery!";

}catch(e){
console.error("Check error:", e);
activeOrder = null;
}

}

// 🔥 LOAD ORDERS AFTER CHECK
await checkActiveOrder();

onSnapshot(collection(db,"orders"),(snapshot)=>{

div.innerHTML="";

snapshot.forEach(docSnap=>{

let o = docSnap.data();
let id = docSnap.id;

// ONLY SHOW READY + NOT ASSIGNED
if(o.status === "Ready" && !o.deliveryBoy){

let disabled = activeOrder ? "disabled" : "";

div.innerHTML += `
<div class="order">

<b>${o.name}</b><br>
📞 ${o.phone}<br>
📍 ${o.address}<br>
💰 ₹${o.total}<br><br>

<button ${disabled} onclick="acceptDelivery('${id}')">
Accept Delivery
</button>

</div>
`;

}

});

});

// 🚀 ACCEPT DELIVERY
window.acceptDelivery = async(id)=>{

if(activeOrder){
alert("⚠️ Finish current delivery first");
return;
}

try{

let deliveryName = "sonu"; // later dynamic

await updateDoc(doc(db,"orders",id),{
deliveryBoy: deliveryName,
deliveryStatus: "Assigned",
status: "Out for Delivery"
});

// 💾 SAVE ACTIVE ORDER
localStorage.setItem("activeDeliveryOrder", id);

alert("🚚 Delivery Assigned!");

// 🚀 GO TO TRACKING
window.location.href = "delivery-tracking.html";

}catch(e){
console.error(e);
alert("Error assigning delivery");
}

};

</script>

</body>
</html>
