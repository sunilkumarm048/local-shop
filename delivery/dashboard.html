<!DOCTYPE html>
<html>
<head>

<title>Delivery App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-around;
padding:10px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.topbar button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#ff5a5f;
color:white;
cursor:pointer;
}

.container{
padding:15px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.start{background:orange;}
.complete{background:blue;}
.mapBtn{background:black;}

.status{
font-weight:bold;
margin-top:5px;
}

.distance{
color:#555;
font-size:14px;
margin:5px 0;
}

</style>

</head>

<body>

<div class="header">🚚 Delivery Dashboard</div>

<!-- TOP NAV -->
<div class="topbar">
<button onclick="goWallet()">💰 Wallet</button>
<button onclick="goAnalytics()">📊 Analytics</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div class="container" id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { 
onAuthStateChanged, 
signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
collection, 
onSnapshot, 
doc, 
updateDoc,
getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

let deliveryLat = null;
let deliveryLng = null;
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return (R*c).toFixed(2);
}

// 📍 LIVE LOCATION
function startLiveLocation(){

navigator.geolocation.watchPosition(async(pos)=>{

deliveryLat = pos.coords.latitude;
deliveryLng = pos.coords.longitude;

await updateDoc(doc(db,"delivery",auth.currentUser.email),{
lat: deliveryLat,
lng: deliveryLng
});

},{},{
enableHighAccuracy:true
});

}

// 🔐 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

startLiveLocation();

// 📦 ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ HIDE DELIVERED
if(order.deliveryStatus === "Delivered") return;

// SHOW AVAILABLE + ASSIGNED
if(order.deliveryBoy === user.email || (!order.deliveryBoy && order.status==="Ready")){

// 🔔 SOUND
if(!order.deliveryBoy){
audio.play();
}

let items = "";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

// 📍 DISTANCE
let distance = "Calculating...";
if(deliveryLat && order.lat){
distance = getDistance(deliveryLat,deliveryLng,order.lat,order.lng) + " km";
}

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>

<div class="distance">📏 ${distance}</div>

${items}

💰 ₹${order.total}<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="start" onclick="startDelivery('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>
<button class="mapBtn" onclick="openMap(${order.lat},${order.lng})">📍 Navigate</button>

</div>
`;

}

});

});

});

// ✅ ACCEPT
window.accept = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryBoy: auth.currentUser.email,
deliveryStatus:"Accepted"
});

await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:false
});

};

// 🚚 START
window.startDelivery = async (id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"On the way"
});
};

// ✅ COMPLETE + EARNING
window.complete = async (id)=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);
const order = snap.data();

// COMPLETE
await updateDoc(ref,{
deliveryStatus:"Delivered"
});

// 💰 ADD EARNING
const deliveryRef = doc(db,"delivery",auth.currentUser.email);
const deliverySnap = await getDoc(deliveryRef);

let current = deliverySnap.data().earnings || 0;

await updateDoc(deliveryRef,{
earnings: current + (order.deliveryEarning || 0),
available:true
});

alert("✅ Delivered + Earnings Added");

};

// 🗺 MAP
window.openMap = (lat,lng)=>{
window.open(`https://www.google.com/maps?q=${lat},${lng}`);
};

// 🔀 NAV
window.goWallet = ()=> location.href="wallet.html";
window.goAnalytics = ()=> location.href="analytics.html";

// 🚪 LOGOUT
window.logout = ()=>{
signOut(auth);
location.href="login.html";
};

</script>

</body>
</html>
