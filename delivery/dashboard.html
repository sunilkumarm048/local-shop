<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.complete{background:blue;}

</style>

</head>

<body>

<h2>🚚 Delivery Dashboard</h2>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 📍 LIVE LOCATION UPDATE
function startLocationUpdate(){

navigator.geolocation.watchPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

await updateDoc(doc(db,"delivery",auth.currentUser.email),{
lat,
lng,
available:false
});

});

}

// 🔥 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login first");
location.href="login.html";
return;
}

startLocationUpdate();

// 📦 ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// SHOW ONLY ASSIGNED DELIVERY
if(order.deliveryBoy === user.email){

let items = "";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

${items}

Total: ₹${order.total}<br>

<button class="complete" onclick="complete('${id}')">Delivered</button>

</div>
`;

}

});

});

});

// ✅ COMPLETE DELIVERY
window.complete = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered"
});

// 🔓 MAKE DELIVERY BOY FREE AGAIN
await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:true
});

alert("✅ Delivered successfully");

};

</script>

</body>
</html>
