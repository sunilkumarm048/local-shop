<!DOCTYPE html>
<html>
<head>

<title>Delivery App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{font-family:Arial;background:#f5f5f5;margin:0;}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.container{padding:10px;}

.order{
background:white;
padding:12px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.map{
height:200px;
border-radius:10px;
margin-top:10px;
}

button{
margin:5px;
padding:8px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.start{background:orange;}
.complete{background:blue;}
.mapBtn{background:black;}

.status{font-weight:bold;}

</style>

</head>

<body>

<div class="header">🚚 Smart Delivery Dashboard</div>

<div class="container" id="orders"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { 
onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
collection, 
onSnapshot, 
doc, 
updateDoc,
getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

let maps = {}; // store map instances

// 🔐 AUTH
onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

// 📦 ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML="";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ HIDE DONE
if(order.deliveryStatus === "Completed") return;

// SHOW AVAILABLE + ASSIGNED
if(order.deliveryBoy === user.email || (!order.deliveryBoy && order.status==="Accepted")){

let items="";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>

${items}

💰 ₹${order.total}<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="start" onclick="startTracking('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>

<div id="map_${id}" class="map"></div>

</div>
`;

setTimeout(()=>initMap(id,order),100);

}

});

});

});

// 🗺 INIT MAP
function initMap(id,order){

if(maps[id]) return;

let map = L.map(`map_${id}`).setView([20.2961,85.8245],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

maps[id] = {
map,
deliveryMarker:null,
shopMarker:null,
customerMarker:null,
route:null
};

// SHOP
if(order.shopLat){
maps[id].shopMarker = L.marker([order.shopLat,order.shopLng])
.addTo(map).bindPopup("🏪 Shop");
}

// CUSTOMER
if(order.customerLat){
maps[id].customerMarker = L.marker([order.customerLat,order.customerLng])
.addTo(map).bindPopup("👤 Customer");
}

}

// ▶ START TRACKING
window.startTracking = function(id){

navigator.geolocation.watchPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

let m = maps[id];

if(!m) return;

// DELIVERY MARKER
if(!m.deliveryMarker){
m.deliveryMarker = L.marker([lat,lng])
.addTo(m.map).bindPopup("🚚 You");
}else{
m.deliveryMarker.setLatLng([lat,lng]);
}

m.map.panTo([lat,lng]);

// 🔥 SAVE LOCATION
await updateDoc(doc(db,"orders",id),{
deliveryLat: lat,
deliveryLng: lng,
deliveryStatus:"On the way"
});

},()=>{},{
enableHighAccuracy:true
});

};

// ✅ ACCEPT
window.accept = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryBoy: auth.currentUser.email,
deliveryStatus:"Accepted"
});

};

// ✅ COMPLETE
window.complete = async (id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Completed",
status:"Delivered"
});

alert("🎉 Delivered");

};

</script>

</body>
</html>
