<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.busy{
color:red;
font-weight:bold;
margin-bottom:10px;
}
</style>

</head>

<body>

<h2>📦 Available Orders</h2>

<p id="busyStatus"></p>

<div id="orders"></div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const div = document.getElementById("orders");
const busyStatus = document.getElementById("busyStatus");

// 🚨 CHECK ACTIVE DELIVERY
let activeOrder = localStorage.getItem("activeDeliveryOrder");

if(activeOrder){
busyStatus.innerHTML = "🚚 You already have an active delivery!";
}

// LOAD ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

div.innerHTML="";

snapshot.forEach(docSnap=>{

let o = docSnap.data();
let id = docSnap.id;

// ONLY SHOW READY + NOT ASSIGNED
if(o.status === "Ready" && !o.deliveryBoy){

// 🚫 IF BUSY → DISABLE BUTTON
let disabled = activeOrder ? "disabled" : "";

div.innerHTML += `
<div class="order">

<b>${o.name}</b><br>
📞 ${o.phone}<br>
📍 ${o.address}<br>
💰 ₹${o.total}<br><br>

<button ${disabled} onclick="acceptDelivery('${id}')">
Accept Delivery
</button>

</div>
`;

}

});

});

// 🚀 ACCEPT DELIVERY
window.acceptDelivery = async(id)=>{

// 🚫 BLOCK IF ALREADY BUSY
if(localStorage.getItem("activeDeliveryOrder")){
alert("⚠️ Finish current delivery first");
return;
}

try{

// AUTO NAME (later replace with login user)
let deliveryName = "sonu";

// 🔥 UPDATE ORDER
await updateDoc(doc(db,"orders",id),{
deliveryBoy: deliveryName,
deliveryStatus: "Assigned",
status: "Out for Delivery"
});

// 💾 SAVE ACTIVE ORDER
localStorage.setItem("activeDeliveryOrder", id);

alert("🚚 Delivery Assigned!");

// 🚀 REDIRECT TO TRACKING
window.location.href = "delivery-tracking.html";

}catch(e){
console.error(e);
alert("Error assigning delivery");
}

};

</script>

</body>
</html>
