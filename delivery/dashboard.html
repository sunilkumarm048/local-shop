<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#222;
color:white;
padding:20px;
transition:0.3s;
z-index:999;
}

#sidebar button{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* MENU BUTTON */
.menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:1000;
}

/* CONTAINER */
.container{
padding:15px;
}

/* ORDER CARD */
.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* BUTTONS */
button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.start{background:orange;}
.complete{background:blue;}
.mapBtn{background:black;}

.status{
font-weight:bold;
margin-top:5px;
}

.map{
height:200px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- MENU BUTTON -->
<div class="menuBtn">
<button onclick="toggleMenu()">☰</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

<h3>🚚 Delivery Panel</h3>

<button onclick="goWallet()">💰 Wallet</button>
<button onclick="goAnalytics()">📊 Analytics</button>
<button onclick="logout()" style="background:red;">🚪 Logout</button>

</div>

<!-- HEADER -->
<div class="header">
🚚 Smart Delivery Dashboard
</div>

<!-- ORDERS -->
<div class="container" id="orders"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { 
onAuthStateChanged, 
signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
collection, 
onSnapshot, 
doc, 
updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

/* SIDEBAR */
window.toggleMenu = function(){
let menu = document.getElementById("sidebar");
menu.style.left = (menu.style.left === "0px") ? "-250px" : "0px";
};

window.goWallet = ()=>location.href="wallet.html";
window.goAnalytics = ()=>location.href="analytics.html";

window.logout = ()=>{
signOut(auth);
location.href="login.html";
};

/* LIVE LOCATION */
function startLiveLocation(){

navigator.geolocation.watchPosition(async(pos)=>{

await updateDoc(doc(db,"delivery",auth.currentUser.email),{
lat: pos.coords.latitude,
lng: pos.coords.longitude
});

},{enableHighAccuracy:true});

}

/* AUTH */
onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

startLiveLocation();

/* ORDERS */
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

/* SHOW ONLY ASSIGNED */
if(order.deliveryBoy === user.email){

/* REMOVE DELIVERED */
if(order.deliveryStatus === "Delivered") return;

/* ITEMS */
let items = "";
order.items.forEach(i=>{
items += `${i.name} x${i.qty}<br>`;
});

/* UI */
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

${items}

💰 ₹${order.total}<br>

<div class="status">Status: ${order.deliveryStatus}</div>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="start" onclick="startDelivery('${id}')">Start</button>
<button class="complete" onclick="complete('${id}')">Delivered</button>

<div id="map_${id}" class="map"></div>

</div>
`;

/* LOAD MAP */
setTimeout(()=>{
let map = L.map(`map_${id}`).setView(
[order.customerLat, order.customerLng], 13
);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

L.marker([order.customerLat, order.customerLng])
.addTo(map)
.bindPopup("Customer");

},100);

}

});

});

});

/* ACTIONS */
window.accept = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Accepted"
});
};

window.startDelivery = async(id)=>{
await updateDoc(doc(db,"orders",id),{
deliveryStatus:"On the way"
});
};

window.complete = async(id)=>{

await updateDoc(doc(db,"orders",id),{
deliveryStatus:"Delivered"
});

await updateDoc(doc(db,"delivery",auth.currentUser.email),{
available:true
});

alert("✅ Delivered");

};

</script>

</body>
</html>
