<!DOCTYPE html>
<html>
<head>

<title>Delivery Dashboard</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>📦 Available Orders</h2>

<div id="orders"></div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const div = document.getElementById("orders");

// LOAD AVAILABLE ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

div.innerHTML="";

snapshot.forEach(docSnap=>{

let o = docSnap.data();
let id = docSnap.id;

// ONLY SHOW READY ORDERS (shop prepared)
if(o.status === "Ready" && !o.deliveryBoy){

div.innerHTML += `
<div class="order">

<b>${o.name}</b><br>
📞 ${o.phone}<br>
📍 ${o.address}<br>
💰 ₹${o.total}<br><br>

<button onclick="acceptDelivery('${id}')">
Accept Delivery
</button>

</div>
`;

}

});

});

// ACCEPT DELIVERY
window.acceptDelivery = async(id)=>{

let deliveryName = prompt("Enter your name");

await updateDoc(doc(db,"orders",id),{
deliveryBoy: deliveryName,
deliveryStatus: "Assigned",
status: "Out for Delivery"
});

alert("Order assigned!");

};

</script>

</body>
</html>
