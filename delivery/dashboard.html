<!DOCTYPE html>
<html>
<head>
<title>Shop Dashboard</title>

<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding:20px;}

button{
display:block;
width:250px;
margin:10px auto;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🏪 Shop Dashboard</h2>

<button onclick="goOrders()">📦 Active Orders</button>
<button onclick="goTracking()">🗺 Delivery Tracking</button>
<button onclick="goHistory()">📊 Order History</button>
<button onclick="logout()">🚪 Logout</button>

<script>

if(!localStorage.getItem("shopEmail")){
alert("Login first");
location.href="login.html";
}

function goOrders(){
location.href="order-status.html";
}

function goTracking(){
location.href="delivery-tracking.html";
}

function goHistory(){
location.href="order-history.html";
}

function logout(){
localStorage.clear();
location.href="login.html";
}

</script>

</body>
</html>
