<!DOCTYPE html>
<html>
<head>

<title>Delivery Tracking</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:30px;
}

input{
padding:10px;
width:250px;
}

button{
padding:12px 20px;
font-size:16px;
margin:5px;
cursor:pointer;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🚚 Delivery GPS Tracker</h2>

<input id="orderId" placeholder="Enter Order ID"><br><br>

<button onclick="startTracking()">▶ Start Tracking</button>
<button onclick="stopTracking()">⏹ Stop</button>
<button onclick="markDelivered()">✅ Delivered</button>

<p id="status">Waiting...</p>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let watchId = null;

// ▶ START TRACKING
window.startTracking = function(){

const orderId = document.getElementById("orderId").value;

if(!orderId){
alert("Enter Order ID");
return;
}

document.getElementById("status").innerText = "📡 Tracking started...";

console.log("START tracking for:", orderId);

// START GPS WATCH
watchId = navigator.geolocation.watchPosition(async(position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

console.log("GPS:", lat, lng);

try{

await updateDoc(doc(db,"orders",orderId),{

deliveryLat: lat,
deliveryLng: lng,
status: "Out for Delivery",
deliveryBoy: "Rider 1" // you can make dynamic later

});

document.getElementById("status").innerText = 
"🚚 Live: " + lat.toFixed(5) + ", " + lng.toFixed(5);

}catch(e){
console.error("Firestore error:", e);
}

},(err)=>{

console.error("GPS error:", err);
alert("❌ GPS error. Allow location permission.");

},{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});

};

// ⏹ STOP TRACKING
window.stopTracking = function(){

if(watchId !== null){
navigator.geolocation.clearWatch(watchId);
watchId = null;
document.getElementById("status").innerText = "⏹ Tracking stopped";
console.log("Tracking stopped");
}

};

// ✅ MARK DELIVERED
window.markDelivered = async function(){

const orderId = document.getElementById("orderId").value;

if(!orderId){
alert("Enter Order ID");
return;
}

try{

await updateDoc(doc(db,"orders",orderId),{
status: "Delivered"
});

document.getElementById("status").innerText = "🎉 Order Delivered";

}catch(e){
console.error(e);
alert("Error updating status");
}

};

</script>

</body>
</html>
