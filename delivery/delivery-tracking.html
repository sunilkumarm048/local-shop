<!DOCTYPE html>
<html>
<head>

<title>Delivery Tracking</title>

<style>
body{
font-family:Arial;
text-align:center;
padding:30px;
}
button{
padding:12px 20px;
margin:5px;
}
</style>

</head>

<body>

<h2>🚚 Delivery Navigation</h2>

<p id="info">Loading...</p>

<button onclick="startTracking()">▶ Start Delivery</button>
<button onclick="markPicked()">📦 Picked from Shop</button>
<button onclick="markDelivered()">✅ Delivered</button>

<p id="status"></p>

<script type="module">

import { db } from "../js/firebase.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let watchId;
let orderId = localStorage.getItem("activeDeliveryOrder");

if(!orderId){
document.getElementById("info").innerText = "❌ No active order";
}else{
document.getElementById("info").innerText = "Order: " + orderId;
}

let orderData = null;

// 🔥 LOAD ORDER DATA
async function loadOrder(){

const snap = await getDoc(doc(db,"orders",orderId));

orderData = snap.data();

console.log("ORDER:", orderData);

}

loadOrder();

// ▶ START GPS TRACKING
window.startTracking = function(){

if(!orderId){
alert("No order");
return;
}

watchId = navigator.geolocation.watchPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

// 🔥 SEND LOCATION
await updateDoc(doc(db,"orders",orderId),{
deliveryLat: lat,
deliveryLng: lng
});

document.getElementById("status").innerText =
"🚚 Moving: " + lat.toFixed(5) + "," + lng.toFixed(5);

},{
enableHighAccuracy:true
});

};

// 📦 PICKED FROM SHOP
window.markPicked = async function(){

await updateDoc(doc(db,"orders",orderId),{
deliveryStatus: "Picked",
status: "Out for Delivery"
});

alert("📦 Picked from shop");

};

// ✅ DELIVERED
window.markDelivered = async function(){

await updateDoc(doc(db,"orders",orderId),{
status: "Delivered",
deliveryStatus: "Completed"
});

alert("🎉 Delivered");

// CLEAR ORDER
localStorage.removeItem("activeDeliveryOrder");

};

</script>

</body>
</html>
