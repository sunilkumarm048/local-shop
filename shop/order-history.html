<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order History · Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:30px;}
button{font-family:inherit;cursor:pointer;border:none;}

.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.4);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}

.titleBlock{flex:1;min-width:0;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#1f1f1f;}
.pageSub{font-size:12px;color:#3a3a3a;margin-top:2px;}

.searchWrap{margin:12px auto 0;max-width:1100px;position:relative;}
.searchWrap input{
  width:100%;padding:11px 14px 11px 38px;
  border-radius:10px;border:1px solid rgba(0,0,0,.08);
  font-size:13px;background:#fff;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.searchWrap input:focus{border-color:#0C831F;}
.searchIcon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:#666;}

.tabs{
  display:flex;gap:8px;
  padding:12px 12px 4px;max-width:1100px;margin:0 auto;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}

.tab{
  padding:8px 14px;
  background:#fff;border:1px solid #e5e5e5;border-radius:22px;
  font-size:12px;font-weight:600;color:#444;
  white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.tab.active{background:#0C831F;color:#fff;border-color:#0C831F;}
.tabCount{
  background:rgba(0,0,0,.08);color:inherit;
  padding:1px 7px;border-radius:10px;
  font-size:10px;font-weight:700;
}
.tab.active .tabCount{background:rgba(255,255,255,.25);color:#fff;}

.container{max-width:1100px;margin:0 auto;padding:6px 12px 0;}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.summaryCard{
  background:#fff;border-radius:12px;padding:12px 10px;text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.summaryValue{font-size:16px;font-weight:800;color:#1f1f1f;line-height:1.1;}
.summaryLabel{
  font-size:10px;color:#666;font-weight:500;
  margin-top:4px;letter-spacing:.2px;text-transform:uppercase;
}
.summaryValue.loading{
  display:inline-block;width:50px;height:14px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:4px;vertical-align:middle;
}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

.dateHeader{
  font-size:11px;font-weight:700;color:#666;letter-spacing:.4px;
  text-transform:uppercase;margin:14px 4px 8px;
  display:flex;align-items:center;gap:8px;
}
.dateHeader::before{content:"";width:3px;height:12px;background:#0C831F;border-radius:2px;}

.orderCard{
  background:#fff;border-radius:14px;
  margin-bottom:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;border:1px solid #ececec;
  cursor:pointer;transition:box-shadow .15s;
}
.orderCard:hover{box-shadow:0 3px 10px rgba(0,0,0,.06);}

.cardTop{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid #f4f4f4;background:#fafafa;gap:10px;
}
.cardLeft{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.orderNum{font-size:13px;font-weight:800;color:#1f1f1f;letter-spacing:.3px;font-family:monospace;}
.timeAgo{font-size:11px;color:#888;font-weight:500;}

.statusPill{
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;
}
.pill-delivered{background:#dcf3e1;color:#0C831F;}
.pill-rejected{background:#fde0e0;color:#c41818;}
.pill-cancelled{background:#f0f0f0;color:#888;}

.custStrip{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f4f4f4;}
.custAvatar{
  width:36px;height:36px;border-radius:50%;background:#fff5d6;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#8a6500;flex-shrink:0;
}
.custInfo{flex:1;min-width:0;line-height:1.3;}
.custName{
  font-size:13px;font-weight:700;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.custMeta{
  font-size:11px;color:#666;margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:1;
  -webkit-box-orient:vertical;overflow:hidden;
}

.cardFoot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;font-size:12px;color:#666;
}
.itemsCount{display:flex;align-items:center;gap:5px;font-weight:600;}
.foot-amount{font-size:15px;font-weight:800;color:#0C831F;}
.foot-amount .label{
  font-size:10px;font-weight:600;color:#888;
  text-transform:uppercase;letter-spacing:.3px;margin-right:4px;
}

.itemsExpanded{
  display:none;padding:0 14px 12px;
  border-top:1px solid #f4f4f4;background:#fafafa;
}
.orderCard.expanded .itemsExpanded{display:block;}
.orderCard.expanded .cardFoot{border-bottom:1px solid #f4f4f4;}

.itemRow{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;font-size:12px;
  border-bottom:1px dashed #ececec;
}
.itemRow:last-child{border-bottom:none;}
.itemRow .dot{width:6px;height:6px;border-radius:50%;background:#0C831F;flex-shrink:0;}
.itemRow .iName{flex:1;color:#1f1f1f;font-weight:500;}
.itemRow .iQty{color:#777;font-weight:600;margin-right:4px;}
.itemRow .iPrice{font-weight:700;color:#1f1f1f;}

.expandedTotal{
  display:flex;justify-content:space-between;
  padding:10px 0 0;font-size:13px;font-weight:700;
  border-top:1px dashed #d0d0d0;margin-top:6px;
}

.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;margin-top:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;line-height:1.5;}

.skel{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.skelLine{
  height:14px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:6px;margin-bottom:10px;
}
.skelLine.short{width:50%;}
.skelLine.med{width:75%;}

.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:1500;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
  .container{padding:10px 20px 0;}
}

@media(min-width:900px){
  .ordersList{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .orderCard{margin-bottom:0;}
  .dateHeader{grid-column:1/-1;}
}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">📜 Order History</div>
      <div class="pageSub" id="headerSub">Loading…</div>
    </div>
  </div>

  <div class="searchWrap">
    <span class="searchIcon">🔍</span>
    <input id="search" placeholder="Search by customer or item…" oninput="onSearch()">
  </div>

  <div class="tabs">
    <div class="tab active" data-filter="all">All <span class="tabCount" id="cntAll">0</span></div>
    <div class="tab" data-filter="delivered">✓ Delivered <span class="tabCount" id="cntDelivered">0</span></div>
    <div class="tab" data-filter="rejected">✕ Rejected <span class="tabCount" id="cntRejected">0</span></div>
  </div>
</header>

<main class="container">

  <div class="summary">
    <div class="summaryCard">
      <div class="summaryValue loading" id="sumOrders"></div>
      <div class="summaryLabel">Orders</div>
    </div>
    <div class="summaryCard">
      <div class="summaryValue loading" id="sumRevenue"></div>
      <div class="summaryLabel">Revenue</div>
    </div>
    <div class="summaryCard">
      <div class="summaryValue loading" id="sumAvg"></div>
      <div class="summaryLabel">Avg order</div>
    </div>
  </div>

  <div id="orders" class="ordersList">
    <div class="skel">
      <div class="skelLine med"></div>
      <div class="skelLine short"></div>
      <div class="skelLine"></div>
    </div>
    <div class="skel">
      <div class="skelLine med"></div>
      <div class="skelLine short"></div>
      <div class="skelLine"></div>
    </div>
  </div>

</main>

<div id="toast" class="toast"></div>

<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const headerSub = document.getElementById("headerSub");
const toast     = document.getElementById("toast");

let myEmail = null;
let allOrders = [];
let currentFilter = "all";
let searchTerm = "";

function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function timeAgo(t){
  if(!t) return "";
  const d = t.toDate ? t.toDate() : new Date(t);
  const sec = Math.floor((Date.now()-d.getTime())/1000);
  if(sec < 60)    return "just now";
  if(sec < 3600)  return Math.floor(sec/60) + "m ago";
  if(sec < 86400) return Math.floor(sec/3600) + "h ago";
  if(sec < 604800)return Math.floor(sec/86400) + "d ago";
  return d.toLocaleDateString("en-IN", {day:"numeric", month:"short"});
}

function dateGroupKey(t){
  if(!t) return "Unknown";
  const d = t.toDate ? t.toDate() : new Date(t);
  const today = new Date(); today.setHours(0,0,0,0);
  const yest = new Date(today.getTime() - 86400000);
  const dDate = new Date(d); dDate.setHours(0,0,0,0);

  if(dDate.getTime() === today.getTime()) return "Today";
  if(dDate.getTime() === yest.getTime())  return "Yesterday";

  const diff = (today.getTime() - dDate.getTime()) / 86400000;
  if(diff < 7) return "Earlier this week";
  if(diff < 30) return d.toLocaleDateString("en-IN", {month:"long", day:"numeric"});
  return d.toLocaleDateString("en-IN", {month:"long", year:"numeric"});
}

function isDelivered(o){
  const status  = (o.status || "").toLowerCase();
  const dStatus = (o.deliveryStatus || "").toLowerCase();
  return status === "delivered" || dStatus === "delivered" || dStatus === "completed";
}
function isRejected(o){ return (o.status || "").toLowerCase() === "rejected"; }

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    renderOrders();
  });
});

window.onSearch = ()=>{
  searchTerm = document.getElementById("search").value.toLowerCase().trim();
  renderOrders();
};

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    showToast("Login required", true);
    setTimeout(()=> location.href = "login.html", 800);
    return;
  }
  myEmail = user.email;
  await loadOrders();
});

async function loadOrders(){
  try{
    const snap = await getDocs(query(
      collection(db, "orders"),
      where("shopEmail", "==", myEmail)
    ));

    allOrders = [];
    snap.forEach(d=>{
      const o = d.data(); o.__id = d.id;
      if(isDelivered(o) || isRejected(o)){
        allOrders.push(o);
      }
    });

    try{
      const snap2 = await getDocs(query(
        collection(db, "split-orders"),
        where("shopEmail", "==", myEmail)
      ));
      snap2.forEach(d=>{
        const o = d.data();
        o.__id = "split_" + d.id;
        o.__isSplit = true;
        if(isDelivered(o) || isRejected(o)){
          allOrders.push(o);
        }
      });
    }catch(e){ /* split-orders may not exist */ }

    allOrders.sort((a,b)=>{
      const ta = a.time?.toDate ? a.time.toDate().getTime() : 0;
      const tb = b.time?.toDate ? b.time.toDate().getTime() : 0;
      return tb - ta;
    });

    updateSummary();
    renderOrders();
  }catch(err){
    console.error(err);
    showToast("Could not load history", true);
    ordersDiv.innerHTML = `
      <div class="empty"><div class="icon">⚠️</div>
      <h3>Could not load history</h3>
      <p>Check your connection and try again.</p></div>`;
  }
}

function updateSummary(){
  const delivered = allOrders.filter(isDelivered);
  const rejected = allOrders.filter(isRejected);

  let revenue = 0;
  delivered.forEach(o=>{ revenue += Number(o.shopEarning || o.total || 0); });
  const avg = delivered.length ? revenue / delivered.length : 0;

  setSummary("sumOrders",  delivered.length);
  setSummary("sumRevenue", "₹" + Math.round(revenue).toLocaleString("en-IN"));
  setSummary("sumAvg",     "₹" + Math.round(avg).toLocaleString("en-IN"));

  document.getElementById("cntAll").textContent       = allOrders.length;
  document.getElementById("cntDelivered").textContent = delivered.length;
  document.getElementById("cntRejected").textContent  = rejected.length;

  headerSub.textContent = allOrders.length === 0
    ? "No completed orders yet"
    : `${allOrders.length} order${allOrders.length>1?"s":""} in history`;
}
function setSummary(id, val){
  const el = document.getElementById(id);
  el.classList.remove("loading");
  el.textContent = val;
}

function renderOrders(){
  let visible = allOrders.slice();

  if(currentFilter === "delivered") visible = visible.filter(isDelivered);
  else if(currentFilter === "rejected") visible = visible.filter(isRejected);

  if(searchTerm){
    visible = visible.filter(o=>{
      const inName = (o.name || "").toLowerCase().includes(searchTerm);
      const inAddr = (o.address || "").toLowerCase().includes(searchTerm);
      const inItems = (o.items || []).some(i =>
        (i.name || "").toLowerCase().includes(searchTerm)
      );
      const inId = (o.__id || "").toLowerCase().includes(searchTerm);
      return inName || inAddr || inItems || inId;
    });
  }

  /* FIX: use innerHTML on the same ordersDiv element so the reference stays valid.
     The previous version replaced ordersDiv via outerHTML, breaking subsequent renders. */
  if(visible.length === 0){
    let icon = "📜", title = "No orders found", msg = "Your completed orders will appear here.";
    if(searchTerm){ icon="🔍"; title="No matches found"; msg="Try a different search term."; }
    else if(currentFilter === "delivered"){ icon="📦"; title="No delivered orders"; msg="Completed deliveries appear here."; }
    else if(currentFilter === "rejected"){ icon="✕"; title="No rejected orders"; msg="Orders you've rejected appear here."; }
    ordersDiv.innerHTML = `
      <div class="empty">
        <div class="icon">${icon}</div>
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(msg)}</p>
      </div>`;
    return;
  }

  const groups = new Map();
  visible.forEach(o=>{
    const key = dateGroupKey(o.time);
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(o);
  });

  let html = "";
  groups.forEach((orders, dateKey)=>{
    html += `<div class="dateHeader">${escapeHtml(dateKey)}</div>`;
    orders.forEach(o=> html += renderCard(o));
  });
  ordersDiv.innerHTML = html;

  ordersDiv.querySelectorAll(".orderCard").forEach(c=>{
    c.addEventListener("click", ()=>{
      c.classList.toggle("expanded");
    });
  });
}

function renderCard(order){
  const id = order.__id;
  const orderShort = "#" + id.slice(-6).toUpperCase();
  const initial = (order.name || "?").trim().charAt(0).toUpperCase();

  const status = order.status || "";
  const delivered = isDelivered(order);
  const pillClass = delivered ? "pill-delivered"
                  : isRejected(order) ? "pill-rejected"
                  : "pill-cancelled";
  const pillText = delivered ? "Delivered"
                  : isRejected(order) ? "Rejected"
                  : status;

  const total = order.total || 0;
  const itemCount = order.items?.length || 0;

  let itemsHtml = "";
  if(Array.isArray(order.items)){
    order.items.forEach(it=>{
      const qty = it.qty || 1;
      const lt = (Number(it.price)||0) * qty;
      itemsHtml += `
        <div class="itemRow">
          <div class="dot"></div>
          <div class="iName">${escapeHtml(it.name || "Item")}</div>
          <div class="iQty">× ${qty}</div>
          <div class="iPrice">₹${lt}</div>
        </div>`;
    });
    itemsHtml += `
      <div class="expandedTotal">
        <span>Total</span>
        <span>₹${total}</span>
      </div>`;
  }

  return `
    <div class="orderCard">
      <div class="cardTop">
        <div class="cardLeft">
          <div class="orderNum">${orderShort}${order.__isSplit?" · SPLIT":""}</div>
          <div class="timeAgo">${timeAgo(order.time)}</div>
        </div>
        <div class="statusPill ${pillClass}">${escapeHtml(pillText)}</div>
      </div>

      <div class="custStrip">
        <div class="custAvatar">${initial}</div>
        <div class="custInfo">
          <div class="custName">${escapeHtml(order.name || "Customer")}</div>
          <div class="custMeta">📍 ${escapeHtml(order.address || "—")}</div>
        </div>
      </div>

      <div class="cardFoot">
        <div class="itemsCount">📦 ${itemCount} item${itemCount!==1?"s":""}</div>
        <div class="foot-amount">
          <span class="label">Total</span>₹${total}
        </div>
      </div>

      <div class="itemsExpanded">${itemsHtml}</div>
    </div>`;
}

window.goBack = ()=> location.href = "dashboard.html";
</script>

</body>
</html>
