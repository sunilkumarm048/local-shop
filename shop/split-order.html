<!DOCTYPE html>
<html>
<head>
<title>Split Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.order{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:5px;padding:6px 10px;border:none;border-radius:5px;color:white;cursor:pointer;}
.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.badge{background:#ddd;padding:3px 8px;border-radius:5px;font-size:12px;margin-left:5px;}
.empty{color:#666;margin-top:20px;}
.info{color:#888;font-size:13px;}
</style>

</head>
<body>

<h2>✂️ Split Orders</h2>

<button onclick="goBack()">⬅ Back</button>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc, getDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔄 LISTEN SPLIT ORDERS
onSnapshot(collection(db,"split-orders"), snap=>{
ordersDiv.innerHTML="";
render(snap);
});

// 🎨 RENDER
function render(snapshot){

let hasData = false;

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ skip completed
if(order.status==="Delivered" || order.status==="Rejected") return;

// 🔥 LOCK LOGIC (SAME AS MAIN)
if(order.assigned && order.shopEmail !== shopEmail) return;

hasData = true;

// ITEMS
let itemsHTML = order.items?.map(item=>`
<div>• ${item.name} ₹${item.price}</div>
`).join("") || "";

// BUTTONS
let buttons="";

// 🟡 Pending
if(order.status==="Pending"){
buttons=`
<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="reject" onclick="reject('${id}')">Reject</button>
`;
}

// 🔵 Accepted
else if(order.status==="Accepted"){

if(order.shopEmail !== shopEmail){
buttons=`<span class="info">Taken by another shop</span>`;
}else{
buttons=`
<button class="ready" onclick="ready('${id}','${order.parentOrderId}')">Ready</button>
`;
}

}

// 🟢 Ready
else if(order.status==="Ready"){
buttons=`<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML+=`
<div class="order">
<b>${order.name}</b> <span class="badge">Split</span><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

${itemsHTML}
${buttons}
</div>
`;

});

// EMPTY STATE
if(!hasData){
ordersDiv.innerHTML = `<p class="empty">No split orders available</p>`;
}

}

// ✅ ACCEPT (LOCK WITH TRANSACTION)
window.accept = async(id)=>{

const ref = doc(db,"split-orders",id);

try{

await runTransaction(db, async (transaction)=>{

const snap = await transaction.get(ref);

if(!snap.exists()) throw "Order not found";

const order = snap.data();

if(order.assigned){
alert("❌ Already taken by another shop");
return;
}

transaction.update(ref,{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});

});

}catch(e){
console.error(e);
}

};

// ❌ REJECT
window.reject = async(id)=>{
await updateDoc(doc(db,"split-orders",id),{
status:"Rejected"
});
};

// 🔥 READY (LINK SAME DELIVERY)
window.ready = async(id,parentId)=>{

try{

const mainRef = doc(db,"orders",parentId);
const mainSnap = await getDoc(mainRef);

let deliveryBoy = null;

if(mainSnap.exists()){
const mainOrder = mainSnap.data();
deliveryBoy = mainOrder.deliveryBoy || null;
}

await updateDoc(doc(db,"split-orders",id),{
status:"Ready",
deliveryStatus:"Ready",
deliveryBoy: deliveryBoy
});

alert("✅ Ready (same delivery)");

}catch(err){
console.error(err);
alert("Error updating order");
}

};

// 🔙 BACK
window.goBack=()=>{
history.back();
};

});

</script>
</body>
</html>
