<!DOCTYPE html>
<html>
<head>
<title>Split Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.order{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:5px;padding:6px 10px;border:none;border-radius:5px;color:white;cursor:pointer;}
.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.badge{background:#ddd;padding:3px 8px;border-radius:5px;font-size:12px;margin-left:5px;}
</style>

</head>
<body>

<h2>✂️ Split Orders</h2>

<button onclick="goBack()">⬅ Back</button>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// ✅ ONLY SPLIT ORDERS
onSnapshot(collection(db,"split-orders"), snap=>{
ordersDiv.innerHTML="";
render(snap);
});

// RENDER
function render(snapshot){

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

if(order.status==="Delivered" || order.status==="Rejected") return;

// FILTER
if(order.shopEmail !== shopEmail) return;

// ITEMS
let itemsHTML = order.items?.map(item=>`
<div>${item.name} ₹${item.price}</div>
`).join("") || "";

// BUTTONS
let buttons="";

if(order.status==="Pending"){
buttons=`
<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="reject" onclick="reject('${id}')">Reject</button>
`;
}
else if(order.status==="Accepted"){
buttons=`
<button class="ready" onclick="ready('${id}','${order.parentOrderId}')">Ready</button>
`;
}
else if(order.status==="Ready"){
buttons=`<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML+=`
<div class="order">
<b>${order.name}</b> <span class="badge">Split</span><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

${itemsHTML}
${buttons}
</div>
`;

});
}

// ACCEPT
window.accept=async(id)=>{
await updateDoc(doc(db,"split-orders",id),{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});
};

// REJECT
window.reject=async(id)=>{
await updateDoc(doc(db,"split-orders",id),{
status:"Rejected"
});
};

// 🔥 READY (SAME DELIVERY)
window.ready=async(id,parentId)=>{

const mainSnap = await getDoc(doc(db,"orders",parentId));
const mainOrder = mainSnap.data();

await updateDoc(doc(db,"split-orders",id),{
status:"Ready",
deliveryStatus:"Ready",
deliveryBoy: mainOrder.deliveryBoy || null
});

alert("✅ Ready (same delivery)");
};

// BACK
window.goBack=()=>{
history.back();
};

});

</script>
</body>
</html>
