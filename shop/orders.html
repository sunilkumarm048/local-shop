<!DOCTYPE html>
<html>
<head>

<title>Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.order{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:5px;padding:6px 10px;border:none;border-radius:5px;color:white;}
.accept{background:green;}
.reject{background:red;}
.ready{background:blue;}
</style>

</head>

<body>

<h2>📦 Your Orders</h2>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML="";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

if(order.shopEmail === shopEmail){

let items = "";
order.items.forEach(i=>{
items += i.name + " x" + i.qty + "<br>";
});

ordersDiv.innerHTML += `
<div class="order">
<b>${order.name}</b><br>
📞 ${order.phone}<br>

${items}

Total: ₹${order.total}<br>
Status: ${order.status}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>
</div>
`;

}

});

});

});

window.accept = id=>updateDoc(doc(db,"orders",id),{status:"Accepted"});
window.ready = id=>updateDoc(doc(db,"orders",id),{status:"Ready"});
window.reject = id=>updateDoc(doc(db,"orders",id),{status:"Rejected"});

</script>

</body>
</html>
