<!DOCTYPE html>
<html>
<head>

<title>Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.reject{background:red;}
.ready{background:blue;}
.partial{background:orange;}

.item{
margin:5px 0;
}
</style>

</head>

<body>

<h2>📦 Your Orders</h2>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc, 
getDoc, 
addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔥 LIVE ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML="";

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// 🔥 SHOW ONLY THIS SHOP ORDERS
// SHOW ORDERS IF:
// 1. Already assigned to this shop
// 2. OR not assigned yet (NEW ORDER)

if(order.shopEmail === shopEmail || !order.shopEmail){

// 🔔 SOUND
if(order.status === "Pending"){
audio.play();
}

let itemsHTML = "";

// ITEMS WITH CHECKBOX
order.items.forEach((i,index)=>{
itemsHTML += `
<div class="item">
<input type="checkbox" id="item_${id}_${index}" checked>
${i.name} x${i.qty}
</div>`;
});

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

${itemsHTML}

Total: ₹${order.total}<br>
Status: ${order.status}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="partial" onclick="partialAccept('${id}')">Partial</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>`;
}

});

});

});

// ✅ ACCEPT FULL
window.accept = async (id)=>{

navigator.geolocation.getCurrentPosition(async(pos)=>{

await updateDoc(doc(db,"orders",id),{
    status:"Accepted",
    shopEmail: auth.currentUser.email,
    shopLat: pos.coords.latitude,
    shopLng: pos.coords.longitude
});

});

};

// ✅ READY
window.ready = id=>{
updateDoc(doc(db,"orders",id),{status:"Ready"});
};

// ❌ REJECT
window.reject = id=>{
updateDoc(doc(db,"orders",id),{status:"Rejected"});
};

// 🔥 PARTIAL ACCEPT (REAL LOGIC)
window.partialAccept = async function(id){

const orderRef = doc(db,"orders",id);
const snap = await getDoc(orderRef);
const order = snap.data();

// GET CHECKBOXES
const checkboxes = document.querySelectorAll(`[id^="item_${id}_"]`);

let selectedItems = [];
let remainingItems = [];

checkboxes.forEach((cb,index)=>{

if(cb.checked){
selectedItems.push(order.items[index]);
}else{
remainingItems.push(order.items[index]);
}

});

if(selectedItems.length === 0){
alert("⚠️ Select at least 1 item");
return;
}

// ✅ UPDATE CURRENT ORDER (ONLY SELECTED ITEMS)
await updateDoc(orderRef,{
items: selectedItems,
status: "Accepted"
});

// 🔥 CREATE NEW ORDER FOR REMAINING ITEMS
if(remainingItems.length > 0){

await addDoc(collection(db,"orders"),{

// CUSTOMER
name: order.name,
phone: order.phone,
address: order.address,

// REMAINING ITEMS
items: remainingItems,
total: remainingItems.reduce((t,i)=>t+i.price*i.qty,0),

// STATUS
status: "Pending",
deliveryStatus: "Waiting",

// 🚨 REMOVE SHOP → NEW SHOP CAN TAKE
shopEmail: null,
shopName: null,

time: new Date()

});

}

alert("✅ Partial accepted & forwarded to next shop");

};

</script>

</body>
</html>
