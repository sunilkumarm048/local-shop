<!DOCTYPE html>
<html>
<head>

<title>Bakery Dashboard</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
padding:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.order{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.status{
padding:5px 12px;
border-radius:20px;
font-size:12px;
color:white;
}

.pending{background:orange;}
.accepted{background:green;}
.rejected{background:red;}
.delivered{background:blue;}

button{
padding:6px 12px;
margin-right:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.accept{background:green;color:white;}
.reject{background:red;color:white;}

</style>

</head>

<body>

<h2>🍞 Bakery Orders Dashboard</h2>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDiENWyBsHdVCNszjPb_gKT_JqBWxkKPfU",
authDomain: "local-shop-orders-d48d0.firebaseapp.com",
projectId: "local-shop-orders-d48d0",
storageBucket: "local-shop-orders-d48d0.firebasestorage.app",
messagingSenderId: "750524308284",
appId: "1:750524308284:web:d2a047c93580635e4e5c39"
};

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

const shopName = "Bakery"
const ordersDiv = document.getElementById("orders")

onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML=""

snapshot.forEach((docSnap)=>{

const order = docSnap.data()
const id = docSnap.id

if(order.shop === shopName){

let itemsHTML=""

order.items.forEach(i=>{
itemsHTML += i.item + " x" + i.qty + "<br>"
})

let statusClass = (order.status || "Pending").toLowerCase()

ordersDiv.innerHTML += `

<div class="order">

<div class="header">
<b>${order.name}</b>
<span class="status ${statusClass}">${order.status || "Pending"}</span>
</div>

📞 ${order.phone}<br>
🏠 ${order.address || "No address"}<br><br>

<b>Items:</b><br>
${itemsHTML}

<br>
<b>Total:</b> ₹${order.total}

<br><br>

<button class="accept" onclick="acceptOrder('${id}')">Accept</button>
<button class="reject" onclick="rejectOrder('${id}')">Reject</button>

</div>

`

}

})

})

window.acceptOrder = async(id)=>{
await updateDoc(doc(db,"orders",id),{status:"Accepted"})
}

window.rejectOrder = async(id)=>{
await updateDoc(doc(db,"orders",id),{status:"Rejected"})
}

</script>

</body>
</html>
