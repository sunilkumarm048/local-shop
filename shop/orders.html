<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Orders · Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  font-family:'Inter',Arial,sans-serif;
  background:#f4f4f4;
  color:#1f1f1f;
  overflow-x:hidden;
}
body{padding-bottom:30px;}

button{font-family:inherit;cursor:pointer;border:none;}

/* ============ HEADER ============ */
.header{
  background:linear-gradient(180deg,#F8CD46 0%,#F0B91D 100%);
  padding:14px 16px;
  position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.topBar{
  display:flex;align-items:center;gap:12px;
  max-width:1100px;margin:0 auto;
}
.backBtn{
  background:rgba(255,255,255,.4);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#1f1f1f;
}
.backBtn:active{transform:scale(.94);}

.titleBlock{flex:1;min-width:0;line-height:1.2;}
.pageTitle{
  font-size:18px;font-weight:800;color:#1f1f1f;
  display:flex;align-items:center;gap:6px;
}
.pageSub{font-size:12px;color:#3a3a3a;margin-top:2px;}

.liveDot{
  width:8px;height:8px;border-radius:50%;background:#0C831F;
  box-shadow:0 0 0 0 rgba(12,131,31,.6);
  animation:livePulse 1.6s infinite;
}
@keyframes livePulse{
  0%{box-shadow:0 0 0 0 rgba(12,131,31,.6);}
  70%{box-shadow:0 0 0 8px rgba(12,131,31,0);}
  100%{box-shadow:0 0 0 0 rgba(12,131,31,0);}
}

.soundBtn{
  background:rgba(255,255,255,.5);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  transition:transform .15s;
}
.soundBtn:active{transform:scale(.94);}
.soundBtn.muted{opacity:.55;}

/* ============ FILTER TABS ============ */
.tabs{
  display:flex;gap:8px;
  padding:12px 12px 4px;
  max-width:1100px;margin:0 auto;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}

.tab{
  padding:8px 16px;
  background:#fff;border:1px solid #e5e5e5;border-radius:22px;
  font-size:13px;font-weight:600;color:#444;
  white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.tab.active{background:#0C831F;color:#fff;border-color:#0C831F;}
.tabCount{
  background:rgba(0,0,0,.08);color:inherit;
  padding:1px 7px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.tab.active .tabCount{background:rgba(255,255,255,.25);color:#fff;}

/* ============ MAIN ============ */
.container{
  max-width:1100px;margin:0 auto;
  padding:6px 12px 0;
}

/* ============ ORDER CARD ============ */
.orderCard{
  background:#fff;border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
  border:1px solid #ececec;
}
.orderCard.fresh{
  border-color:#F0B91D;
  box-shadow:0 0 0 3px rgba(240,185,29,.18);
  animation:fresh 1.6s infinite;
}
@keyframes fresh{
  0%,100%{box-shadow:0 0 0 3px rgba(240,185,29,.18);}
  50%{box-shadow:0 0 0 5px rgba(240,185,29,.32);}
}

.cardTop{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  border-bottom:1px solid #f4f4f4;
  background:#fafafa;gap:10px;
}
.cardLeft{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.orderNum{
  font-size:13px;font-weight:800;color:#1f1f1f;
  letter-spacing:.3px;font-family:monospace;
}
.timeAgo{font-size:11px;color:#888;font-weight:500;}

.statusPill{
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.4px;
  white-space:nowrap;
}
.pill-pending {background:#fff5d6;color:#8a6500;}
.pill-accepted{background:#dcf3e1;color:#0C831F;}
.pill-ready   {background:#dbe9ff;color:#1857c1;}
.pill-out     {background:#ffe8d1;color:#b65800;}

/* CUSTOMER */
.custStrip{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border-bottom:1px solid #f4f4f4;
}
.custAvatar{
  width:38px;height:38px;border-radius:50%;
  background:#fff5d6;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#8a6500;
  flex-shrink:0;
}
.custInfo{flex:1;min-width:0;line-height:1.3;}
.custName{
  font-size:14px;font-weight:700;color:#1f1f1f;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.custMeta{
  font-size:12px;color:#666;margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

.callBtn{
  width:38px;height:38px;border-radius:50%;
  background:#dcf3e1;color:#0C831F;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;text-decoration:none;
}
.callBtn:active{transform:scale(.94);}

/* ITEMS */
.itemsArea{padding:10px 14px;}
.itemsHeader{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.itemsTitle{
  font-size:12px;font-weight:700;color:#555;
  text-transform:uppercase;letter-spacing:.3px;
}
.partialHint{font-size:11px;color:#0C831F;font-weight:600;}

.itemRow{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px dashed #f0f0f0;
}
.itemRow:last-child{border-bottom:none;}

.itemCheck{
  width:20px;height:20px;
  border:2px solid #d0d0d0;border-radius:5px;
  flex-shrink:0;
  appearance:none;-webkit-appearance:none;
  cursor:pointer;position:relative;
  background:#fff;transition:all .15s;
}
.itemCheck:checked{background:#0C831F;border-color:#0C831F;}
.itemCheck:checked::after{
  content:"✓";
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:#fff;font-size:12px;font-weight:800;
}
.itemCheck:disabled{opacity:.5;cursor:default;}

.itemName{flex:1;font-size:13px;font-weight:500;color:#1f1f1f;line-height:1.3;}
.itemQty{font-size:12px;color:#777;font-weight:600;margin-right:4px;}
.itemPrice{font-size:13px;font-weight:700;color:#1f1f1f;}

.totalRow{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;
  background:#fafafa;
  border-top:1px solid #f0f0f0;
  font-size:13px;
}
.totalLabel{font-weight:600;color:#444;}
.totalAmount{font-weight:800;color:#1f1f1f;font-size:15px;}

/* ACTIONS */
.actions{
  display:flex;gap:8px;
  padding:10px 14px 12px;
  border-top:1px solid #f4f4f4;
  flex-wrap:wrap;
}
.actionBtn{
  flex:1;min-width:90px;
  padding:11px 12px;border-radius:10px;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  letter-spacing:.2px;transition:all .12s;
}
.actionBtn:active{transform:scale(.97);}

.btn-accept {background:#0C831F;color:#fff;}
.btn-accept:hover{background:#0a6e1a;}
.btn-partial{background:#fff5d6;color:#8a6500;border:1px solid #f0d76a;}
.btn-partial:hover{background:#ffeeb3;}
.btn-ready  {background:#1857c1;color:#fff;}
.btn-ready:hover{background:#144aa3;}
.btn-reject {background:#fff;color:#d23030;border:1.5px solid #ffd2d2;}
.btn-reject:hover{background:#fff5f5;}
.btn-disabled{background:#f0f0f0;color:#888;cursor:default;flex:1;}

/* ============ EMPTY ============ */
.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;
  margin-top:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;line-height:1.5;}

/* SKELETON */
.skel{
  background:#fff;border-radius:14px;
  padding:14px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.skelLine{
  height:14px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:6px;margin-bottom:10px;
}
.skelLine.short{width:50%;}
.skelLine.med{width:75%;}
@keyframes shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* TOAST */
.toast{
  position:fixed;bottom:24px;
  left:50%;transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;
  padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;
  z-index:1500;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.modalBg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;
  z-index:2000;
}
.modalBg.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal{
  background:#fff;width:100%;max-width:500px;
  border-radius:20px 20px 0 0;
  padding:24px 20px 28px;text-align:center;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}

.modal .icon{font-size:48px;margin-bottom:8px;}
.modal h3{font-size:17px;font-weight:800;color:#1f1f1f;margin-bottom:6px;}
.modal p{font-size:13px;color:#666;line-height:1.4;margin-bottom:18px;}
.modalActions{display:flex;gap:10px;}
.btnPrimary  {flex:1;background:#0C831F;color:#fff;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}
.btnSecondary{flex:1;background:#fff;color:#666;border:1.5px solid #e0e0e0;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}
.btnDanger   {flex:1;background:#d23030;color:#fff;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}

@media(min-width:600px){
  .modalBg{align-items:center;padding:20px;}
  .modal{border-radius:16px;max-width:420px;}
}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
  .container{padding:10px 20px 0;}
}

@media(min-width:900px){
  #orders{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .orderCard{margin-bottom:0;}
}
</style>
</head>

<body>

<!-- ============ HEADER ============ -->
<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle"><span class="liveDot"></span> Manage Orders</div>
      <div class="pageSub" id="headerSub">Connecting…</div>
    </div>
    <button class="soundBtn" id="soundBtn" onclick="toggleSound()" aria-label="Sound">🔔</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-filter="all">All <span class="tabCount" id="cntAll">0</span></div>
    <div class="tab" data-filter="pending">⏳ New <span class="tabCount" id="cntPending">0</span></div>
    <div class="tab" data-filter="accepted">👨‍🍳 Preparing <span class="tabCount" id="cntAccepted">0</span></div>
    <div class="tab" data-filter="ready">📦 Ready <span class="tabCount" id="cntReady">0</span></div>
  </div>
</header>

<!-- ============ MAIN ============ -->
<main class="container">
  <div id="orders">
    <div class="skel">
      <div class="skelLine med"></div>
      <div class="skelLine short"></div>
      <div class="skelLine"></div>
    </div>
    <div class="skel">
      <div class="skelLine med"></div>
      <div class="skelLine short"></div>
      <div class="skelLine"></div>
    </div>
  </div>
</main>

<!-- ============ TOAST + MODAL ============ -->
<div id="toast" class="toast"></div>

<div class="modalBg" id="confirmModal">
  <div class="modal">
    <div class="icon" id="modalIcon">❓</div>
    <h3 id="modalTitle">Are you sure?</h3>
    <p id="modalMsg">This action cannot be undone.</p>
    <div class="modalActions">
      <button class="btnSecondary" onclick="closeModal()">Cancel</button>
      <button class="btnPrimary" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<!-- ============ FIREBASE LOGIC ============ -->
<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  collection, onSnapshot, doc, updateDoc, getDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const headerSub = document.getElementById("headerSub");
const toast     = document.getElementById("toast");
const soundBtn  = document.getElementById("soundBtn");

let currentFilter = "all";
let allOrdersCache = [];
let myShopEmail = null;
let knownOrderIds = new Set();
let firstLoadDone = false;
let soundEnabled = localStorage.getItem("soundEnabled") !== "false";

/* ---------- SOUND ---------- */
const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
audio.volume = 0.7;

function updateSoundUI(){
  soundBtn.textContent = soundEnabled ? "🔔" : "🔕";
  soundBtn.classList.toggle("muted", !soundEnabled);
}
window.toggleSound = ()=>{
  soundEnabled = !soundEnabled;
  localStorage.setItem("soundEnabled", soundEnabled);
  updateSoundUI();
  showToast(soundEnabled ? "🔔 New-order sound ON" : "🔕 New-order sound OFF");
};
updateSoundUI();

function playSound(){
  if(!soundEnabled) return;
  try{
    audio.currentTime = 0;
    audio.play().catch(()=>{ /* autoplay restrictions */ });
  }catch(e){}
}

/* ---------- TABS ---------- */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    renderFromCache();
  });
});

/* ---------- TOAST ---------- */
function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}

/* ---------- MODAL ---------- */
let confirmCb = null;
function openModal({icon="❓", title, msg, confirmText="Confirm", danger=false, onConfirm}){
  document.getElementById("modalIcon").textContent  = icon;
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMsg").textContent   = msg;
  const btn = document.getElementById("modalConfirmBtn");
  btn.textContent = confirmText;
  btn.className = danger ? "btnDanger" : "btnPrimary";
  confirmCb = onConfirm;
  document.getElementById("confirmModal").classList.add("show");
}
window.closeModal = ()=>{
  document.getElementById("confirmModal").classList.remove("show");
  confirmCb = null;
};
document.getElementById("modalConfirmBtn").addEventListener("click", ()=>{
  if(confirmCb) confirmCb();
  closeModal();
});
document.getElementById("confirmModal").addEventListener("click",(e)=>{
  if(e.target.id === "confirmModal") closeModal();
});

/* ---------- HELPERS ---------- */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}
function timeAgo(t){
  if(!t) return "";
  const d = t.toDate ? t.toDate() : new Date(t);
  const sec = Math.floor((Date.now()-d.getTime())/1000);
  if(sec < 60) return "just now";
  if(sec < 3600) return Math.floor(sec/60) + "m ago";
  if(sec < 86400) return Math.floor(sec/3600) + "h ago";
  return Math.floor(sec/86400) + "d ago";
}
function statusKey(s){
  switch((s||"").toLowerCase()){
    case "pending": return "pending";
    case "accepted": return "accepted";
    case "ready": return "ready";
    case "out for delivery": return "out";
    default: return "pending";
  }
}

/* ---------- AUTH GUARD ---------- */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    showToast("Login required", true);
    setTimeout(()=> location.href = "login.html", 800);
    return;
  }
  myShopEmail = user.email;

  /* LIVE LISTENER */
  onSnapshot(collection(db,"orders"), (snap)=>{
    allOrdersCache = [];
    let foundNewPending = false;

    snap.forEach(docSnap=>{
      const d = docSnap.data();
      d.__id = docSnap.id;

      // visibility: this shop's orders OR unassigned (available to take)
      const visible = (d.shopEmail === myShopEmail) || !d.shopEmail;
      if(!visible) return;

      // skip closed orders
      if(d.status === "Delivered" || d.status === "Rejected") return;

      allOrdersCache.push(d);

      // detect newly-arrived pending orders to play sound
      if(firstLoadDone && d.status === "Pending" && !knownOrderIds.has(d.__id)){
        foundNewPending = true;
      }
      knownOrderIds.add(d.__id);
    });

    if(foundNewPending){
      playSound();
      showToast("🔔 New order received");
    }
    firstLoadDone = true;

    updateCounts();
    renderFromCache();
  }, (err)=>{
    console.error(err);
    headerSub.textContent = "Connection error";
    showToast("Could not load orders", true);
  });
});

/* ---------- COUNTS ---------- */
function updateCounts(){
  let pending=0, accepted=0, ready=0;
  allOrdersCache.forEach(o=>{
    const k = statusKey(o.status);
    if(k === "pending") pending++;
    else if(k === "accepted") accepted++;
    else if(k === "ready") ready++;
  });
  const total = pending + accepted + ready;
  document.getElementById("cntAll").textContent      = total;
  document.getElementById("cntPending").textContent  = pending;
  document.getElementById("cntAccepted").textContent = accepted;
  document.getElementById("cntReady").textContent    = ready;

  headerSub.textContent = total === 0 ? "No active orders"
    : `${total} active order${total>1?"s":""}`;
}

/* ---------- RENDER ---------- */
function renderFromCache(){
  ordersDiv.innerHTML = "";

  let visible = allOrdersCache.filter(o=>{
    if(currentFilter === "all") return true;
    return statusKey(o.status) === currentFilter;
  });

  /* sort: pending first, newest first within each status */
  const order = {pending:0, accepted:1, ready:2, out:3};
  visible.sort((a,b)=>{
    const da = order[statusKey(a.status)] ?? 9;
    const db_ = order[statusKey(b.status)] ?? 9;
    if(da !== db_) return da - db_;
    const ta = a.time?.toDate ? a.time.toDate().getTime() : 0;
    const tb = b.time?.toDate ? b.time.toDate().getTime() : 0;
    return tb - ta;
  });

  if(visible.length === 0){
    let icon="📦", title="No active orders", msg="New orders will appear here automatically.";
    if(currentFilter === "pending"){ icon="⏳"; title="No new orders"; msg="Pending orders show up here when customers place them."; }
    else if(currentFilter === "accepted"){ icon="👨‍🍳"; title="Nothing being prepared"; msg="Accepted orders appear here while you prepare them."; }
    else if(currentFilter === "ready"){ icon="📦"; title="No orders ready"; msg="Mark items ready and they'll show here."; }
    ordersDiv.innerHTML = `<div class="empty"><div class="icon">${icon}</div><h3>${title}</h3><p>${msg}</p></div>`;
    return;
  }

  let html = "";
  visible.forEach(order=>{
    const id = order.__id;
    const status = order.status || "Pending";
    const sk = statusKey(status);
    const fresh = sk === "pending" ? "fresh" : "";
    const initial = (order.name || "?").trim().charAt(0).toUpperCase();
    const orderShort = "#" + id.slice(-6).toUpperCase();
    const total = order.total || 0;

    /* items list with checkboxes — only enabled for pending (for partial accept) */
    let itemsHtml = "";
    if(Array.isArray(order.items)){
      order.items.forEach((it, i)=>{
        const qty = it.qty || 1;
        const lineT = (it.price || 0) * qty;
        const enabled = sk === "pending";
        itemsHtml += `
          <div class="itemRow">
            <input type="checkbox" class="itemCheck" id="item_${id}_${i}" ${enabled ? "checked" : "checked disabled"}>
            <div class="itemName">${escapeHtml(it.name || "Item")}</div>
            <div class="itemQty">× ${qty}</div>
            <div class="itemPrice">₹${lineT}</div>
          </div>`;
      });
    }

    /* actions by status */
    let actionsHtml = "";
    if(sk === "pending"){
      actionsHtml = `
        <button class="actionBtn btn-reject" onclick="rejectOrder('${id}')">Reject</button>
        <button class="actionBtn btn-partial" onclick="partialAccept('${id}')">⚡ Partial</button>
        <button class="actionBtn btn-accept" onclick="acceptOrder('${id}')">Accept All ✓</button>`;
    }else if(sk === "accepted"){
      actionsHtml = `<button class="actionBtn btn-ready" onclick="markReady('${id}')">Mark Ready ✓</button>`;
    }else if(sk === "ready"){
      actionsHtml = `<button class="actionBtn btn-disabled">📦 Ready · Waiting for pickup</button>`;
    }

    const partialHint = sk === "pending"
      ? `<span class="partialHint">Uncheck items for partial accept</span>` : ``;

    html += `
      <div class="orderCard ${fresh}">
        <div class="cardTop">
          <div class="cardLeft">
            <div class="orderNum">${orderShort}</div>
            <div class="timeAgo">· ${timeAgo(order.time)}</div>
          </div>
          <div class="statusPill pill-${sk}">${escapeHtml(status)}</div>
        </div>

        <div class="custStrip">
          <div class="custAvatar">${initial}</div>
          <div class="custInfo">
            <div class="custName">${escapeHtml(order.name || "Customer")}</div>
            <div class="custMeta">📍 ${escapeHtml(order.address || "")}</div>
          </div>
          ${order.phone ? `<a class="callBtn" href="tel:${escapeHtml(order.phone)}">📞</a>` : ""}
        </div>

        <div class="itemsArea">
          <div class="itemsHeader">
            <div class="itemsTitle">Items (${order.items?.length || 0})</div>
            ${partialHint}
          </div>
          ${itemsHtml}
        </div>

        <div class="totalRow">
          <span class="totalLabel">Order Total</span>
          <span class="totalAmount">₹${total}</span>
        </div>

        <div class="actions">${actionsHtml}</div>
      </div>`;
  });

  ordersDiv.innerHTML = html;
}

/* ---------- LOCATION HELPER ---------- */
function getShopLocation(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat:pos.coords.latitude, lng:pos.coords.longitude}),
      ()  => resolve(null),
      {enableHighAccuracy:true, timeout:6000}
    );
  });
}

/* ---------- ACCEPT (full) ---------- */
window.acceptOrder = (id)=>{
  openModal({
    icon:"✅",
    title:"Accept this order?",
    msg:"You'll be responsible for preparing all items in this order.",
    confirmText:"Yes, Accept",
    onConfirm: async ()=>{
      try{
        const loc = await getShopLocation();
        const update = {
          status: "Accepted",
          shopEmail: auth.currentUser.email
        };
        if(loc){
          update.shopLat = loc.lat;
          update.shopLng = loc.lng;
        }
        await updateDoc(doc(db,"orders",id), update);
        showToast("✓ Order accepted");
      }catch(e){
        console.error(e);
        showToast("Could not accept order", true);
      }
    }
  });
};

/* ---------- READY ---------- */
window.markReady = (id)=>{
  openModal({
    icon:"📦",
    title:"Mark order as ready?",
    msg:"The delivery partner will be notified to pick up.",
    confirmText:"Yes, Ready",
    onConfirm: async ()=>{
      try{
        await updateDoc(doc(db,"orders",id), {
          status:"Ready",
          deliveryStatus:"Ready"
        });
        showToast("✓ Order marked ready");
      }catch(e){
        showToast("Could not update", true);
      }
    }
  });
};

/* ---------- REJECT ---------- */
window.rejectOrder = (id)=>{
  openModal({
    icon:"⚠️",
    title:"Reject this order?",
    msg:"The customer will need to find another shop. This cannot be undone.",
    confirmText:"Yes, Reject",
    danger:true,
    onConfirm: async ()=>{
      try{
        await updateDoc(doc(db,"orders",id), {status:"Rejected"});
        showToast("Order rejected");
      }catch(e){
        showToast("Could not reject", true);
      }
    }
  });
};

/* ---------- PARTIAL ACCEPT ---------- */
window.partialAccept = async (id)=>{
  const ref  = doc(db,"orders",id);
  const snap = await getDoc(ref);
  if(!snap.exists()){ showToast("Order not found", true); return; }
  const order = snap.data();

  const checkboxes = document.querySelectorAll(`[id^="item_${id}_"]`);
  let selected = [], remaining = [];
  checkboxes.forEach((cb, i)=>{
    if(cb.checked) selected.push(order.items[i]);
    else remaining.push(order.items[i]);
  });

  if(selected.length === 0){
    showToast("Select at least 1 item to accept", true);
    return;
  }
  if(remaining.length === 0){
    showToast("All items selected — use Accept All instead", true);
    return;
  }

  openModal({
    icon:"⚡",
    title:"Accept partial order?",
    msg:`You'll handle ${selected.length} item(s). The remaining ${remaining.length} will be sent to other shops to fulfil.`,
    confirmText:"Yes, Confirm",
    onConfirm: async ()=>{
      try{
        const loc = await getShopLocation();

        /* Update current order with selected items only */
        const updateMain = {
          items: selected,
          total: selected.reduce((s,i)=> s + (i.price * (i.qty||1)), 0),
          status: "Accepted",
          shopEmail: auth.currentUser.email
        };
        if(loc){
          updateMain.shopLat = loc.lat;
          updateMain.shopLng = loc.lng;
        }
        await updateDoc(ref, updateMain);

        /* Create new pending order for remaining items */
        await addDoc(collection(db,"orders"), {
          name:    order.name,
          phone:   order.phone,
          address: order.address,
          lat:     order.lat ?? null,
          lng:     order.lng ?? null,
          customerLat: order.customerLat ?? order.lat ?? null,
          customerLng: order.customerLng ?? order.lng ?? null,

          items:   remaining,
          total:   remaining.reduce((s,i)=> s + (i.price * (i.qty||1)), 0),

          status: "Pending",
          deliveryStatus: "Waiting",

          // Available for any shop to claim
          shopEmail: null,
          shopName:  null,

          parentOrderId: id,
          time: new Date()
        });

        showToast("✓ Partial accepted · remaining sent to other shops");
      }catch(e){
        console.error(e);
        showToast("Could not split order", true);
      }
    }
  });
};

window.goBack = ()=> location.href = "dashboard.html";
