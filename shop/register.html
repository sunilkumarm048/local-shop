<!DOCTYPE html>
<html>
<head>

<title>Shop Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f8f8f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:360px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#map{
height:200px;
border-radius:10px;
margin-top:10px;
}

.link{
text-align:center;
margin-top:10px;
}

.link a{
color:#ff5a5f;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🏪 Register Shop</h2>

<input id="name" placeholder="Shop Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="category"></select>

<input id="location" placeholder="City / Area">

<div id="map"></div>

<button onclick="register()">Register</button>

<p id="msg"></p>

<div class="link">
Already have account? <a href="login.html">Login</a>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { setDoc, doc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let lat = 20.2961;
let lng = 85.8245;

// MAP
const map = L.map('map').setView([lat, lng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker([lat,lng], {draggable:true}).addTo(map);

marker.on('dragend', ()=>{
const pos = marker.getLatLng();
lat = pos.lat;
lng = pos.lng;
});

// GPS
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
lat = pos.coords.latitude;
lng = pos.coords.longitude;
map.setView([lat,lng],15);
marker.setLatLng([lat,lng]);
});
}

// LOAD CATEGORY
async function loadCategories(){

const select = document.getElementById("category");

try{

const snapshot = await getDocs(collection(db,"shops"));

let used = new Set();
select.innerHTML="";

snapshot.forEach(docSnap=>{
let s = docSnap.data();

if(s.category && !used.has(s.category)){
used.add(s.category);

select.innerHTML += `<option>${s.category}</option>`;
}
});

if(select.innerHTML===""){
select.innerHTML=`
<option>Bakery</option>
<option>Tea Shop</option>
<option>Fast Food</option>
`;
}

}catch(e){
select.innerHTML=`<option>Bakery</option>`;
}

}

loadCategories();

// REGISTER
window.register = async function(){

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();
const category = document.getElementById("category").value;
const location = document.getElementById("location").value.trim();

if(!name || !email || !pass || !location){
alert("Fill all fields");
return;
}

try{

const user = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"shops",user.user.uid),{
shopName:name,
email:email,
category:category,
location:location,
lat:lat,
lng:lng,
createdAt:new Date()
});

localStorage.setItem("shopEmail", email);
localStorage.setItem("shopName", name);

document.getElementById("msg").innerText="✅ Registered! Redirecting...";

setTimeout(()=>{
window.location.href="dashboard.html";
},1200);

}catch(e){
alert("❌ "+e.message);
}

}

</script>

</body>
</html>
