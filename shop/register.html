<!DOCTYPE html>
<html>
<head>
<title>Register Shop</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:320px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#msg{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🏪 Register Shop</h2>

<input id="name" placeholder="Shop Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="category">
<option>Bakery</option>
<option>Tea Shop</option>
<option>Fast Food</option>
</select>

<input id="location" placeholder="Location (Area name)">

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script type="module">

import { auth, db } from "/local-shop/js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🌍 GET GPS LOCATION
function getLocation(){
return new Promise((resolve)=>{

navigator.geolocation.getCurrentPosition(pos=>{
resolve({
lat: pos.coords.latitude,
lng: pos.coords.longitude
});
},()=>{
// fallback if denied
resolve({lat:0, lng:0});
},{
enableHighAccuracy:true,
timeout:5000
});

});
}

window.register = async function(){

const msg = document.getElementById("msg");
msg.innerText = "📍 Getting location...";

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();
const category = document.getElementById("category").value;
const locationText = document.getElementById("location").value.trim();

if(!name || !email || !pass || !locationText){
alert("Fill all fields");
return;
}

try{

// 🌍 GET LOCATION
const loc = await getLocation();

msg.innerText = "⏳ Creating account...";

// 🔐 AUTH
const user = await createUserWithEmailAndPassword(auth,email,pass);

// 🔥 SAVE SHOP WITH LOCATION
await addDoc(collection(db,"shops"),{
name: name,
email: email,
category: category,
location: locationText,

// 📍 REAL GPS
lat: loc.lat,
lng: loc.lng,

icon: "🏪",
ownerUid: user.user.uid,
createdAt: new Date()
});

// LOCAL SAVE
localStorage.setItem("shopName", name);
localStorage.setItem("shopEmail", email);

msg.innerText = "✅ Registered Successfully";

setTimeout(()=>{
window.location.href="dashboard.html";
},1200);

}catch(e){

console.error(e);
alert("❌ " + e.message);

}

}

</script>

</body>
</html>
