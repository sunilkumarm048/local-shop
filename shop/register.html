<!DOCTYPE html>
<html>
<head>
<title>Shop Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f8f8f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:320px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>🏪 Register Shop</h2>

<input id="name" placeholder="Shop Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="category">
<option>Bakery</option>
<option>Tea Shop</option>
<option>Fast Food</option>
</select>

<input id="location" placeholder="Location">

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.register = async function(){

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();
const category = document.getElementById("category").value;
const location = document.getElementById("location").value.trim();

if(!name || !email || !pass || !location){
alert("Fill all fields");
return;
}

try{

const user = await createUserWithEmailAndPassword(auth,email,pass);

// 🔥 SAVE SHOP (IMPORTANT FIX)
await setDoc(doc(db,"shops",user.user.uid),{
shopName: name,
email: email,
category: category,
location: location,
createdAt: new Date()
});

// SAVE LOCAL
localStorage.setItem("shopEmail", email);
localStorage.setItem("shopName", name);

document.getElementById("msg").innerText="✅ Registered";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}catch(e){
alert(e.message);
}

}

</script>

</body>
</html>
