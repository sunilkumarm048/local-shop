<!DOCTYPE html>
<html>
<head>

<title>Shop Register</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

input{
padding:10px;
margin:10px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>🏪 Shop Registration</h2>

<input id="name" placeholder="Shop Name (Bakery)">
<br>

<input id="email" placeholder="Email (bakery@shop.com)">
<br>

<input id="password" type="password" placeholder="Password">
<br>

<button onclick="register()">Register</button>

<p id="msg"></p>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.register = async function(){

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();

if(!name || !email || !pass){
alert("Fill all fields");
return;
}

try{

const user = await createUserWithEmailAndPassword(auth,email,pass);

// 🔥 SAVE SHOP DATA
await setDoc(doc(db,"shops",user.user.uid),{
shopName:name,
email:email,
createdAt:new Date()
});

// 🔥 SAVE IN LOCAL (important)
localStorage.setItem("shopEmail", email);
localStorage.setItem("shopName", name);

document.getElementById("msg").innerText = "✅ Registered Successfully";

// REDIRECT
setTimeout(()=>{
window.location.href = "dashboard.html";
},1000);

}catch(e){
alert("❌ Error: " + e.message);
console.error(e);
}

}

</script>

</body>
</html>
