<!DOCTYPE html>
<html>
<head>
<title>Register Shop</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:320px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#msg{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🏪 Register Shop</h2>

<input id="name" placeholder="Shop Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<!-- 🔥 DYNAMIC SHOP DROPDOWN -->
<select id="shopSelect">
<option>Loading shops...</option>
</select>

<input id="location" placeholder="Location (Area name)">

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script type="module">

import { auth, db } from "/local-shop/js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 📍 GET LOCATION
function getLocation(){
return new Promise((resolve)=>{
navigator.geolocation.getCurrentPosition(pos=>{
resolve({
lat: pos.coords.latitude,
lng: pos.coords.longitude
});
},()=>{
resolve({lat:0,lng:0});
});
});
}

// 🏪 LOAD SHOPS INTO DROPDOWN
async function loadShops(){

const select = document.getElementById("shopSelect");

const snap = await getDocs(collection(db,"shops"));

select.innerHTML = "";

snap.forEach(doc=>{

let data = doc.data();

if(data.name){

let option = document.createElement("option");

option.value = data.name;       // store shop name
option.innerText = data.name;   // show shop name

select.appendChild(option);

}

});

// fallback
if(select.innerHTML === ""){
select.innerHTML = "<option>No shops found</option>";
}

}

// 🚀 REGISTER FUNCTION
window.register = async function(){

const msg = document.getElementById("msg");

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();
const selectedShop = document.getElementById("shopSelect").value;
const locationText = document.getElementById("location").value.trim();

if(!name || !email || !pass || !locationText){
alert("⚠️ Fill all fields");
return;
}

try{

msg.innerText = "📍 Getting location...";

const loc = await getLocation();

msg.innerText = "⏳ Creating account...";

// 🔐 AUTH
const userCred = await createUserWithEmailAndPassword(auth,email,pass);

msg.innerText = "💾 Saving shop data...";

// 🔥 SAVE TO localshop-details
await addDoc(collection(db,"localshop-details"),{

shopName: name,
email: email,

// 👉 using selected shop as category/type
category: selectedShop,

location: locationText,

lat: loc.lat,
lng: loc.lng,

icon: "🏪",
ownerUid: userCred.user.uid,
createdAt: new Date()

});

msg.innerText = "✅ Registered Successfully";

// SAVE LOCAL
localStorage.setItem("shopName", name);
localStorage.setItem("shopEmail", email);
localStorage.setItem("shopCategory", selectedShop);

// REDIRECT
setTimeout(()=>{
window.location.href="dashboard.html";
},1200);

}catch(e){

msg.innerText = "❌ Error: " + e.message;
alert(e.message);

}

};

// 🔥 LOAD SHOPS ON PAGE LOAD
loadShops();

</script>

</body>
</html>
