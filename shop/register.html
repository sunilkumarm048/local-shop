<!DOCTYPE html>
<html>
<head>
<title>Register Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding:30px;}
.container{background:white;padding:20px;border-radius:10px;max-width:350px;margin:auto;}
input,select{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:12px;background:#ff5a5f;color:white;border:none;}
</style>
</head>

<body>

<div class="container">

<h2>🏪 Register Shop</h2>

<input id="name" placeholder="Shop Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="category">
<option>Bakery</option>
<option>Tea Shop</option>
<option>Fast Food</option>
</select>

<input id="location" placeholder="Location">

<button onclick="register()">Register</button>

</div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.register = async function(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;
const category = document.getElementById("category").value;
const location = document.getElementById("location").value;

if(!name || !email || !pass || !location){
alert("Fill all fields");
return;
}

try{

const user = await createUserWithEmailAndPassword(auth,email,pass);

await addDoc(collection(db,"localshop-details"),{
shopName: name,
email: email,
category: category,
location: location,
lat: 0,
lng: 0,
icon: "🏪",
ownerUid: user.user.uid,
createdAt: new Date()
});

localStorage.setItem("shopName", name);
localStorage.setItem("shopEmail", email);

alert("✅ Registered!");
window.location.href = "dashboard.html";

}catch(e){
alert(e.message);
}

}

</script>

</body>
</html>
