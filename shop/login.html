<!DOCTYPE html>
<html>
<head>
<title>Shop Login</title>

<style>
body{font-family:Arial;text-align:center;padding:40px;background:#f5f5f5;}
input{padding:10px;margin:10px;width:250px;}
button{padding:10px 20px;background:#ff5a5f;color:white;border:none;}
</style>

</head>

<body>

<h2>🔐 Shop Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button><button onclick="login()">Register</button>

<script type="module">

import { auth } from "../js/firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login = async function(){

const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,pass);

// 🔥 SAVE SHOP INFO
localStorage.setItem("shopEmail", email);
localStorage.setItem("shopName", email.split("@")[0]);

window.location.href = "dashboard.html";

}

</script>

</body>
</html>
