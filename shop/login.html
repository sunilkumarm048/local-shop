<!DOCTYPE html>
<html>
<head>
<title>Shop Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f8f8f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e04848;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#ff5a5f;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 Shop Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link">
New shop? <a href="register.html">Register</a>
</div>

</div>

<script type="module">

import { auth } from "../js/firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login = async function(){

const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

if(!email || !pass){
alert("Enter email & password");
return;
}

try{

await signInWithEmailAndPassword(auth,email,pass);

// SAVE SHOP INFO
localStorage.setItem("shopEmail", email);
localStorage.setItem("shopName", email.split("@")[0]);

window.location.href = "dashboard.html";

}catch(e){
alert("❌ " + e.message);
}

}

</script>

</body>
</html>
