<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding:40px;}
.container{background:white;padding:25px;border-radius:10px;max-width:350px;margin:auto;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:12px;background:#ff5a5f;color:white;border:none;}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Shop Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.login = async function(){

const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

try{

const user = await signInWithEmailAndPassword(auth,email,pass);

const q = query(
collection(db,"localshop-details"),
where("ownerUid","==",user.user.uid)
);

const snap = await getDocs(q);

snap.forEach(doc=>{
let d = doc.data();
localStorage.setItem("shopName", d.shopName);
localStorage.setItem("shopEmail", d.email);
});

window.location.href="dashboard.html";

}catch(e){
alert(e.message);
}

}

</script>

</body>
</html>
