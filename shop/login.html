<!DOCTYPE html>
<html>
<head>
<title>Shop Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e04848;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#ff5a5f;
font-weight:bold;
text-decoration:none;
}

#msg{
margin-top:10px;
font-weight:bold;
color:red;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Shop Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- 🔥 REGISTER LINK -->
<div class="link">
Don't have a shop?<br>
<a href="register.html">Create Account →</a>
</div>

</div>

<script type="module">

// 🔥 IMPORTANT: correct path for GitHub Pages
import { auth, db } from "/local-shop/js/firebase.js";

import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.login = async function(){

const email = document.getElementById("email").value.trim();
const pass = document.getElementById("password").value.trim();

const msg = document.getElementById("msg");

msg.innerText = "";

if(!email || !pass){
msg.innerText = "⚠️ Enter email & password";
return;
}

try{

// 🔐 LOGIN
const userCred = await signInWithEmailAndPassword(auth,email,pass);

console.log("Login success:", userCred.user.uid);

// 🔥 FETCH SHOP DATA
const q = query(
collection(db,"localshop-details"),
where("ownerUid","==",userCred.user.uid)
);

const snapshot = await getDocs(q);

if(snapshot.empty){
msg.innerText = "❌ Shop not found";
return;
}

snapshot.forEach(doc=>{
let data = doc.data();

// SAVE LOCAL
localStorage.setItem("shopName", data.shopName);
localStorage.setItem("shopEmail", data.email);
});

msg.style.color = "green";
msg.innerText = "✅ Login successful";

setTimeout(()=>{
window.location.href = "dashboard.html";
},1000);

}catch(e){

console.error(e);

msg.style.color = "red";

if(e.code === "auth/invalid-credential"){
msg.innerText = "❌ Wrong email or password";
}else{
msg.innerText = "❌ " + e.message;
}

}

}

</script>

</body>
</html>
