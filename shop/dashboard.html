<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;text-align:center;}
button{
display:block;
width:250px;
margin:10px auto;
padding:12px;
background:#ff5a5f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}
</style>

</head>

<body>

<h2>🏪 Shop Dashboard</h2>

<button onclick="goOrders()">📦 View Orders</button>
<button onclick="goAdd()">➕ Add Product</button>
<button onclick="logout()">🚪 Logout</button>

<script>

if(!localStorage.getItem("shopEmail")){
alert("Login first");
location.href="login.html";
}

function goOrders(){
location.href="orders.html";
}

function goAdd(){
location.href="add-product.html";
}

function logout(){
localStorage.clear();
location.href="login.html";
}

</script>

</body>
</html>
