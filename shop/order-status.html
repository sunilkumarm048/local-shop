<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}

.badge{
background:#ddd;
padding:3px 8px;
border-radius:5px;
font-size:12px;
margin-left:5px;
}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>
<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
collection,
onSnapshot,
doc,
updateDoc,
getDoc,
getDocs,
addDoc,
runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
if(!lat2 || !lon2) return null;

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

// 🔐 AUTH
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;
const shopCategory = localStorage.getItem("shopCategory") || "all";
const shopLat = parseFloat(localStorage.getItem("shopLat"));
const shopLng = parseFloat(localStorage.getItem("shopLng"));

// 🔄 LISTEN ORDERS
onSnapshot(collection(db,"orders"), async(snapshot)=>{

ordersDiv.innerHTML="";
let count = 0;

for(const docSnap of snapshot.docs){

const order = docSnap.data();
const id = docSnap.id;

// ❌ skip finished
if(order.status==="Delivered" || order.status==="Rejected") continue;

// ✅ CATEGORY FILTER
if(shopCategory !== "all" && order.category && order.category !== shopCategory) continue;

// 📍 DISTANCE FILTER
if(shopLat && shopLng && order.customerLat && order.customerLng){
let dist = getDistance(shopLat, shopLng, order.customerLat, order.customerLng);
if(dist > 20) continue;
}

// 🔥 SHOW LOGIC
// Show all if not assigned
// Show only own if assigned
if(order.assigned === true && order.shopEmail !== shopEmail) continue;

count++;

// 🛒 ITEMS
let itemsHTML = "";
if(order.items){
itemsHTML = order.items.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("");
}

// 🏷️ BADGES
let badge = "";
if(order.isSplit) badge += `<span class="badge">Split</span>`;
if(order.parentOrderId) badge += `<span class="badge">Child</span>`;

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b> ${badge}<br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

<b>🛒 Items:</b><br>
${itemsHTML}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>
`;

}

if(count===0){
ordersDiv.innerHTML="<h3>❌ No orders available</h3>";
}

});

});

// 🔒 ACCEPT (TRANSACTION)
window.accept = async (id)=>{

const ref = doc(db,"orders",id);

try{

await runTransaction(db, async(transaction)=>{

const snap = await transaction.get(ref);

if(!snap.exists()) throw "Order not found";

const order = snap.data();

if(order.assigned === true){
throw "Already accepted";
}

transaction.update(ref,{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});

});

alert("✅ Order Accepted");

}catch(e){
alert("❌ "+e);
}

};

// 📦 READY → MULTI SPLIT
window.ready = async (id)=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);
const order = snap.data();

let selected = [];
let remaining = [];

// SPLIT ITEMS
order.items.forEach((item,i)=>{
let checkbox = document.getElementById(`item_${id}_${i}`);

if(checkbox && checkbox.checked){
selected.push(item);
}else{
remaining.push(item);
}
});

if(selected.length === 0){
alert("Select at least 1 item");
return;
}

// ✅ UPDATE CURRENT ORDER
await updateDoc(ref,{
items:selected,
total:selected.reduce((s,i)=>s+i.price,0),
status:"Ready"
});

// 🔥 MULTI SHOP SPLIT
if(remaining.length > 0){

const shopsSnap = await getDocs(collection(db,"localshop-details"));

for(const s of shopsSnap.docs){

let shop = s.data();

if(shop.email === auth.currentUser.email) continue;
if(shop.category !== order.category) continue;

let dist = getDistance(
shop.lat, shop.lng,
order.customerLat, order.customerLng
);

if(dist > 20) continue;

// ❌ stop if no items
if(remaining.length === 0) break;

// 👉 assign 1 item per shop
let itemToSend = [remaining.shift()];

await addDoc(collection(db,"orders"),{

parentOrderId:id,
isSplit:true,

name: order.name,
phone: order.phone,
address: order.address,

customerLat: order.customerLat,
customerLng: order.customerLng,

shopEmail: shop.email,
shopLat: shop.lat,
shopLng: shop.lng,

items: itemToSend,
total: itemToSend.reduce((s,i)=>s+i.price,0),

status:"Pending",
assigned:false,

time:new Date()

});

}

}

alert("✅ Order Split Successfully");

};

// ❌ REJECT
window.reject = async id=>{
await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

</script>

</body>
</html>
