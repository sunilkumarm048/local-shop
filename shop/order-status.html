<!DOCTYPE html>
<html>
<head>

<title>Active Orders</title>

<style>
body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.partial{background:orange;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:12px 18px;
border-radius:8px;
display:none;
}

.item{
margin:5px 0;
}
</style>

</head>

<body>

<h2>📦 Active Orders</h2>

<div id="orders"></div>

<div id="popup" class="popup">🔔 New Order</div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, 
onSnapshot, 
doc, 
updateDoc, 
getDoc, 
addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const popup = document.getElementById("popup");

let lastCount = 0;

// 🔔 POPUP
function showPopup(msg){
popup.innerText = msg;
popup.style.display = "block";

setTimeout(()=>{
popup.style.display = "none";
},2000);
}

onAuthStateChanged(auth,(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔥 LIVE ORDERS
onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";
let currentCount = 0;

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ✅ ONLY THIS SHOP
if(order.shopEmail !== shopEmail) return;

// ❌ REMOVE OLD ORDERS (IMPORTANT FIX)
if(
order.deliveryStatus === "Delivered" ||
order.status === "Delivered" ||
order.status === "Rejected"
){
return;
}

// ⏱ AUTO REMOVE AFTER 30 MIN
if(order.time){
let now = new Date();
let orderTime = new Date(order.time.seconds * 1000);

let diff = (now - orderTime) / (1000*60);

if(diff > 30){
return;
}
}

currentCount++;

// ITEMS WITH CHECKBOX
let itemsHTML = "";
order.items.forEach((i,index)=>{
itemsHTML += `
<div class="item">
<input type="checkbox" id="item_${id}_${index}" checked>
${i.name} x${i.qty}
</div>`;
});

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

${itemsHTML}

Total: ₹${order.total}<br>
Status: ${order.status}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="partial" onclick="partialAccept('${id}')">Partial</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>
`;

});

// 🔔 NOTIFICATION
if(currentCount > lastCount){
showPopup("🆕 New Order Received!");
}

lastCount = currentCount;

});

});

// ✅ ACCEPT FULL
window.accept = id=>{
updateDoc(doc(db,"orders",id),{
status:"Accepted"
});
};

// ✅ READY
window.ready = id=>{
updateDoc(doc(db,"orders",id),{
status:"Ready",
deliveryStatus:"On the way"
});
};

// ❌ REJECT
window.reject = id=>{
updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

// 🔥 PARTIAL ACCEPT (IMPORTANT FEATURE)
window.partialAccept = async function(id){

const orderRef = doc(db,"orders",id);
const snap = await getDoc(orderRef);
const order = snap.data();

const checkboxes = document.querySelectorAll(`[id^="item_${id}_"]`);

let selected = [];
let remaining = [];

checkboxes.forEach((cb,index)=>{
if(cb.checked){
selected.push(order.items[index]);
}else{
remaining.push(order.items[index]);
}
});

if(selected.length === 0){
alert("Select at least 1 item");
return;
}

// ✅ UPDATE CURRENT ORDER
await updateDoc(orderRef,{
items: selected,
status: "Accepted"
});

// 🔥 SEND REMAINING TO OTHER SHOP
if(remaining.length > 0){

await addDoc(collection(db,"orders"),{

name: order.name,
phone: order.phone,
address: order.address,

items: remaining,
total: remaining.reduce((t,i)=>t+i.price*i.qty,0),

status:"Pending",
deliveryStatus:"Waiting",

shopEmail: null, // NEW SHOP WILL TAKE

time: new Date()

});

}

alert("✅ Partial accepted");

};

</script>

</body>
</html>
