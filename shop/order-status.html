<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.split{background:orange;}

.badge{
background:#ddd;
padding:3px 8px;
border-radius:5px;
font-size:12px;
margin-left:5px;
}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>
<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc,
getDoc, getDocs, addDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
if(!lat2 || !lon2) return null;
const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;
const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;
return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 🔐 AUTH
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;
const shopCategory = localStorage.getItem("shopCategory") || "all";
const shopLat = parseFloat(localStorage.getItem("shopLat"));
const shopLng = parseFloat(localStorage.getItem("shopLng"));

// 🔄 LISTEN BOTH COLLECTIONS
onSnapshot(collection(db,"orders"), snap => render(snap,false));
onSnapshot(collection(db,"split-orders"), snap => render(snap,true));

function render(snapshot, isSplit){

snapshot.docs.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ skip completed
if(order.status==="Delivered" || order.status==="Rejected") return;

// ✅ CATEGORY
if(shopCategory !== "all" && order.category && order.category !== shopCategory) return;

// 📍 DISTANCE
if(shopLat && shopLng && order.customerLat && order.customerLng){
let dist = getDistance(shopLat, shopLng, order.customerLat, order.customerLng);
if(dist > 20) return;
}

// 🔥 VISIBILITY
if(!isSplit){
if(order.assigned === true && order.shopEmail !== shopEmail) return;
}else{
if(order.shopEmail !== shopEmail) return;
}

// 🛒 ITEMS
let itemsHTML = order.items?.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("") || "";

// 🎯 BUTTONS
let buttons = "";

// Pending
if(order.status==="Pending"){
buttons = `
<button class="accept" onclick="accept('${id}',${isSplit})">Accept</button>
<button class="reject" onclick="reject('${id}',${isSplit})">Reject</button>
`;
}

// Accepted
else if(order.status==="Accepted"){
buttons = `
<button class="split" onclick="splitOrder('${id}')">Split</button>
<button class="ready" onclick="markReady('${id}',${isSplit})">Ready</button>
`;
}

// Ready
else if(order.status==="Ready"){
buttons = `<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML += `
<div class="order">
<b>${order.name}</b> ${isSplit ? '<span class="badge">Split</span>' : ''}<br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

<b>🛒 Items:</b><br>
${itemsHTML}<br>

${buttons}
</div>
`;

});

}

// 🔒 ACCEPT
window.accept = async(id,isSplit)=>{
const col = isSplit ? "split-orders" : "orders";
const ref = doc(db,col,id);

try{
await runTransaction(db, async(tx)=>{
let snap = await tx.get(ref);
let data = snap.data();

if(data.assigned) throw "Already accepted";

tx.update(ref,{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});
});
alert("✅ Accepted");
}catch(e){ alert(e); }
};

// 📦 SPLIT
window.splitOrder = async(id)=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);
const order = snap.data();

let selected=[], remaining=[];

order.items.forEach((item,i)=>{
let cb=document.getElementById(`item_${id}_${i}`);
if(cb && cb.checked) selected.push(item);
else remaining.push(item);
});

// update main
await updateDoc(ref,{
items:selected,
total:selected.reduce((s,i)=>s+i.price,0)
});

// create split orders
if(remaining.length>0){

const shopsSnap = await getDocs(collection(db,"localshop-details"));

for(const s of shopsSnap.docs){

let shop=s.data();

if(shop.email===auth.currentUser.email) continue;
if(shop.category!==order.category) continue;

let dist=getDistance(shop.lat,shop.lng,order.customerLat,order.customerLng);
if(dist>20) continue;

if(remaining.length===0) break;

let item=[remaining.shift()];

await addDoc(collection(db,"split-orders"),{
parentOrderId:id,
name:order.name,
phone:order.phone,
address:order.address,
customerLat:order.customerLat,
customerLng:order.customerLng,
shopEmail:shop.email,
items:item,
total:item.reduce((s,i)=>s+i.price,0),
status:"Pending",
assigned:false,
time:new Date()
});

}

}

alert("✅ Split Done");
};

// 🚚 READY
window.markReady = async(id,isSplit)=>{
const col = isSplit ? "split-orders" : "orders";
await updateDoc(doc(db,col,id),{status:"Ready"});
alert("✅ Ready");
};

// ❌ REJECT
window.reject = async(id,isSplit)=>{
const col = isSplit ? "split-orders" : "orders";
await updateDoc(doc(db,col,id),{status:"Rejected"});
};

});

</script>

</body>
</html>
