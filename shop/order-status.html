<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.partial{background:orange;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>

<div id="orders"></div>
<div id="popup" class="popup"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const popup = document.getElementById("popup");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let lastCount = 0;

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){

if(!lat2 || !lon2) return 0;

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R*c;
}

// 🔔 POPUP
function showPopup(msg){
popup.innerText = msg;
popup.style.display = "block";
setTimeout(()=> popup.style.display="none",2000);
}

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 📍 GET SHOP LOCATION
let shopLat=20.2961;
let shopLng=85.8245;

// 🔥 ORDERS
onSnapshot(collection(db,"orders"), async(snapshot)=>{

ordersDiv.innerHTML="";
let currentCount = 0;

for(const docSnap of snapshot.docs){

const order = docSnap.data();
const id = docSnap.id;

// ❌ REMOVE OLD
if(
order.deliveryStatus==="Delivered" ||
order.status==="Delivered" ||
order.status==="Rejected"
){
continue;
}

// ⏱ AUTO REMOVE
if(order.time){
let diff = (new Date() - new Date(order.time.seconds*1000))/(1000*60);
if(diff > 30) continue;
}

// 🧠 MATCH
if(order.shopEmail && order.shopEmail !== shopEmail) continue;

currentCount++;

// 📍 DISTANCE
let distance = getDistance(shopLat,shopLng,order.lat,order.lng).toFixed(2);

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>
📏 ${distance} km<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>
`;

}

// 🔔 SOUND
if(currentCount > lastCount){
audio.play();
showPopup("New Order!");
}

lastCount = currentCount;

});

});

// ✅ ACCEPT
window.accept = id=>{
updateDoc(doc(db,"orders",id),{
status:"Accepted",
shopEmail: auth.currentUser.email
});
};

// 🚚 READY → ASSIGN DELIVERY
window.ready = async id=>{

const snap = await getDocs(collection(db,"delivery"));

let boy = null;

snap.forEach(d=>{
if(d.data().available && !boy){
boy = {id:d.id, data:d.data()};
}
});

if(!boy){
alert("No delivery boy available");
return;
}

await updateDoc(doc(db,"orders",id),{
status:"Ready",
deliveryBoy: boy.data.email,
deliveryStatus:"Assigned"
});

await updateDoc(doc(db,"delivery",boy.id),{
available:false
});

};

// ❌ REJECT
window.reject = id=>{
updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

</script>

</body>
</html>
