<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>

<div id="orders"></div>
<div id="popup" class="popup"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const popup = document.getElementById("popup");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let lastCount = 0;

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
if(!lat2 || !lon2) return null;

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

// 🔔 POPUP
function showPopup(msg){
popup.innerText = msg;
popup.style.display = "block";
setTimeout(()=> popup.style.display="none",2000);
}

// 🔐 AUTH
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔥 GET SHOP DATA (SAFE DEFAULT)
const shopCategory = localStorage.getItem("shopCategory") || "all";
const shopLat = parseFloat(localStorage.getItem("shopLat"));
const shopLng = parseFloat(localStorage.getItem("shopLng"));

console.log("SHOP:", shopCategory, shopLat, shopLng);

// 🔄 ORDERS
onSnapshot(collection(db,"orders"), async(snapshot)=>{

ordersDiv.innerHTML="";
let currentCount = 0;

for(const docSnap of snapshot.docs){

const order = docSnap.data();
const id = docSnap.id;

console.log("ORDER:", order);

// ❌ skip finished
if(order.status==="Delivered" || order.status==="Rejected") continue;

// ✅ CATEGORY (allow all if "all")
if(shopCategory !== "all" && order.category && order.category !== shopCategory){
console.log("❌ Category mismatch");
continue;
}

// 📍 DISTANCE CHECK (ONLY if location exists)
let distance = null;

if(shopLat && shopLng && order.customerLat && order.customerLng){
distance = getDistance(shopLat, shopLng, order.customerLat, order.customerLng);

if(distance > 20){
console.log("❌ Too far:", distance);
continue;
}
}else{
console.log("⚠️ Location missing → showing order anyway");
}

// ❌ already taken
if(order.assigned === true && order.shopEmail !== shopEmail){
console.log("❌ Taken by another shop");
continue;
}

currentCount++;

// 🛒 ITEMS
let itemsHTML = "";
if(order.items){
itemsHTML = order.items.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("");
}

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>
📏 ${distance ? distance.toFixed(2)+" km" : "N/A"}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

<b>🛒 Select Available Items:</b><br>
${itemsHTML}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>
`;

}

// 🔔 sound
if(currentCount > lastCount){
audio.play();
showPopup("New Order!");
}

lastCount = currentCount;

// ❗ if nothing
if(currentCount === 0){
ordersDiv.innerHTML = "<h3>❌ No orders available</h3>";
}

});

});

// ✅ ACCEPT
window.accept = async id=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);
const order = snap.data();

if(order.assigned === true){
alert("❌ Already accepted");
return;
}

await updateDoc(ref,{
status:"Accepted",
shopEmail: auth.currentUser.email,
assigned:true
});

};

// 🚚 READY
window.ready = async id=>{

const ref = doc(db,"orders",id);

await updateDoc(ref,{
status:"Ready"
});

alert("✅ Order Ready");

};

// ❌ REJECT
window.reject = async id=>{
await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

</script>

</body>
</html>
