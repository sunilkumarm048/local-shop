<!DOCTYPE html>
<html>
<head>
<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.order{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:5px;padding:6px 10px;border:none;border-radius:5px;color:white;cursor:pointer;}
.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.split{background:orange;}
.info{color:#888;font-size:13px;}
</style>

</head>
<body>

<h2>📦 Smart Active Orders</h2>

<button onclick="goSplit()">✂️ View Split Orders</button>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc,
getDoc, addDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔄 MAIN ORDERS ONLY
onSnapshot(collection(db,"orders"), snap=>{
ordersDiv.innerHTML="";
render(snap);
});

// 🎨 RENDER FUNCTION
function render(snapshot){

let hasData = false;

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ Skip completed
if(order.status==="Delivered" || order.status==="Rejected") return;

// 🔥 LOCK LOGIC (FINAL)
if(order.assigned && order.shopEmail !== shopEmail) return;

hasData = true;

// ITEMS
let itemsHTML = order.items?.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("") || "";

// BUTTONS
let buttons="";

// 🟡 Pending
if(order.status==="Pending"){
buttons=`
<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="reject" onclick="reject('${id}')">Reject</button>
`;
}

// 🔵 Accepted
else if(order.status==="Accepted"){

// if taken by other shop
if(order.shopEmail !== shopEmail){
buttons=`<span class="info">Taken by another shop</span>`;
}else{
buttons=`
<button class="split" onclick="splitOrder('${id}')">Split</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
`;
}

}

// 🟢 Ready
else if(order.status==="Ready"){
buttons=`<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML+=`
<div class="order">
<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

${itemsHTML}
${buttons}
</div>
`;

});

// EMPTY STATE
if(!hasData){
ordersDiv.innerHTML = "<p>No active orders</p>";
}

}

// ✅ ACCEPT (SAFE TRANSACTION LOCK)
window.accept = async(id)=>{

const ref = doc(db,"orders",id);

try{

await runTransaction(db, async (transaction)=>{

const snap = await transaction.get(ref);

if(!snap.exists()) throw "Order not found";

const order = snap.data();

// 🔥 already taken
if(order.assigned){
alert("❌ Already accepted by another shop");
return;
}

transaction.update(ref,{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});

});

}catch(e){
console.error(e);
}

};

// ✅ READY
window.ready = async(id)=>{
await updateDoc(doc(db,"orders",id),{
status:"Ready",
deliveryStatus:"Ready"
});
alert("✅ Order Ready");
};

// ❌ REJECT
window.reject = async(id)=>{
await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

// 🔥 SPLIT FUNCTION (FINAL)
window.splitOrder = async(id)=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);

if(!snap.exists()){
alert("Order not found");
return;
}

const order = snap.data();

let selected = [];
let remaining = [];

// SPLIT ITEMS
order.items.forEach((item,i)=>{
let cb = document.getElementById(`item_${id}_${i}`);
if(cb && cb.checked) selected.push(item);
else remaining.push(item);
});

// ❌ prevent invalid split
if(remaining.length === 0){
alert("⚠️ Select items to split");
return;
}

// ✅ UPDATE MAIN ORDER
await updateDoc(ref,{
items:selected,
total:selected.reduce((s,i)=>s+i.price,0)
});

// ✅ CREATE SPLIT ORDER
await addDoc(collection(db,"split-orders"),{

parentOrderId:id,

name:order.name,
phone:order.phone,
address:order.address,

customerLat: order.customerLat || 0,
customerLng: order.customerLng || 0,

// 🔥 IMPORTANT FIX
shopEmail: auth.currentUser.email,

items: remaining,
total: remaining.reduce((s,i)=>s+i.price,0),

status:"Pending",
deliveryStatus:"Pending",
assigned:false,

time:new Date()
});

alert("✅ Split Created → Check Split Orders");

};

// 🔁 NAVIGATION
window.goSplit = ()=>{
location.href="split-order.html";
};

});

</script>
</body>
</html>
