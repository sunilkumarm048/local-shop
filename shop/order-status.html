<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.partial{background:orange;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:12px 18px;
border-radius:8px;
display:none;
}

.item{margin:5px 0;}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>

<div id="orders"></div>
<div id="popup" class="popup"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
collection, onSnapshot, doc, updateDoc, getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const popup = document.getElementById("popup");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let lastCount = 0;

// 📏 DISTANCE FUNCTION
function getDistance(lat1, lon1, lat2, lon2){

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R*c;
}

// 🔔 POPUP
function showPopup(msg){
popup.innerText = msg;
popup.style.display = "block";
setTimeout(()=> popup.style.display="none",2000);
}

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 📍 GET SHOP LOCATION
let shopLat=0, shopLng=0;

const shopSnap = await getDocs(collection(db,"localshop-details"));
shopSnap.forEach(s=>{
if(s.data().email === shopEmail){
shopLat = s.data().lat;
shopLng = s.data().lng;
}
});

// 🔥 LIVE ORDERS
onSnapshot(collection(db,"orders"),async(snapshot)=>{

ordersDiv.innerHTML="";
let currentCount = 0;

for(const docSnap of snapshot.docs){

const order = docSnap.data();
const id = docSnap.id;

// ❌ REMOVE OLD
if(order.deliveryStatus==="Delivered" || order.status==="Rejected") continue;

// ⏱ AUTO REMOVE 30 MIN
if(order.time){
let diff = (new Date() - new Date(order.time.seconds*1000))/(1000*60);
if(diff>30) continue;
}

// 🧠 SMART MATCHING (ONLY NEAREST SHOP SEE ORDER)
if(!order.shopEmail){

let dist = getDistance(shopLat,shopLng,order.lat||0,order.lng||0);

if(dist > 5) continue; // only within 5km
}

// 🏪 FILTER
if(order.shopEmail && order.shopEmail !== shopEmail) continue;

currentCount++;

// 📍 DISTANCE SHOW
let distance = getDistance(shopLat,shopLng,order.lat||0,order.lng||0).toFixed(2);

// ITEMS
let itemsHTML="";
order.items.forEach((i,index)=>{
itemsHTML += `
<div class="item">
<input type="checkbox" id="item_${id}_${index}" checked>
${i.name} x${i.qty}
</div>`;
});

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>
📏 Distance: ${distance} km<br><br>

${itemsHTML}

Total: ₹${order.total}<br>
Status: ${order.status}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="partial" onclick="partialAccept('${id}')">Partial</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>`;
}

// 🔔 SOUND ONLY ON NEW ORDER
if(currentCount > lastCount){
audio.play();
showPopup("🆕 New Order!");
}

lastCount = currentCount;

});

});

// ✅ ACCEPT
window.accept = id=>{
updateDoc(doc(db,"orders",id),{
status:"Accepted",
shopEmail: auth.currentUser.email
});
};

// 🚚 READY → AUTO ASSIGN DELIVERY
window.ready = async id=>{

// find delivery boy
const snap = await getDocs(collection(db,"delivery"));

let boy = null;

snap.forEach(d=>{
if(d.data().available && !boy){
boy = d;
}
});

if(boy){
await updateDoc(doc(db,"orders",id),{
status:"Ready",
deliveryBoy: boy.data().email,
deliveryStatus:"Assigned"
});

await updateDoc(doc(db,"delivery",boy.id),{
available:false
});
}else{
alert("No delivery boy available");
}

};

// ❌ REJECT
window.reject = id=>{
updateDoc(doc(db,"orders",id),{status:"Rejected"});
};

// 🔥 PARTIAL
window.partialAccept = async function(id){

const orderRef = doc(db,"orders",id);
const snap = await getDocs(collection(db,"orders"));

let order;
snap.forEach(d=>{
if(d.id===id) order=d.data();
});

const checkboxes = document.querySelectorAll(`[id^="item_${id}_"]`);

let selected=[], remaining=[];

checkboxes.forEach((cb,i)=>{
if(cb.checked) selected.push(order.items[i]);
else remaining.push(order.items[i]);
});

await updateDoc(orderRef,{
items:selected,
status:"Accepted"
});

if(remaining.length>0){

await addDoc(collection(db,"orders"),{
...order,
items:remaining,
status:"Pending",
shopEmail:null
});

}

alert("Partial done");

};

</script>

</body>
</html>
