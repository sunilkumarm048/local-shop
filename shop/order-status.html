<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.split{background:orange;}

.badge{
background:#ddd;
padding:3px 8px;
border-radius:5px;
font-size:12px;
margin-left:5px;
}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>
<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc,
getDoc, getDocs, addDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

// 🔐 AUTH
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔄 LISTEN MAIN
onSnapshot(collection(db,"orders"), snap=>{
ordersDiv.innerHTML="";
render(snap,false);
});

// 🔄 LISTEN SPLIT
onSnapshot(collection(db,"split-orders"), snap=>{
render(snap,true);
});

// 🎨 RENDER
function render(snapshot, isSplit){

snapshot.docs.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

console.log("SHOW ORDER:", order, "isSplit:", isSplit);

// ❌ skip completed
if(order.status==="Delivered" || order.status==="Rejected") return;

// 🔥 VISIBILITY
if(!isSplit){
if(order.assigned && order.shopEmail !== shopEmail) return;
}else{
if(order.shopEmail !== shopEmail) return;
}

// 🛒 ITEMS
let itemsHTML = order.items?.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("") || "";

// 🎯 BUTTONS
let buttons="";

if(order.status==="Pending"){
buttons=`
<button class="accept" onclick="accept('${id}',${isSplit})">Accept</button>
<button class="reject" onclick="reject('${id}',${isSplit})">Reject</button>
`;
}
else if(order.status==="Accepted"){
buttons=`
<button class="split" onclick="splitOrder('${id}')">Split</button>
<button class="ready" onclick="ready('${id}',${isSplit})">Ready</button>
`;
}
else if(order.status==="Ready"){
buttons=`<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML+=`
<div class="order">
<b>${order.name}</b> ${isSplit?'<span class="badge">Split</span>':''}<br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

${itemsHTML}

${buttons}
</div>
`;

});

}

// 🔒 ACCEPT
window.accept=async(id,isSplit)=>{

const col=isSplit?"split-orders":"orders";
const ref=doc(db,col,id);

try{
await runTransaction(db, async(tx)=>{
let snap=await tx.get(ref);
let data=snap.data();

if(data.assigned) throw "Already accepted";

tx.update(ref,{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});
});

alert("✅ Accepted");

}catch(e){
alert("❌ "+e);
}

};

// 🚀 SPLIT (FORCE WORKING)
window.splitOrder=async(id)=>{

console.log("🔥 SPLIT START");

const ref=doc(db,"orders",id);
const snap=await getDoc(ref);
const order=snap.data();

let selected=[], remaining=[];

// SPLIT
order.items.forEach((item,i)=>{
let cb=document.getElementById(`item_${id}_${i}`);
if(cb && cb.checked) selected.push(item);
else remaining.push(item);
});

console.log("SELECTED:", selected);
console.log("REMAINING:", remaining);

// FORCE split if empty
if(remaining.length===0){
remaining.push(order.items[0]);
console.log("⚠️ FORCED SPLIT");
}

// UPDATE MAIN
await updateDoc(ref,{
items:selected,
total:selected.reduce((s,i)=>s+i.price,0)
});

// 🔥 CREATE SPLIT (NO FILTER)
try{

await addDoc(collection(db,"split-orders"),{

parentOrderId:id,

name:order.name,
phone:order.phone,
address:order.address,

customerLat:order.customerLat || 0,
customerLng:order.customerLng || 0,

shopEmail:"test@shop.com",   // TEMP

category: order.category || "general",

items:[remaining[0]],
total:remaining[0].price,

status:"Pending",
assigned:false,

time:new Date()

});

console.log("✅ SPLIT CREATED");

alert("✅ Split Created! Check Firestore");

}catch(e){
console.error("❌ ERROR:", e);
alert("Error: "+e.message);
}

};

// 🚚 READY
window.ready=async(id,isSplit)=>{
const col=isSplit?"split-orders":"orders";
await updateDoc(doc(db,col,id),{status:"Ready"});
alert("✅ Ready");
};

// ❌ REJECT
window.reject=async(id,isSplit)=>{
const col=isSplit?"split-orders":"orders";
await updateDoc(doc(db,col,id),{status:"Rejected"});
};

});

</script>

</body>
</html>
