<!DOCTYPE html>
<html>
<head>
<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.order{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:5px;padding:6px 10px;border:none;border-radius:5px;color:white;cursor:pointer;}
.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}
.split{background:orange;}
</style>

</head>
<body>

<h2>📦 Smart Active Orders</h2>

<button onclick="goSplit()">✂️ View Split Orders</button>

<div id="orders"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
collection, onSnapshot, doc, updateDoc,
getDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// ✅ ONLY MAIN ORDERS
onSnapshot(collection(db,"orders"), snap=>{
ordersDiv.innerHTML="";
render(snap);
});

// 🎨 RENDER FUNCTION
function render(snapshot){

if(snapshot.empty){
ordersDiv.innerHTML = "<p>No orders available</p>";
return;
}

snapshot.forEach(docSnap=>{

const order = docSnap.data();
const id = docSnap.id;

// ❌ Skip completed
if(order.status==="Delivered" || order.status==="Rejected") return;

// ✅ FIXED FILTER (NO CROSS SHOP ISSUE)
if(order.shopEmail && order.shopEmail !== shopEmail) return;

// ITEMS
let itemsHTML = order.items?.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("") || "";

// BUTTONS
let buttons="";

if(order.status==="Pending"){
buttons=`
<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="reject" onclick="reject('${id}')">Reject</button>
`;
}
else if(order.status==="Accepted"){
buttons=`
<button class="split" onclick="splitOrder('${id}')">Split</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
`;
}
else if(order.status==="Ready"){
buttons=`<button class="ready">Ready ✔</button>`;
}

// UI
ordersDiv.innerHTML+=`
<div class="order">
<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

${itemsHTML}
${buttons}
</div>
`;

});
}

// ✅ ACCEPT
window.accept=async(id)=>{
await updateDoc(doc(db,"orders",id),{
assigned:true,
shopEmail: auth.currentUser.email,
status:"Accepted"
});
};

// ✅ READY
window.ready=async(id)=>{
await updateDoc(doc(db,"orders",id),{
status:"Ready",
deliveryStatus:"Ready"
});
alert("✅ Order Ready");
};

// ❌ REJECT
window.reject=async(id)=>{
await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

// 🔥 SPLIT (FINAL FIXED VERSION)
window.splitOrder=async(id)=>{

const ref = doc(db,"orders",id);
const snap = await getDoc(ref);

if(!snap.exists()){
alert("Order not found");
return;
}

const order = snap.data();

let selected = [];
let remaining = [];

// SPLIT ITEMS
order.items.forEach((item,i)=>{
let cb = document.getElementById(`item_${id}_${i}`);
if(cb && cb.checked) selected.push(item);
else remaining.push(item);
});

// ❌ PREVENT WRONG SPLIT
if(remaining.length === 0){
alert("⚠️ Select at least one item to split");
return;
}

// ✅ UPDATE MAIN ORDER
await updateDoc(ref,{
items:selected,
total:selected.reduce((s,i)=>s+i.price,0)
});

// ✅ CREATE SPLIT ORDER (IMPORTANT FIX)
await addDoc(collection(db,"split-orders"),{

parentOrderId: id,

name: order.name,
phone: order.phone,
address: order.address,

customerLat: order.customerLat || 0,
customerLng: order.customerLng || 0,

// 🔥 CRITICAL FIX
shopEmail: auth.currentUser.email,

items: remaining,
total: remaining.reduce((s,i)=>s+i.price,0),

status:"Pending",
deliveryStatus:"Pending",
assigned:false,

time:new Date()
});

alert("✅ Split Created Successfully");

};

// 🔁 NAVIGATION
window.goSplit=()=>{
location.href="split-order.html";
};

});

</script>
</body>
</html>
