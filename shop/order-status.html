<!DOCTYPE html>
<html>
<head>

<title>Smart Orders</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin:5px;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.accept{background:green;}
.ready{background:blue;}
.reject{background:red;}

.popup{
position:fixed;
top:20px;
right:20px;
background:#28a745;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>

</head>

<body>

<h2>📦 Smart Active Orders</h2>

<div id="orders"></div>
<div id="popup" class="popup"></div>

<script type="module">

import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, onSnapshot, doc, updateDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const popup = document.getElementById("popup");

let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let lastCount = 0;

// 📏 DISTANCE FUNCTION
function getDistance(lat1, lon1, lat2, lon2){
if(!lat2 || !lon2) return 9999;

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

// 🔔 POPUP
function showPopup(msg){
popup.innerText = msg;
popup.style.display = "block";
setTimeout(()=> popup.style.display="none",2000);
}

// 🔐 AUTH
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
location.href="login.html";
return;
}

const shopEmail = user.email;

// 🔥 IMPORTANT: Replace with real shop data (from DB ideally)
const shopCategory = localStorage.getItem("shopCategory") || "general";
const shopLat = parseFloat(localStorage.getItem("shopLat")) || 20.2961;
const shopLng = parseFloat(localStorage.getItem("shopLng")) || 85.8245;

// 🔄 LISTEN ORDERS
onSnapshot(collection(db,"orders"), async(snapshot)=>{

ordersDiv.innerHTML="";
let currentCount = 0;

for(const docSnap of snapshot.docs){

const order = docSnap.data();
const id = docSnap.id;

// ❌ Skip completed
if(order.status==="Delivered" || order.status==="Rejected") continue;

// ✅ CATEGORY FILTER
if(order.category && order.category !== shopCategory) continue;

// 📍 DISTANCE FILTER (20 KM MAX)
let distance = getDistance(
shopLat,
shopLng,
order.customerLat,
order.customerLng
);

if(distance > 20) continue;

// ❌ Hide if taken by other shop
if(order.assigned === true && order.shopEmail !== shopEmail) continue;

currentCount++;

// 🛒 ITEMS
let itemsHTML = "";
if(order.items){
itemsHTML = order.items.map((item,i)=>`
<label>
<input type="checkbox" id="item_${id}_${i}" checked>
${item.name} ₹${item.price}
</label><br>
`).join("");
}

// UI
ordersDiv.innerHTML += `
<div class="order">

<b>${order.name}</b><br>
📞 ${order.phone}<br>
📍 ${order.address}<br>
📏 ${distance.toFixed(2)} km<br><br>

Total: ₹${order.total}<br>
Status: ${order.status}<br><br>

<b>🛒 Select Available Items:</b><br>
${itemsHTML}<br>

<button class="accept" onclick="accept('${id}')">Accept</button>
<button class="ready" onclick="ready('${id}')">Ready</button>
<button class="reject" onclick="reject('${id}')">Reject</button>

</div>
`;

}

// 🔔 SOUND ALERT
if(currentCount > lastCount){
audio.play();
showPopup("New Nearby Order!");
}

lastCount = currentCount;

});

});

// ✅ ACCEPT (LOCK ORDER)
window.accept = async id=>{

const orderRef = doc(db,"orders",id);
const orderSnap = await getDoc(orderRef);
const order = orderSnap.data();

// ❌ Already accepted
if(order.assigned === true){
alert("❌ Already accepted by another shop");
return;
}

// ✅ LOCK
await updateDoc(orderRef,{
status:"Accepted",
shopEmail: auth.currentUser.email,
assigned:true
});

};

// 🚚 READY
window.ready = async id=>{

const orderDoc = await getDoc(doc(db,"orders",id));
const order = orderDoc.data();

let availableItems = [];
let newTotal = 0;

// SELECT ITEMS
order.items.forEach((item,i)=>{
let checkbox = document.getElementById(`item_${id}_${i}`);

if(checkbox && checkbox.checked){
availableItems.push(item);
newTotal += item.price;
}
});

// FIND DELIVERY BOY
const snap = await getDocs(collection(db,"delivery"));

let nearestBoy = null;
let minDistance = 9999;

snap.forEach(d=>{
let data = d.data();

if(data.available && data.lat && data.lng){

let dist = getDistance(
data.lat,
data.lng,
order.customerLat,
order.customerLng
);

if(dist < minDistance){
minDistance = dist;
nearestBoy = {id:d.id, data:data};
}
}
});

if(!nearestBoy){
alert("No delivery boy available");
return;
}

// UPDATE ORDER
await updateDoc(doc(db,"orders",id),{
status:"Ready",
items: availableItems,
total: newTotal,
deliveryBoyId: nearestBoy.id,
deliveryBoyName: nearestBoy.data.name,
deliveryStatus:"Assigned",
isMain:true
});

// MARK DELIVERY BUSY
await updateDoc(doc(db,"delivery",nearestBoy.id),{
available:false
});

alert("✅ Order Ready & Assigned");

};

// ❌ REJECT
window.reject = async id=>{
await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});
};

</script>

</body>
</html>
