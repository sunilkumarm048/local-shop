<!DOCTYPE html>
<html>
<head>

<title>Add Product</title>

<style>
body{font-family:Arial;padding:20px;background:#f5f5f5;}
input{padding:10px;width:100%;margin-bottom:10px;}
button{padding:10px;background:#ff5a5f;color:white;border:none;width:100%;}
</style>

</head>

<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

<p id="msg"></p>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

window.addProduct = async function(){

const name = document.getElementById("name").value;
const price = Number(document.getElementById("price").value);
const shopEmail = localStorage.getItem("shopEmail");

if(!name || !price){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"products"),{
name,
price,
shopEmail,
available:true
});

document.getElementById("msg").innerText="✅ Product added";

}

</script>

</body>
</html>
