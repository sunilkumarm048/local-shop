<!DOCTYPE html>
<html>
<head>

<title>All Shops</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:20px;
}

.shop{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.info{
font-size:16px;
}

.category{
color:gray;
font-size:13px;
}

button{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
🏪 Admin - All Shops
</div>

<div class="container" id="shops">
Loading...
</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const container = document.getElementById("shops");

// LOAD SHOPS
async function loadShops(){

container.innerHTML = "Loading...";

const snapshot = await getDocs(collection(db,"shops"));

container.innerHTML = "";

snapshot.forEach(snap => {

let s = snap.data();

container.innerHTML += `
<div class="shop">

<div class="info">
<b>${s.icon} ${s.name}</b><br>
<span class="category">${s.category}</span>
</div>

<button onclick="deleteShop('${snap.id}')">Delete</button>

</div>
`;

});

}

loadShops();

// DELETE SHOP
window.deleteShop = async function(id){

if(confirm("Delete this shop?")){

await deleteDoc(doc(db,"shops",id));

loadShops();

}

}

</script>

</body>
</html>
