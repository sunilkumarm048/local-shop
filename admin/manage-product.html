<!DOCTYPE html>

<html>
<head>
<title>Manage Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
margin-top:12px;
padding:10px;
border:none;
border-radius:8px;
background:#ff5a5f;
color:white;
cursor:pointer;
}

.toggle{
display:flex;
gap:10px;
margin-bottom:15px;
}

.toggle button{
flex:1;
background:#ddd;
color:black;
}

.toggle button.active{
background:#ff5a5f;
color:white;
}

.result{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.actions button{
width:auto;
margin-right:5px;
padding:5px 10px;
}

.preview{
margin-top:10px;
text-align:center;
}

.preview img{
width:120px;
height:120px;
object-fit:contain;
border-radius:8px;
background:#fff;
}
</style>

</head>

<body>

<div class="container">

<h2>Manage Products</h2>

<div class="toggle">
<button id="addBtn" class="active" onclick="showAdd()">Add</button>
<button id="editBtn" onclick="showEdit()">Edit</button>
</div>

<!-- ADD -->

<div id="addSection">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<select id="category"></select> <select id="shop"></select>

<input type="file" id="image" multiple>

<button id="saveBtn" onclick="addProduct()">Save Product</button>

</div>

<!-- EDIT -->

<div id="editSection" style="display:none;">

<input id="search" placeholder="Search product">
<button onclick="searchProduct()">Search</button>

<div id="results"></div>

<div id="editForm" style="display:none;">

<input id="editName">
<input id="editPrice">

<select id="editCategory"></select> <select id="editShop"></select>

<input type="file" id="editImage" multiple>

<div class="preview" id="preview"></div>

<button id="updateBtn" onclick="updateProduct()">Update Product</button>

</div>

</div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection, addDoc, getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUD_NAME = "dqcafnvpi";
const UPLOAD_PRESET = "shop_upload";

let products = [];
let currentId = null;

// TOGGLE
window.showAdd = ()=>{
addSection.style.display="block";
editSection.style.display="none";
addBtn.classList.add("active");
editBtn.classList.remove("active");
}

window.showEdit = ()=>{
addSection.style.display="none";
editSection.style.display="block";
editBtn.classList.add("active");
addBtn.classList.remove("active");
}

// LOAD DATA
async function load(){

const prodSnap = await getDocs(collection(db,"products"));
products = prodSnap.docs.map(d=>({...d.data(), id:d.id}));

// categories
const catSnap = await getDocs(collection(db,"shops"));
catSnap.forEach(d=>{
category.innerHTML += `<option>${d.data().category}</option>`;
editCategory.innerHTML += `<option>${d.data().category}</option>`;
});

// shops
const shopSnap = await getDocs(collection(db,"localshop-details"));
shopSnap.forEach(d=>{
shop.innerHTML += `<option>${d.data().shopName}</option>`;
editShop.innerHTML += `<option>${d.data().shopName}</option>`;
});

}

load();

// UPLOAD IMAGES (SAFE)
async function uploadImages(files){

let urls = [];

for(let file of files){

try{

const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", UPLOAD_PRESET);

const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:formData
});

const data = await res.json();

if(data.secure_url){
urls.push(data.secure_url);
}else{
console.log("Upload failed:", data);
}

}catch(err){
console.log("Upload error:", err);
}

}

return urls;
}

// ADD PRODUCT (FIXED)
window.addProduct = async ()=>{

if(!name.value || !price.value){
alert("Enter name & price");
return;
}

saveBtn.innerText = "Uploading...";
saveBtn.disabled = true;

try{

let images = [];

if(image.files.length > 0){
images = await uploadImages(image.files);
}

await addDoc(collection(db,"products"),{
name: name.value,
price: Number(price.value),
category: category.value,
shopName: shop.value,
images: images || []
});

alert("✅ Product Added");

// reset form
name.value = "";
price.value = "";
image.value = "";

}catch(err){
console.error(err);
alert("❌ Error: " + err.message);
}

saveBtn.innerText = "Save Product";
saveBtn.disabled = false;
}

// SEARCH
window.searchProduct = ()=>{

let text = search.value.toLowerCase();
results.innerHTML="";

products
.filter(p=>p.name.toLowerCase().includes(text))
.forEach(p=>{

results.innerHTML += `
<div class="result">
<b>${p.name}</b> - ₹${p.price}
<div class="actions">
<button onclick="edit('${p.id}')">Edit</button>
<button onclick="remove('${p.id}')">Delete</button>
</div>
</div>
`;

});
}

// EDIT LOAD
window.edit = (id)=>{

let p = products.find(x=>x.id===id);
if(!p) return;

currentId = id;
editForm.style.display="block";

editName.value = p.name;
editPrice.value = p.price;
editCategory.value = p.category;
editShop.value = p.shopName;

preview.innerHTML = p.images?.[0] ? `<img src="${p.images[0]}">` : "";
}

// UPDATE PRODUCT (FIXED)
window.updateProduct = async ()=>{

if(!currentId){
alert("Click Edit first");
return;
}

updateBtn.innerText = "Updating...";
updateBtn.disabled = true;

try{

let updateData = {
name: editName.value,
price: Number(editPrice.value),
category: editCategory.value,
shopName: editShop.value
};

if(editImage.files.length > 0){
let newImages = await uploadImages(editImage.files);
updateData.images = newImages;
}

await updateDoc(doc(db,"products",currentId), updateData);

alert("✅ Updated");

editForm.style.display="none";
currentId = null;

}catch(err){
console.error(err);
alert("❌ Update failed");
}

updateBtn.innerText = "Update Product";
updateBtn.disabled = false;
}

// DELETE
window.remove = async (id)=>{
await deleteDoc(doc(db,"products",id));
alert("Deleted");
location.reload();
}

</script>

</body>
</html>
