<!DOCTYPE html>

<html>
<head>
<title>Manage Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
margin-top:12px;
padding:10px;
border:none;
border-radius:8px;
background:#ff5a5f;
color:white;
cursor:pointer;
}

.toggle{
display:flex;
gap:10px;
margin-bottom:15px;
}

.toggle button{
flex:1;
background:#ddd;
color:black;
}

.toggle .active{
background:#ff5a5f;
color:white;
}

.result{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.actions button{
width:auto;
margin-right:5px;
padding:5px 10px;
}

.preview img{
width:120px;
height:120px;
object-fit:contain;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Manage Products</h2>

<div class="toggle">
<button id="addBtn" class="active">Add</button>
<button id="editBtn">Edit</button>
</div>

<!-- ADD -->

<div id="addSection">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<select id="category"></select> <select id="shop"></select>

<input type="file" id="image" multiple>

<button id="saveBtn">Save Product</button>

</div>

<!-- EDIT -->

<div id="editSection" style="display:none;">

<input id="search" placeholder="Search product">
<button id="searchBtn">Search</button>

<div id="results"></div>

<div id="editForm" style="display:none;">

<input id="editName">
<input id="editPrice">

<select id="editCategory"></select> <select id="editShop"></select>

<input type="file" id="editImage" multiple>

<div id="preview"></div>

<button id="updateBtn">Update Product</button>

</div>

</div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection, addDoc, getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUD_NAME = "dqcafnvpi";
const UPLOAD_PRESET = "shop_upload";

// ✅ DOM (clean structure)
const DOM = {
name: document.getElementById("name"),
price: document.getElementById("price"),
category: document.getElementById("category"),
shop: document.getElementById("shop"),
image: document.getElementById("image"),
saveBtn: document.getElementById("saveBtn"),

search: document.getElementById("search"),
searchBtn: document.getElementById("searchBtn"),
results: document.getElementById("results"),

editName: document.getElementById("editName"),
editPrice: document.getElementById("editPrice"),
editCategory: document.getElementById("editCategory"),
editShop: document.getElementById("editShop"),
editImage: document.getElementById("editImage"),
updateBtn: document.getElementById("updateBtn"),
preview: document.getElementById("preview"),

addSection: document.getElementById("addSection"),
editSection: document.getElementById("editSection"),
editForm: document.getElementById("editForm"),

addBtn: document.getElementById("addBtn"),
editBtn: document.getElementById("editBtn")
};

let products = [];
let currentId = null;

// 🔁 TOGGLE
DOM.addBtn.onclick = ()=>{
DOM.addSection.style.display="block";
DOM.editSection.style.display="none";
DOM.addBtn.classList.add("active");
DOM.editBtn.classList.remove("active");
};

DOM.editBtn.onclick = ()=>{
DOM.addSection.style.display="none";
DOM.editSection.style.display="block";
DOM.editBtn.classList.add("active");
DOM.addBtn.classList.remove("active");
};

// 📥 LOAD DATA
async function load(){

const prodSnap = await getDocs(collection(db,"products"));
products = prodSnap.docs.map(d=>({...d.data(), id:d.id}));

const catSnap = await getDocs(collection(db,"shops"));
catSnap.forEach(d=>{
DOM.category.innerHTML += `<option>${d.data().category}</option>`;
DOM.editCategory.innerHTML += `<option>${d.data().category}</option>`;
});

const shopSnap = await getDocs(collection(db,"localshop-details"));
shopSnap.forEach(d=>{
DOM.shop.innerHTML += `<option>${d.data().shopName}</option>`;
DOM.editShop.innerHTML += `<option>${d.data().shopName}</option>`;
});

}

load();

// 📤 UPLOAD
async function uploadImages(files){

let urls = [];

for(let file of files){

try{
const fd = new FormData();
fd.append("file", file);
fd.append("upload_preset", UPLOAD_PRESET);

const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:fd
});

const data = await res.json();
if(data.secure_url) urls.push(data.secure_url);

}catch(err){
console.log(err);
}
}

return urls;
}

// ➕ ADD
DOM.saveBtn.onclick = async ()=>{

if(!DOM.name.value || !DOM.price.value){
alert("Enter name & price");
return;
}

DOM.saveBtn.disabled = true;
DOM.saveBtn.innerText = "Saving...";

try{

let images = [];

if(DOM.image.files.length){
images = await uploadImages(DOM.image.files);
}

await addDoc(collection(db,"products"),{
name: DOM.name.value,
price: Number(DOM.price.value),
category: DOM.category.value,
shopName: DOM.shop.value,
images
});

alert("✅ Added");

DOM.name.value="";
DOM.price.value="";
DOM.image.value="";

}catch(err){
alert("Error: "+err.message);
}

DOM.saveBtn.disabled = false;
DOM.saveBtn.innerText = "Save Product";
};

// 🔍 SEARCH
DOM.searchBtn.onclick = ()=>{

let text = DOM.search.value.toLowerCase();
DOM.results.innerHTML="";

products
.filter(p=>p.name.toLowerCase().includes(text))
.forEach(p=>{
DOM.results.innerHTML += `
<div class="result">
<b>${p.name}</b> - ₹${p.price}
<div class="actions">
<button onclick="edit('${p.id}')">Edit</button>
<button onclick="remove('${p.id}')">Delete</button>
</div>
</div>
`;
});
};

// ✏️ EDIT LOAD
window.edit = (id)=>{

let p = products.find(x=>x.id===id);
if(!p) return;

currentId = id;
DOM.editForm.style.display="block";

DOM.editName.value = p.name;
DOM.editPrice.value = p.price;
DOM.editCategory.value = p.category;
DOM.editShop.value = p.shopName;

DOM.preview.innerHTML = p.images?.[0] ? `<img src="${p.images[0]}">` : "";
};

// 🔄 UPDATE
DOM.updateBtn.onclick = async ()=>{

if(!currentId){
alert("Select product first");
return;
}

DOM.updateBtn.disabled = true;
DOM.updateBtn.innerText = "Updating...";

try{

let updateData = {
name: DOM.editName.value,
price: Number(DOM.editPrice.value),
category: DOM.editCategory.value,
shopName: DOM.editShop.value
};

if(DOM.editImage.files.length){
updateData.images = await uploadImages(DOM.editImage.files);
}

await updateDoc(doc(db,"products",currentId), updateData);

alert("✅ Updated");

DOM.editForm.style.display="none";
currentId=null;

}catch(err){
alert("Error: "+err.message);
}

DOM.updateBtn.disabled = false;
DOM.updateBtn.innerText = "Update Product";
};

// ❌ DELETE
window.remove = async (id)=>{
await deleteDoc(doc(db,"products",id));
alert("Deleted");
location.reload();
};

</script>

</body>
</html>
