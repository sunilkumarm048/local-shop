<!DOCTYPE html>

<html>
<head>
<title>Manage Products</title>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection, addDoc, getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let editId = null;

// 🚀 LOAD PRODUCTS
async function loadProducts(){

  const snap = await getDocs(collection(db,"products"));
  const container = document.getElementById("list");

  container.innerHTML = "";

  snap.forEach(d=>{
    const p = d.data();

    container.innerHTML += `
      <div class="item">
        <img src="${p.images?.[0] || ''}">
        <div>
          <b>${p.name}</b><br>
          ₹${p.price}<br>
          ${p.category}
        </div>
        <div>
          <button onclick="editProduct('${d.id}')">Edit</button>
          <button onclick="deleteProduct('${d.id}')">Delete</button>
        </div>
      </div>
    `;
  });

}

loadProducts();

// 🚀 ADD / UPDATE
window.saveProduct = async function(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;
  const shopName = document.getElementById("shop").value;
  const files = document.getElementById("image").files;

  if(!name || !price || !category || !shopName){
    alert("Fill all fields");
    return;
  }

  let imageUrls = [];

  // 📸 Upload multiple images
  for(let file of files){

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "shop_upload");

    const res = await fetch("https://api.cloudinary.com/v1_1/dqcafnvpi/image/upload", {
      method:"POST",
      body: formData
    });

    const data = await res.json();
    imageUrls.push(data.secure_url);
  }

  if(editId){

    // ✏️ UPDATE
    await updateDoc(doc(db,"products",editId),{
      name,
      price:Number(price),
      category,
      shopName,
      ...(imageUrls.length && {images:imageUrls})
    });

    editId = null;

  }else{

    // ➕ ADD
    await addDoc(collection(db,"products"),{
      name,
      price:Number(price),
      category,
      shopName,
      images:imageUrls,
      createdAt:new Date()
    });

  }

  alert("Saved!");

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("image").value="";

  loadProducts();
};

// ✏️ EDIT
window.editProduct = async function(id){

  editId = id;

  const snap = await getDocs(collection(db,"products"));
  const product = snap.docs.find(d=>d.id===id).data();

  document.getElementById("name").value = product.name;
  document.getElementById("price").value = product.price;
  document.getElementById("category").value = product.category;
  document.getElementById("shop").value = product.shopName;

};

// 🗑 DELETE
window.deleteProduct = async function(id){

  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    loadProducts();
  }

};

</script>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}

.container{
max-width:450px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:8px 12px;
margin:5px;
background:#ff5a5f;
color:white;
border:none;
border-radius:6px;
}

.item{
display:flex;
gap:10px;
align-items:center;
background:#fff;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.item img{
width:60px;height:60px;object-fit:cover;
}
</style>

</head>

<body>

<div class="container">

<h2>Manage Products</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<select id="category">
<option>Tea Shop</option>
<option>Grocery Shop</option>
</select>

<select id="shop">
<option>Sunil Kumar</option>
<option>Pintu Verity store</option>
</select>

<input type="file" id="image" multiple>

<button onclick="saveProduct()">Save Product</button>

<div id="list"></div>

</div>

</body>
</html>
