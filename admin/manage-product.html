<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Products · Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter',Arial,sans-serif;background:#f4f4f4;color:#1f1f1f;overflow-x:hidden;}
body{padding-bottom:30px;}
button{font-family:inherit;cursor:pointer;border:none;}
img{display:block;max-width:100%;}

.header{
  background:linear-gradient(180deg,#1f1f1f 0%,#3a3a3a 100%);
  padding:14px 16px;position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 4px rgba(0,0,0,.15);color:#fff;
}
.topBar{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto;}
.backBtn{
  background:rgba(255,255,255,.1);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;color:#fff;
  border:1px solid rgba(255,255,255,.15);
}
.backBtn:active{transform:scale(.94);}
.titleBlock{flex:1;line-height:1.2;}
.pageTitle{font-size:18px;font-weight:800;color:#fff;}
.pageSub{font-size:12px;color:#bbb;margin-top:2px;}

.searchWrap{margin:12px auto 0;max-width:1200px;position:relative;}
.searchWrap input{
  width:100%;padding:11px 14px 11px 38px;
  border-radius:10px;border:1px solid rgba(255,255,255,.15);
  font-size:13px;background:rgba(255,255,255,.08);color:#fff;
  font-family:inherit;outline:none;
}
.searchWrap input::placeholder{color:rgba(255,255,255,.5);}
.searchWrap input:focus{background:rgba(255,255,255,.15);border-color:#F0B91D;}
.searchIcon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:#bbb;}

.shopFilterWrap{
  margin:10px auto 0;max-width:1200px;
  display:flex;gap:8px;align-items:center;
  overflow-x:auto;padding:0 0 4px;scrollbar-width:none;
}
.shopFilterWrap::-webkit-scrollbar{display:none;}
.shopChip{
  padding:7px 12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);border-radius:18px;
  font-size:11px;font-weight:600;color:#bbb;
  white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
  transition:all .15s;
}
.shopChip.active{background:#F0B91D;color:#1f1f1f;border-color:#F0B91D;}
.shopChip .ic{font-size:12px;}

.container{max-width:1200px;margin:0 auto;padding:14px 12px 0;}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.summaryCard{
  background:#fff;border-radius:12px;padding:12px 8px;text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.summaryValue{font-size:18px;font-weight:800;color:#1f1f1f;line-height:1.1;}
.summaryLabel{font-size:10px;color:#666;font-weight:600;margin-top:4px;letter-spacing:.2px;text-transform:uppercase;}

.products{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media(min-width:520px){.products{grid-template-columns:repeat(3,1fr);gap:12px;}}
@media(min-width:768px){.products{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1024px){.products{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1280px){.products{grid-template-columns:repeat(6,1fr);}}

.card{
  background:#fff;border:1px solid #ececec;
  border-radius:12px;padding:8px;
  display:flex;flex-direction:column;
  position:relative;transition:all .15s;
}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);}

.imgWrap{
  width:100%;aspect-ratio:1/1;
  background:#f5f5f5;border-radius:8px;
  overflow:hidden;margin-bottom:8px;position:relative;
}
.imgWrap img{width:100%;height:100%;object-fit:cover;}

.discountBadge{
  position:absolute;top:0;left:6px;
  background:#0C831F;color:#fff;
  font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:0 0 4px 4px;
}

.shopBadge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;color:#1857c1;background:#dbe9ff;
  padding:2px 6px;border-radius:4px;
  font-weight:700;margin-bottom:5px;width:fit-content;
  max-width:100%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.cardName{
  font-size:13px;font-weight:600;
  color:#1f1f1f;line-height:1.25;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  min-height:32px;
}
.cardWeight{font-size:11px;color:#888;margin-bottom:6px;}

.priceRow{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:6px;gap:6px;
}
.price{font-size:14px;font-weight:700;color:#1f1f1f;}
.mrp{font-size:11px;color:#888;text-decoration:line-through;margin-left:3px;}

.cardActions{
  display:flex;gap:6px;margin-top:auto;
}
.actionBtn{
  flex:1;padding:7px 8px;border-radius:7px;
  font-size:11px;font-weight:700;letter-spacing:.2px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .12s;
}
.actionBtn:active{transform:scale(.96);}
.btn-delete{background:#fff;color:#d23030;border:1px solid #ffd2d2;}
.btn-delete:hover{background:#fff5f5;}

.empty{
  text-align:center;padding:60px 20px;
  background:#fff;border-radius:14px;margin-top:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  grid-column:1/-1;
}
.empty .icon{font-size:64px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:#1f1f1f;margin-bottom:6px;}
.empty p{font-size:13px;color:#777;line-height:1.5;}

.skel{
  background:#fff;border:1px solid #ececec;
  border-radius:12px;padding:8px;
}
.skel .skelImg{
  width:100%;aspect-ratio:1/1;border-radius:8px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  margin-bottom:8px;
}
.skel .skelLine{
  height:12px;
  background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:6px;margin-bottom:6px;
}
.skel .skelLine.short{width:60%;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1f1f1f;color:#fff;padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;
  transition:all .25s;z-index:1500;max-width:90%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.modalBg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;justify-content:center;z-index:2000;
}
.modalBg.show{display:flex;}
.modal{
  background:#fff;width:100%;max-width:500px;
  border-radius:20px 20px 0 0;
  padding:24px 20px 28px;text-align:center;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal .icon{font-size:48px;margin-bottom:8px;}
.modal h3{font-size:17px;font-weight:800;color:#1f1f1f;margin-bottom:6px;}
.modal p{font-size:13px;color:#666;line-height:1.4;margin-bottom:18px;}
.modalActions{display:flex;gap:10px;}
.btnPrimary{flex:1;background:#0C831F;color:#fff;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}
.btnSecondary{flex:1;background:#fff;color:#666;border:1.5px solid #e0e0e0;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}
.btnDanger{flex:1;background:#d23030;color:#fff;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}
@media(min-width:600px){
  .modalBg{align-items:center;padding:20px;}
  .modal{border-radius:16px;max-width:380px;}
}

@media(min-width:768px){
  .header{padding:16px 24px;}
  .pageTitle{font-size:20px;}
  .container{padding:18px 20px 0;}
}
</style>
</head>

<body>

<header class="header">
  <div class="topBar">
    <button class="backBtn" onclick="goBack()" aria-label="Back">←</button>
    <div class="titleBlock">
      <div class="pageTitle">🛍️ Manage Products</div>
      <div class="pageSub" id="headerSub">Loading…</div>
    </div>
  </div>

  <div class="searchWrap">
    <span class="searchIcon">🔍</span>
    <input id="search" placeholder="Search by product or shop name…" oninput="onSearch()">
  </div>

  <div class="shopFilterWrap" id="shopFilters">
    <div class="shopChip active" data-shop="all"><span class="ic">🏪</span>All shops</div>
  </div>
</header>

<main class="container">

  <div class="summary">
    <div class="summaryCard">
      <div class="summaryValue" id="sumProducts">—</div>
      <div class="summaryLabel">Products</div>
    </div>
    <div class="summaryCard">
      <div class="summaryValue" id="sumShops">—</div>
      <div class="summaryLabel">Shops</div>
    </div>
    <div class="summaryCard">
      <div class="summaryValue" id="sumDiscounted">—</div>
      <div class="summaryLabel">On Discount</div>
    </div>
  </div>

  <div id="products" class="products">
    <div class="skel"><div class="skelImg"></div><div class="skelLine"></div><div class="skelLine short"></div></div>
    <div class="skel"><div class="skelImg"></div><div class="skelLine"></div><div class="skelLine short"></div></div>
    <div class="skel"><div class="skelImg"></div><div class="skelLine"></div><div class="skelLine short"></div></div>
    <div class="skel"><div class="skelImg"></div><div class="skelLine"></div><div class="skelLine short"></div></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<div class="modalBg" id="confirmModal">
  <div class="modal">
    <div class="icon" id="modalIcon">❓</div>
    <h3 id="modalTitle">Are you sure?</h3>
    <p id="modalMsg">This action cannot be undone.</p>
    <div class="modalActions">
      <button class="btnSecondary" onclick="closeModal()">Cancel</button>
      <button class="btnDanger" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "../js/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  collection, onSnapshot, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ADMIN_EMAILS = ["sunilkumarm048@gmail.com"];

const productsDiv = document.getElementById("products");
const headerSub = document.getElementById("headerSub");
const toast = document.getElementById("toast");

let allProducts = [];
let shopList = [];   // unique shop names
let currentShop = "all";
let searchTerm = "";

function showToast(msg, isError=false){
  toast.textContent = msg;
  toast.style.background = isError ? "#d23030" : "#1f1f1f";
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 2400);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function escapeAttr(str){
  return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

let confirmCb = null;
function openModal({icon="❓", title, msg, confirmText="Confirm", danger=true, onConfirm}){
  document.getElementById("modalIcon").textContent  = icon;
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMsg").textContent   = msg;
  const btn = document.getElementById("modalConfirmBtn");
  btn.textContent = confirmText;
  btn.className = danger ? "btnDanger" : "btnPrimary";
  confirmCb = onConfirm;
  document.getElementById("confirmModal").classList.add("show");
}
window.closeModal = ()=>{
  document.getElementById("confirmModal").classList.remove("show");
  confirmCb = null;
};
document.getElementById("modalConfirmBtn").addEventListener("click", ()=>{
  if(confirmCb) confirmCb();
  closeModal();
});
document.getElementById("confirmModal").addEventListener("click",(e)=>{
  if(e.target.id === "confirmModal") closeModal();
});

window.onSearch = ()=>{
  searchTerm = document.getElementById("search").value.toLowerCase().trim();
  render();
};

window.goBack = ()=> location.href = "dashboard.html";

onAuthStateChanged(auth, (user)=>{
  if(!user || !ADMIN_EMAILS.includes(user.email)){
    showToast("Admin access required", true);
    setTimeout(()=> location.href = "/local-shop/index.html", 1000);
    return;
  }
  listenProducts();
});

function listenProducts(){
  onSnapshot(collection(db, "products"), (snap)=>{
    allProducts = [];
    const shopSet = new Map();
    snap.forEach(d=>{
      const p = { ...d.data(), __id: d.id };
      allProducts.push(p);
      if(p.shopName){
        shopSet.set(p.shopName, (shopSet.get(p.shopName) || 0) + 1);
      }
    });
    shopList = Array.from(shopSet.entries())
      .sort((a,b)=> b[1] - a[1])
      .map(([name, count])=>({ name, count }));
    renderShopFilters();
    updateSummary();
    render();
  }, (err)=>{
    console.error(err);
    showToast("Could not load products", true);
  });
}

function renderShopFilters(){
  const filterWrap = document.getElementById("shopFilters");
  let html = `<div class="shopChip ${currentShop==='all'?'active':''}" data-shop="all"><span class="ic">🏪</span>All shops (${allProducts.length})</div>`;
  shopList.forEach(s=>{
    const active = currentShop === s.name ? "active" : "";
    html += `<div class="shopChip ${active}" data-shop="${escapeAttr(s.name)}">${escapeHtml(s.name)} (${s.count})</div>`;
  });
  filterWrap.innerHTML = html;

  filterWrap.querySelectorAll(".shopChip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      filterWrap.querySelectorAll(".shopChip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      currentShop = chip.dataset.shop;
      render();
    });
  });
}

function updateSummary(){
  let discounted = 0;
  allProducts.forEach(p=>{
    if(p.mrp && Number(p.mrp) > Number(p.price)) discounted++;
  });
  document.getElementById("sumProducts").textContent = allProducts.length;
  document.getElementById("sumShops").textContent    = shopList.length;
  document.getElementById("sumDiscounted").textContent = discounted;

  headerSub.textContent = allProducts.length === 0
    ? "No products yet"
    : `${allProducts.length} product${allProducts.length!==1?"s":""} across ${shopList.length} shop${shopList.length!==1?"s":""}`;
}

function render(){
  let visible = allProducts.slice();

  if(currentShop !== "all"){
    visible = visible.filter(p => p.shopName === currentShop);
  }
  if(searchTerm){
    visible = visible.filter(p=>{
      return (p.name||"").toLowerCase().includes(searchTerm)
          || (p.shopName||"").toLowerCase().includes(searchTerm)
          || (p.category||"").toLowerCase().includes(searchTerm);
    });
  }

  /* Sort alphabetically */
  visible.sort((a,b)=> (a.name||"").localeCompare(b.name||""));

  if(visible.length === 0){
    let icon="🛍️", title="No products found", msg="No products match your filters.";
    if(searchTerm){ icon="🔍"; title="No matches"; msg="Try a different search term."; }
    productsDiv.innerHTML = `<div class="empty"><div class="icon">${icon}</div><h3>${title}</h3><p>${msg}</p></div>`;
    return;
  }

  let html = "";
  visible.forEach(p=>{
    const id = p.__id;
    const img = p.images?.[0] || p.image || "https://via.placeholder.com/300x300/f0f0f0/999?text=No+Image";
    const name = p.name || "Product";
    const price = Number(p.price) || 0;
    const mrp = p.mrp ? Number(p.mrp) : null;
    const weight = p.weight || p.qty || p.unit || "";
    const shopName = p.shopName || "Unknown Shop";

    let discount = "";
    if(mrp && mrp > price){
      const off = Math.round(((mrp - price) / mrp) * 100);
      discount = `<div class="discountBadge">${off}% OFF</div>`;
    }

    html += `
      <div class="card">
        <div class="imgWrap">
          ${discount}
          <img src="${escapeAttr(img)}" alt="${escapeAttr(name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300/f0f0f0/999?text=No+Image'">
        </div>
        <div class="shopBadge">🏪 ${escapeHtml(shopName)}</div>
        <div class="cardName">${escapeHtml(name)}</div>
        ${weight ? `<div class="cardWeight">${escapeHtml(weight)}</div>` : `<div class="cardWeight">1 unit</div>`}
        <div class="priceRow">
          <div>
            <span class="price">₹${price}</span>
            ${mrp && mrp > price ? `<span class="mrp">₹${mrp}</span>` : ""}
          </div>
        </div>
        <div class="cardActions">
          <button class="actionBtn btn-delete" onclick="deleteProduct('${id}','${escapeAttr(name)}')">🗑 Delete</button>
        </div>
      </div>`;
  });
  productsDiv.innerHTML = html;
}

window.deleteProduct = (id, name)=>{
  openModal({
    icon:"⚠️",
    title:`Delete "${name}"?`,
    msg:"This will permanently remove the product from the catalog. Existing orders containing this product will not be affected. This cannot be undone.",
    confirmText:"Yes, Delete",
    danger:true,
    onConfirm: async ()=>{
      try{
        await deleteDoc(doc(db, "products", id));
        showToast("Product deleted");
      }catch(e){
        console.error(e);
        showToast("Could not delete", true);
      }
    }
  });
};
</script>

</body>
</html>
