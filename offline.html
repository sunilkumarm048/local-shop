<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline · LocalShop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',Arial,sans-serif;
  background:linear-gradient(135deg,#F8CD46 0%,#F0B91D 100%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;color:#1f1f1f;
}
.card{
  background:#fff;border-radius:20px;
  padding:40px 28px;text-align:center;
  max-width:400px;width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}
.icon{
  font-size:80px;margin-bottom:16px;
  animation:bob 2s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;}
p{font-size:14px;color:#666;line-height:1.5;margin-bottom:24px;}
.btn{
  background:#0C831F;color:#fff;border:none;
  padding:14px 32px;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  width:100%;transition:all .15s;
  font-family:inherit;
}
.btn:hover{background:#0a6e1a;}
.btn:active{transform:scale(.98);}
.tip{
  margin-top:20px;padding:12px;
  background:#dcf3e1;border-radius:10px;
  font-size:12px;color:#0C831F;font-weight:600;
}
.brand{
  font-size:22px;font-weight:800;
  letter-spacing:-.5px;margin-bottom:6px;
}
.brand span{color:#0C831F;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div class="brand">Local<span>Shop</span></div>
    <h1>You're offline</h1>
    <p>Looks like you've lost your internet connection. Don't worry — your previously viewed pages are still saved!</p>
    <button class="btn" onclick="location.reload()">🔄 Try Again</button>
    <button class="btn" style="background:#fff;color:#0C831F;border:2px solid #0C831F;margin-top:10px;" onclick="location.href='/'">🏠 Go to Home</button>
    <div class="tip">
      💡 Tip: Once you're back online, your cart and orders will sync automatically.
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener("online", () => {
      location.reload();
    });
  </script>
</body>
</html>
