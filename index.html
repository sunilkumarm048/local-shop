<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let filteredProducts = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// 🚀 INIT
async function init(){
await loadCategories();
await loadProducts();
}
init();

// 🔥 LOAD CATEGORIES WITH ICON + NAME
async function loadCategories(){

const container = document.getElementById("categories");

const snap = await getDocs(collection(db,"shops"));

let categoriesMap = {};

// 🧠 collect unique category + icon + name
snap.forEach(doc=>{
let data = doc.data();

if(data.category){

categoriesMap[data.category] = {
icon: data.icon || "🏪",
name: data.name || data.category
};

}

});

container.innerHTML = "";

// ✅ ALL BUTTON
container.innerHTML += `
<div class="cat" onclick="filterCategory('All')">
All
</div>
`;

// ✅ DYNAMIC CATEGORY BUTTONS
Object.keys(categoriesMap).forEach(cat=>{

let c = categoriesMap[cat];

container.innerHTML += `
<div class="cat" onclick="filterCategory('${cat}')">
${c.icon} ${c.name}
</div>
`;

});

}
