<!DOCTYPE html>

<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ffcc00;
padding:10px;
position:sticky;
top:0;
z-index:1000;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
}

.location{
font-size:14px;
font-weight:bold;
}

/* CART */
.cartTop{
background:black;
color:white;
padding:6px 10px;
border-radius:15px;
font-size:13px;
cursor:pointer;
}

/* SEARCH */
.search{
margin-top:8px;
}

.search input{
width:100%;
padding:8px;
border-radius:8px;
border:none;
font-size:14px;
}

/* SECTION */
.section{
padding:10px;
}

h3{
margin:8px 0;
font-size:16px;
}

/* PRODUCTS → 3 PER ROW */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.card{
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.imgSlider{
height:100px;
display:flex;
overflow-x:auto;
}

.imgSlider img{
min-width:100%;
height:100px;
object-fit:contain;
}

/* TEXT */
.card h4{
font-size:15px;
font-weight:600;
margin:6px 0;
}

.price{
font-size:14px;
color:green;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:6px;
font-size:13px;
border-radius:6px;
background:#ff5a5f;
color:white;
border:none;
}

/* SHOPS */
.shops{
display:flex;
overflow-x:auto;
gap:8px;
}

.shop{
padding:6px 10px;
background:white;
border-radius:15px;
font-size:13px;
white-space:nowrap;
}

/* BOTTOM CATEGORY */
.bottomCat{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:8px;
display:flex;
overflow-x:auto;
gap:8px;
border-top:1px solid #ddd;
}

.cat{
padding:6px 12px;
background:#eee;
border-radius:15px;
font-size:13px;
white-space:nowrap;
cursor:pointer;
}

.cat.active{
background:#ff5a5f;
color:white;
}

/* HIDE SCROLL */
.bottomCat::-webkit-scrollbar,
.shops::-webkit-scrollbar{
display:none;
}
</style>

</head>

<body>

<div class="header">

<div class="topBar">
<div class="location" id="location">📍 Getting location...</div>

<div class="cartTop" onclick="openCart()">
🛒 ₹<span id="total">0</span>
</div>
</div>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>

</div>

<div class="section">
<h3>Shops</h3>
<div id="shops" class="shops"></div>
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<!-- CATEGORY BOTTOM -->
<div id="categories" class="bottomCat"></div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let allCategories = [];
let allShops = [];

let selectedCategory = null;
let selectedShop = null;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(async (pos)=>{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
let data = await res.json();
let area = data.address.city || data.address.state;
document.getElementById("location").innerText = "📍 " + area;
});
}
getLocation();

/* LOAD */
async function loadData(){
allProducts = (await getDocs(collection(db,"products"))).docs.map(d=>d.data());
allCategories = (await getDocs(collection(db,"shops"))).docs.map(d=>d.data());
allShops = (await getDocs(collection(db,"localshop-details"))).docs.map(d=>d.data());

renderCategories();
renderShops();
renderProducts();
}
loadData();

/* CATEGORY */
function renderCategories(){
const c = document.getElementById("categories");
c.innerHTML = "";

c.innerHTML += `<div class="cat ${!selectedCategory?'active':''}" onclick="selectCategory(null)">All</div>`;

allCategories.forEach(x=>{
c.innerHTML += `<div class="cat ${selectedCategory===x.category?'active':''}" onclick="selectCategory('${x.category}')">${x.category}</div>`;
});
}

window.selectCategory = (cat)=>{
selectedCategory = cat;
selectedShop = null;
renderCategories();
renderShops();
renderProducts();
};

/* SHOPS */
function renderShops(){
let c = document.getElementById("shops");
c.innerHTML = "";

let f = selectedCategory ? allShops.filter(s=>s.category===selectedCategory) : allShops;

f.forEach(s=>{
c.innerHTML += `<div class="shop" onclick="selectShop('${s.shopName}')">${s.shopName}</div>`;
});
}

window.selectShop = (s)=>{
selectedShop = s;
renderProducts();
};

/* PRODUCTS */
function renderProducts(){
let c = document.getElementById("products");
c.innerHTML = "";

let f = allProducts;

if(selectedCategory) f = f.filter(p=>p.category===selectedCategory);
if(selectedShop) f = f.filter(p=>p.shopName===selectedShop);

f.forEach(p=>{
let imgs = p.images?.map(i=>`<img src="${i}">`).join("") || `<img src="https://via.placeholder.com/150">`;

c.innerHTML += `
<div class="card">
<div class="imgSlider">${imgs}</div>
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}

/* SEARCH */
window.searchProducts = ()=>{
let t = document.getElementById("search").value.toLowerCase();
let f = allProducts.filter(p=>p.name.toLowerCase().includes(t));
document.getElementById("products").innerHTML = "";
f.forEach(p=>{
document.getElementById("products").innerHTML += `<div class="card"><h4>${p.name}</h4></div>`;
});
};

/* CART */
window.addToCart = (n,p)=>{
let f = cart.find(c=>c.name===n);
f ? f.qty++ : cart.push({name:n,price:p,qty:1});
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
};

function updateCart(){
let t=0; cart.forEach(c=>t+=c.price*c.qty);
document.getElementById("total").innerText=t;
}
updateCart();

window.openCart = ()=> location.href="customer/cart.html";

</script>

</body>
</html>
