<!DOCTYPE html>
<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-size:14px;font-weight:bold;}

.search{margin-top:10px;}
.search input{width:100%;padding:10px;border-radius:8px;border:none;}

.categories{display:flex;overflow-x:auto;gap:12px;padding:15px;}
.cat{min-width:80px;background:white;padding:10px;border-radius:10px;text-align:center;cursor:pointer;}

.section{padding:10px;}
.products{display:flex;overflow-x:auto;gap:15px;}

.card{min-width:160px;background:white;border-radius:12px;padding:10px;}
.card img{width:100%;height:100px;object-fit:cover;border-radius:8px;}

.price{color:green;font-weight:bold;}

button{background:#ff5a5f;color:white;border:none;padding:6px 10px;border-radius:6px;}

.cartBtn{
position:fixed;bottom:15px;left:10px;right:10px;
background:black;color:white;padding:15px;text-align:center;
border-radius:12px;font-weight:bold;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="location">📍 Deliver to Brahmapur</div>

<div class="search">
<input id="search" placeholder="Search for products..." oninput="searchProducts()">
</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="cat" onclick="filterCategory('All')">All</div>
<div class="cat" onclick="filterCategory('Bakery')">🍞 Bakery</div>
<div class="cat" onclick="filterCategory('Tea Shop')">☕ Tea</div>
<div class="cat" onclick="filterCategory('Fast Food')">🍔 Fast Food</div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<!-- CART -->
<div class="cartBtn" onclick="openCart()">
🛒 View Cart (₹<span id="total">0</span>)
</div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let filteredProducts = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// SAVE SHOP
localStorage.setItem("shop","Local Shop");

async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

allProducts = snapshot.docs.map(doc => doc.data());

filteredProducts = allProducts;

renderProducts();
updateCart();

}

loadProducts();

function renderProducts(){

const container = document.getElementById("products");
container.innerHTML = "";

filteredProducts.forEach(p=>{

container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/200x150/?food">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;

});

}

window.searchProducts = function(){

const text = document.getElementById("search").value.toLowerCase();

filteredProducts = allProducts.filter(p =>
p.name.toLowerCase().includes(text)
);

renderProducts();

}

window.filterCategory = function(cat){

if(cat === "All"){
filteredProducts = allProducts;
}else{
filteredProducts = allProducts.filter(p => p.category === cat);
}

renderProducts();

}

window.addToCart = function(name,price){

let found = cart.find(c=>c.name === name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

saveCart();

}

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
}

function updateCart(){

total = 0;

cart.forEach(c=>{
total += c.price * c.qty;
});

document.getElementById("total").innerText = total;

}

// ✅ FIXED HERE
window.openCart = function(){
window.location.href = "customer/cart.html";
}

</script>

</body>
</html>
