<!DOCTYPE html>
<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-weight:bold;}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

.row{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
}

.item{
min-width:120px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.products{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px;
}

.card{
min-width:160px;
background:white;
border-radius:12px;
padding:10px;
}

.price{color:green;font-weight:bold;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="location" id="locationText">📍 Getting location...</div>
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>

<!-- CATEGORIES -->
<h3 style="padding-left:10px;">Categories</h3>
<div id="categories" class="row"></div>

<!-- SHOPS -->
<h3 style="padding-left:10px;">Shops</h3>
<div id="shops" class="row"></div>

<!-- PRODUCTS -->
<h3 style="padding-left:10px;">Products</h3>
<div id="products" class="products"></div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allShops = [];
let allProducts = [];
let selectedCategory = null;
let selectedShop = null;
let userLat = null;
let userLng = null;


// 🚀 INIT
async function init(){

const shopSnap = await getDocs(collection(db,"shops"));
allShops = shopSnap.docs.map(d=>d.data());

const productSnap = await getDocs(collection(db,"products"));
allProducts = productSnap.docs.map(d=>d.data());

loadCategories();
startLiveLocation();

}

init();


// 🌍 GET ADDRESS NAME
async function getAddress(lat, lng){

try{

let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
);

let data = await res.json();

if(data.address){
return (
data.address.city ||
data.address.town ||
data.address.village ||
data.address.state ||
"Your Area"
);
}

return "Your Location";

}catch(e){
return "Location error";
}

}


// 📍 LIVE LOCATION TRACKING
function startLiveLocation(){

navigator.geolocation.watchPosition(async pos=>{

userLat = pos.coords.latitude;
userLng = pos.coords.longitude;

// 🔥 GET NAME
let place = await getAddress(userLat, userLng);

// 🎯 UPDATE UI
document.getElementById("locationText").innerText =
"📍 Deliver to " + place;

// 🔄 reload shops
if(selectedCategory){
selectCategory(selectedCategory);
}

}, err=>{
document.getElementById("locationText").innerText =
"📍 Location permission denied";
},{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});

}


// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R*c;

}


// 🔥 LOAD CATEGORIES
function loadCategories(){

let container = document.getElementById("categories");

let unique = {};

allShops.forEach(s=>{
unique[s.category] = s.icon || "🏪";
});

container.innerHTML = "";

Object.keys(unique).forEach(cat=>{
container.innerHTML += `
<div class="item" onclick="selectCategory('${cat}')">
${unique[cat]} ${cat}
</div>
`;
});

}


// 🏪 SELECT CATEGORY → SHOW NEAR SHOPS
window.selectCategory = function(cat){

selectedCategory = cat;
selectedShop = null;

let container = document.getElementById("shops");

if(!userLat){
container.innerHTML = "📍 Getting location...";
return;
}

let shops = allShops
.filter(s => s.category === cat)
.map(s=>({
...s,
distance: getDistance(userLat,userLng,s.lat,s.lng)
}))
.filter(s => s.distance <= 5)
.sort((a,b)=>a.distance-b.distance);

container.innerHTML = "";

if(shops.length === 0){
container.innerHTML = "❌ No nearby shops";
return;
}

shops.forEach(s=>{
container.innerHTML += `
<div class="item" onclick="selectShop('${s.name}')">
${s.icon || "🏪"} ${s.name}<br>
<small>${s.distance.toFixed(2)} km</small>
</div>
`;
});

document.getElementById("products").innerHTML = "";

}


// 🛍️ SELECT SHOP → PRODUCTS
window.selectShop = function(shop){

selectedShop = shop;

let container = document.getElementById("products");
container.innerHTML = "";

let filtered = allProducts.filter(p => p.shopName === shop);

filtered.forEach(p=>{
container.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;
});

}


// 🔍 SEARCH
window.searchProducts = function(){

let text = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p =>
(!selectedShop || p.shopName === selectedShop) &&
p.name.toLowerCase().includes(text)
);

let container = document.getElementById("products");
container.innerHTML = "";

filtered.forEach(p=>{
container.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;
});

}


// 🛒 CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

window.addToCart = function(name,price){

let item = cart.find(c=>c.name === name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

</script>

</body>
</html>
