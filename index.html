<!DOCTYPE html>
<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-size:14px;font-weight:bold;}

.search{margin-top:10px;}
.search input{width:100%;padding:10px;border-radius:8px;border:none;}

.categories, .shops{
display:flex;overflow-x:auto;gap:12px;padding:15px;
}

.cat, .shop{
min-width:120px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.cat.active{
background:#ff5a5f;
color:white;
}

.section{padding:10px;}
.products{display:flex;overflow-x:auto;gap:15px;}

.card{
min-width:170px;
background:white;
border-radius:12px;
padding:10px;
}

.imgSlider{
width:100%;
height:130px;
display:flex;
overflow-x:auto;
gap:5px;
scroll-snap-type:x mandatory;
}

.imgSlider img{
min-width:100%;
height:130px;
object-fit:contain;
background:#fff;
border-radius:8px;
scroll-snap-align:start;
}

.price{color:green;font-weight:bold;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

.cartBtn{
position:fixed;bottom:15px;left:10px;right:10px;
background:black;color:white;padding:15px;text-align:center;
border-radius:12px;font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
<div class="location" id="location">📍 Getting location...</div>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>
</div>

<div class="section">
<h3>Categories</h3>
<div id="categories" class="categories"></div>
</div>

<div class="section">
<h3>Shops</h3>
<div id="shops" class="shops"></div>
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<div class="cartBtn" onclick="openCart()">
🛒 View Cart (₹<span id="total">0</span>)
</div>

<!-- ✅ ONLY THIS SCRIPT -->
<script type="module" src="./js/app.js"></script>

</body>
</html>
