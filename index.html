<!DOCTYPE html>

<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#ffcc00;
padding:10px;
position:sticky;
top:0;
z-index:1000;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
}

.location{
font-size:14px;
font-weight:bold;
}

/* CART BUTTON */
.cartTop{
background:black;
color:white;
padding:6px 12px;
border-radius:20px;
font-size:13px;
cursor:pointer;
}

/* SEARCH */
.search{
margin-top:8px;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
font-size:14px;
}

/* SECTION */
.section{
padding:10px;
}

h3{
margin:10px 0;
}

/* 🔥 BLINKIT STYLE CATEGORY GRID */
.categories{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.cat{
background:#eef3f3;
border-radius:16px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.cat img{
width:100%;
height:70px;
object-fit:contain;
margin-bottom:6px;
}

.cat span{
font-size:12px;
font-weight:600;
color:#333;
display:block;
line-height:1.2;
}

.cat:active{
transform:scale(0.95);
}

/* SHOPS */
.shops{
display:flex;
overflow-x:auto;
gap:10px;
}

.shop{
padding:8px 14px;
background:white;
border-radius:20px;
white-space:nowrap;
font-size:13px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* PRODUCTS (2 per row - readable) */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* IMAGE */
.imgSlider{
width:100%;
height:140px;
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.imgSlider img{
min-width:100%;
height:140px;
object-fit:contain;
scroll-snap-align:start;
}

/* TEXT */
.card h4{
font-size:15px;
margin:6px 0;
}

.price{
font-size:15px;
font-weight:bold;
color:green;
}

/* BUTTON */
button{
width:100%;
padding:8px;
font-size:13px;
border-radius:8px;
font-weight:bold;
background:#ff5a5f;
color:white;
border:none;
}

/* SCROLLBAR HIDE */
.shops::-webkit-scrollbar,
.imgSlider::-webkit-scrollbar{
display:none;
}
</style>

</head>

<body>

<div class="header">

<div class="topBar">
<div class="location" id="location">📍 Getting location...</div>

<div class="cartTop" onclick="openCart()">
🛒 ₹<span id="total">0</span>
</div>
</div>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>

</div>

<div class="section">
<h3>Categories</h3>
<div id="categories" class="categories"></div>
</div>

<div class="section">
<h3>Shops</h3>
<div id="shops" class="shops"></div>
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// STATE
let allProducts = [];
let allCategories = [];
let allShops = [];

let selectedCategory = null;
let selectedShop = null;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOCATION
function getLocation(){

if(!navigator.geolocation){
document.getElementById("location").innerText = "📍 Location not supported";
return;
}

navigator.geolocation.getCurrentPosition(async (pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

try{

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
let data = await res.json();

let area =
data.address.suburb ||
data.address.village ||
data.address.town ||
data.address.city ||
data.address.state;

document.getElementById("location").innerText = "📍 Deliver to " + area;

}catch{
document.getElementById("location").innerText = "📍 Your Area";
}

},()=>{
document.getElementById("location").innerText = "📍 Location permission denied";
});

}

getLocation();

// LOAD DATA
async function loadData(){

const prodSnap = await getDocs(collection(db,"products"));
allProducts = prodSnap.docs.map(d=>d.data());

const catSnap = await getDocs(collection(db,"shops"));
allCategories = catSnap.docs.map(d=>d.data());

const shopSnap = await getDocs(collection(db,"localshop-details"));
allShops = shopSnap.docs.map(d=>d.data());

renderCategories();
renderShops();
renderProducts();
}

loadData();

// CATEGORIES
function renderCategories(){

const container = document.getElementById("categories");
container.innerHTML = "";

// ALL
container.innerHTML += `
<div class="cat ${!selectedCategory?'active':''}" onclick="selectCategory(null)">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png">
<span>All</span>
</div>
`;

allCategories.forEach(c=>{
container.innerHTML += `
<div class="cat ${selectedCategory===c.category?'active':''}" 
onclick="selectCategory('${c.category}')">

<img src="${c.image || 'https://via.placeholder.com/80'}">

<span>${c.category}</span>

</div>
`;
});
}

window.selectCategory = (cat)=>{
selectedCategory = cat;
selectedShop = null;

renderCategories();
renderShops();
renderProducts();
}

// SHOPS
function renderShops(){

const container = document.getElementById("shops");
container.innerHTML = "";

let filtered = allShops;

if(selectedCategory){
filtered = filtered.filter(s=>s.category === selectedCategory);
}

filtered.forEach(s=>{
container.innerHTML += `
<div class="shop" onclick="selectShop('${s.shopName}')">
${s.shopName}
</div>
`;
});
}

window.selectShop = (shop)=>{
selectedShop = shop;
renderProducts();
}

// PRODUCTS
function renderProducts(){

const container = document.getElementById("products");
container.innerHTML = "";

let filtered = allProducts;

if(selectedCategory){
filtered = filtered.filter(p=>p.category === selectedCategory);
}

if(selectedShop){
filtered = filtered.filter(p=>p.shopName === selectedShop);
}

filtered.forEach(p=>{

let imagesHTML = "";

if(p.images && p.images.length){
p.images.forEach(img=>{
imagesHTML += `<img src="${img.replace('/upload/','/upload/f_auto,q_auto,w_300/')}">`;
});
}else{
imagesHTML = `<img src="https://via.placeholder.com/150">`;
}

container.innerHTML += `
<div class="card">

<div class="imgSlider">
${imagesHTML}
</div>

<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>

<button onclick="addToCart('${p.name}',${p.price})">Add</button>

</div>
`;
});
}

// SEARCH
window.searchProducts = function(){

const text = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(text)
);

document.getElementById("products").innerHTML = "";

filtered.forEach(p=>{

let imagesHTML = "";

if(p.images && p.images.length){
p.images.forEach(img=>{
imagesHTML += `<img src="${img.replace('/upload/','/upload/f_auto,q_auto,w_300/')}">`;
});
}else{
imagesHTML = `<img src="https://via.placeholder.com/150">`;
}

document.getElementById("products").innerHTML += `
<div class="card">

<div class="imgSlider">
${imagesHTML}
</div>

<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>

<button onclick="addToCart('${p.name}',${p.price})">Add</button>

</div>
`;
});
}

// CART
window.addToCart = function(name,price){

let found = cart.find(c=>c.name === name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
}

function updateCart(){
let total = 0;
cart.forEach(c=> total += c.price * c.qty);
document.getElementById("total").innerText = total;
}

updateCart();

window.openCart = function(){
window.location.href = "customer/cart.html";
}

</script>

</body>
</html>
