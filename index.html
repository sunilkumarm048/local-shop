<!DOCTYPE html>
<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-size:14px;font-weight:bold;}

.search{margin-top:10px;}
.search input{width:100%;padding:10px;border-radius:8px;border:none;}

.categories, .shops{
display:flex;overflow-x:auto;gap:12px;padding:15px;
}

.cat, .shop{
min-width:120px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.section{padding:10px;}
.products{display:flex;overflow-x:auto;gap:15px;}

.card{
min-width:160px;
background:white;
border-radius:12px;
padding:10px;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.price{color:green;font-weight:bold;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

.cartBtn{
position:fixed;bottom:15px;left:10px;right:10px;
background:black;color:white;padding:15px;text-align:center;
border-radius:12px;font-weight:bold;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="location">📍 Getting location...</div>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>
</div>

<!-- CATEGORIES -->
<div class="section">
<h3>Categories</h3>
<div id="categories" class="categories"></div>
</div>

<!-- SHOPS -->
<div class="section">
<h3>Shops</h3>
<div id="shops" class="shops"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<!-- CART -->
<div class="cartBtn" onclick="openCart()">
🛒 View Cart (₹<span id="total">0</span>)
</div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let allShops = [];
let selectedCategory = null;
let selectedShop = null;

let userLat = null;
let userLng = null;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// 📍 LIVE GPS (HIGH ACCURACY)
function startLiveLocation(){

navigator.geolocation.watchPosition(async (pos)=>{

userLat = pos.coords.latitude;
userLng = pos.coords.longitude;

let place = await getAddress(userLat, userLng);

document.querySelector(".location").innerText = "📍 Deliver to " + place;

// reload shops based on location
renderShops();

}, (err)=>{
console.error(err);
}, {
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
});

}

// 📍 ADDRESS
async function getAddress(lat,lng){

try{
let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
);

let data = await res.json();
let a = data.address;

return (
a.suburb ||
a.neighbourhood ||
a.village ||
a.town ||
a.city ||
a.county ||
a.state ||
"Your Area"
);

}catch(e){
return "Your Area";
}

}

// 📏 DISTANCE
function getDistance(lat1, lon1, lat2, lon2){

if(!lat2 || !lon2) return 999;

const R = 6371;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R*c;
}

// 🔥 LOAD DATA
async function loadData(){

// PRODUCTS
const prodSnap = await getDocs(collection(db,"products"));
allProducts = prodSnap.docs.map(d=>d.data());

// SHOPS
const shopSnap = await getDocs(collection(db,"shops"));
allShops = shopSnap.docs.map(d=>d.data());

renderCategories();
renderShops();
renderProducts();

}

loadData();
startLiveLocation();

// 🎯 CATEGORIES
function renderCategories(){

const container = document.getElementById("categories");

// unique categories
let categories = [...new Set(allShops.map(s=>s.category))];

container.innerHTML = `<div class="cat" onclick="selectCategory('All')">All</div>`;

categories.forEach(c=>{
container.innerHTML += `
<div class="cat" onclick="selectCategory('${c}')">
${c}
</div>`;
});

}

// 🎯 SELECT CATEGORY
window.selectCategory = function(cat){
selectedCategory = cat === "All" ? null : cat;
selectedShop = null;

renderShops();
renderProducts();
}

// 🏪 SHOPS (LOCATION + CATEGORY FILTER)
function renderShops(){

const container = document.getElementById("shops");
container.innerHTML = "";

let filtered = allShops;

// category filter
if(selectedCategory){
filtered = filtered.filter(s => s.category === selectedCategory);
}

// sort by distance
if(userLat && userLng){
filtered = filtered.sort((a,b)=>{
let d1 = getDistance(userLat,userLng,a.lat,a.lng);
let d2 = getDistance(userLat,userLng,b.lat,b.lng);
return d1-d2;
});
}

// show nearest 10
filtered.slice(0,10).forEach(s=>{

container.innerHTML += `
<div class="shop" onclick="selectShop('${s.name}')">
${s.icon || "🏪"}<br>${s.name}
</div>
`;

});

}

// 🎯 SELECT SHOP
window.selectShop = function(name){
selectedShop = name;
renderProducts();
}

// 🛒 PRODUCTS
function renderProducts(){

const container = document.getElementById("products");
container.innerHTML = "";

let filtered = allProducts;

// filter by category
if(selectedCategory){
filtered = filtered.filter(p=>p.category === selectedCategory);
}

// filter by shop
if(selectedShop){
filtered = filtered.filter(p=>p.shopName === selectedShop);
}

filtered.forEach(p=>{

container.innerHTML += `
<div class="card">
<img src="https://source.unsplash.com/200x150/?food">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;

});

}

// 🔍 SEARCH
window.searchProducts = function(){

const text = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(text)
);

document.getElementById("products").innerHTML = "";

filtered.forEach(p=>{
document.getElementById("products").innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;
});

}

// 🛒 CART
window.addToCart = function(name,price){

let found = cart.find(c=>c.name === name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart", JSON.stringify(cart));
updateCart();

}

function updateCart(){

let total = 0;

cart.forEach(c=>{
total += c.price * c.qty;
});

document.getElementById("total").innerText = total;

}

updateCart();

// 🛒 OPEN CART
window.openCart = function(){
window.location.href = "customer/cart.html";
}

</script>

</body>
</html>
