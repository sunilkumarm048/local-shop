<!DOCTYPE html>
<html>

<head>
    <title>Local Shop Order</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        .container {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Local Shop Order</h2>

        <label>Name</label>
        <input id="name" placeholder="Enter name">

        <label>Phone</label>
        <input id="phone" placeholder="Enter phone">

        <label>Product</label>
        <select id="product">
            <option>Puff</option>
            <option>Samosa</option>
            <option>Tea</option>
        </select>

        <label>Quantity</label>
        <input id="qty" type="number" placeholder="Enter quantity">

        <button onclick="placeOrder()">Place Order</button>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiENWyBsHdVCNszjPb_gKT_JqBWxkKPfU",
            authDomain: "local-shop-orders-d48d0.firebaseapp.com",
            projectId: "local-shop-orders-d48d0",
            storageBucket: "local-shop-orders-d48d0.firebasestorage.app",
            messagingSenderId: "750524308284",
            appId: "1:750524308284:web:d2a047c93580635e4e5c39"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.placeOrder = async function () {

            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const product = document.getElementById("product").value;
            const qty = document.getElementById("qty").value;

            if (name == "" || phone == "" || qty == "") {
                alert("Please fill all fields");
                return;
            }

            await addDoc(collection(db, "orders"), {
                name: name,
                phone: phone,
                product: product,
                qty: qty,
                time: new Date()
            });

            alert("Order placed successfully!");

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("qty").value = "";

        }

    </script>

</body>

</html>
