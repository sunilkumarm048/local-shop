<!DOCTYPE html>
<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-weight:bold;}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

.row{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
}

.item{
min-width:110px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.products{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px;
}

.card{
min-width:160px;
background:white;
border-radius:12px;
padding:10px;
}

.price{color:green;font-weight:bold;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}
</style>

</head>

<body>

<div class="header">
<div class="location">📍 Deliver to Brahmapur</div>
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>

<!-- CATEGORIES -->
<h3 style="padding-left:10px;">Categories</h3>
<div id="categories" class="row"></div>

<!-- SHOPS -->
<h3 style="padding-left:10px;">Shops</h3>
<div id="shops" class="row"></div>

<!-- PRODUCTS -->
<h3 style="padding-left:10px;">Products</h3>
<div id="products" class="products"></div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allShops = [];
let allProducts = [];
let selectedCategory = null;
let selectedShop = null;

// 🚀 INIT
async function init(){

const shopSnap = await getDocs(collection(db,"shops"));
allShops = shopSnap.docs.map(d=>d.data());

const productSnap = await getDocs(collection(db,"products"));
allProducts = productSnap.docs.map(d=>d.data());

loadCategories();

}

init();


// 🔥 STEP 1: CATEGORIES
function loadCategories(){

let container = document.getElementById("categories");

let unique = {};

// unique category
allShops.forEach(s=>{
unique[s.category] = s.icon || "🏪";
});

container.innerHTML = "";

Object.keys(unique).forEach(cat=>{

container.innerHTML += `
<div class="item" onclick="selectCategory('${cat}')">
${unique[cat]} ${cat}
</div>
`;

});

}


// 🔥 STEP 2: SHOPS
window.selectCategory = function(cat){

selectedCategory = cat;
selectedShop = null;

let container = document.getElementById("shops");
container.innerHTML = "";

let filteredShops = allShops.filter(s => s.category === cat);

filteredShops.forEach(s=>{

container.innerHTML += `
<div class="item" onclick="selectShop('${s.name}')">
${s.icon || "🏪"} ${s.name}
</div>
`;

});

document.getElementById("products").innerHTML = "";

}


// 🔥 STEP 3: PRODUCTS
window.selectShop = function(shop){

selectedShop = shop;

let container = document.getElementById("products");
container.innerHTML = "";

let filteredProducts = allProducts.filter(p => p.shopName === shop);

filteredProducts.forEach(p=>{

container.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;

});

}


// 🔍 SEARCH (within selected shop)
window.searchProducts = function(){

let text = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p => 
(!selectedShop || p.shopName === selectedShop) &&
p.name.toLowerCase().includes(text)
);

let container = document.getElementById("products");
container.innerHTML = "";

filtered.forEach(p=>{

container.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;

});

}


// 🛒 CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

window.addToCart = function(name,price){

let item = cart.find(c=>c.name === name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

</script>

</body>
</html>
