<!DOCTYPE html>

<html>
<head>

<title>Local Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}

.header{background:#ffcc00;padding:12px;}
.location{font-size:14px;font-weight:bold;}

.search{margin-top:10px;}
.search input{width:100%;padding:10px;border-radius:8px;border:none;}

.categories, .shops{
display:flex;overflow-x:auto;gap:12px;padding:15px;
}

.cat, .shop{
min-width:120px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.section{padding:10px;}
.products{display:flex;overflow-x:auto;gap:15px;}

/* CARD */
.card{
min-width:170px;
background:white;
border-radius:12px;
padding:10px;
}

/* IMAGE SLIDER */
.imgSlider{
width:100%;
height:130px;
display:flex;
overflow-x:auto;
gap:5px;
scroll-snap-type:x mandatory;
}

.imgSlider img{
min-width:100%;
height:130px;
object-fit:contain;
background:#fff;
border-radius:8px;
scroll-snap-align:start;
}

.price{color:green;font-weight:bold;}

button{
background:#ff5a5f;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

.cartBtn{
position:fixed;bottom:15px;left:10px;right:10px;
background:black;color:white;padding:15px;text-align:center;
border-radius:12px;font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
<div class="location">📍 Getting location...</div>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>
</div>

<div class="section">
<h3>Categories</h3>
<div id="categories" class="categories"></div>
</div>

<div class="section">
<h3>Shops</h3>
<div id="shops" class="shops"></div>
</div>

<div class="section">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

<div class="cartBtn" onclick="openCart()">
🛒 View Cart (₹<span id="total">0</span>)
</div>

<script type="module">

import { db } from "/local-shop/js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let selectedCategory = null;
let selectedShop = null;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// LOAD DATA
async function loadData(){
const snap = await getDocs(collection(db,"products"));
allProducts = snap.docs.map(d=>d.data());
renderProducts();
}
loadData();

// PRODUCTS
function renderProducts(){

const container = document.getElementById("products");
container.innerHTML = "";

let filtered = allProducts;

if(selectedCategory){
filtered = filtered.filter(p=>p.category === selectedCategory);
}

if(selectedShop){
filtered = filtered.filter(p=>p.shopName === selectedShop);
}

filtered.forEach(p=>{

// 📸 MULTIPLE IMAGES
let imagesHTML = "";

if(p.images && p.images.length){
p.images.forEach(img=>{
imagesHTML += `
<img src="${img.replace('/upload/','/upload/f_auto,q_auto,w_300/')}">
`;
});
}else{
imagesHTML = `<img src="https://via.placeholder.com/150">`;
}

container.innerHTML += `
<div class="card">

<div class="imgSlider">
${imagesHTML}
</div>

<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>

<button onclick="addToCart('${p.name}',${p.price})">Add</button>

</div>
`;
});
}

// SEARCH
window.searchProducts = function(){
const text = document.getElementById("search").value.toLowerCase();

const filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(text)
);

const container = document.getElementById("products");
container.innerHTML = "";

filtered.forEach(p=>{

let imagesHTML = "";

if(p.images && p.images.length){
p.images.forEach(img=>{
imagesHTML += `
<img src="${img.replace('/upload/','/upload/f_auto,q_auto,w_300/')}">
`;
});
}else{
imagesHTML = `<img src="https://via.placeholder.com/150">`;
}

container.innerHTML += `
<div class="card">

<div class="imgSlider">
${imagesHTML}
</div>

<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>

<button onclick="addToCart('${p.name}',${p.price})">Add</button>

</div>
`;
});
}

// CART
window.addToCart = function(name,price){

let found = cart.find(c=>c.name === name);

if(found){
found.qty++;
}else{
cart.push({name,price,qty:1});
}

localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
}

function updateCart(){
let total = 0;
cart.forEach(c=> total += c.price * c.qty);
document.getElementById("total").innerText = total;
}

updateCart();

window.openCart = function(){
window.location.href = "customer/cart.html";
}

</script>

</body>
</html>
