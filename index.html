<script>

let cart=[]
let total=0

window.addToCart=function(item,price){

let found=cart.find(c=>c.item===item)

if(found){
found.qty++
}else{
cart.push({item,price,qty:1})
}

updateCart()

}

function removeItem(index){
cart.splice(index,1)
updateCart()
}

function updateCart(){

let html=""
total=0

cart.forEach((c,index)=>{

let itemTotal=c.price*c.qty
total+=itemTotal

html+=`
<div class="cartItem">
${c.item} x${c.qty} = ₹${itemTotal}
<button class="removeBtn" onclick="removeItem(${index})">X</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

</script>
