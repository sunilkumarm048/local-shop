<!DOCTYPE html>
<html>
<head>
<title>Local Shop</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff5a5f;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e04848;
}

.form{
margin-top:20px;
text-align:center;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>Local Shop</h1>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>Puff</h3>
<p class="price">₹20</p>
<button onclick="selectProduct('Puff')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<h3>Samosa</h3>
<p class="price">₹15</p>
<button onclick="selectProduct('Samosa')">Order</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<h3>Tea</h3>
<p class="price">₹10</p>
<button onclick="selectProduct('Tea')">Order</button>
</div>

</div>

<div class="form">

<h3>Place Order</h3>

Name:<br>
<input id="name"><br>

Phone:<br>
<input id="phone"><br>

Product:<br>
<input id="product"><br>

Quantity:<br>
<input id="qty" type="number"><br><br>

<button onclick="placeOrder()">Submit Order</button>

</div>

<script>

function selectProduct(p){
document.getElementById("product").value = p;
}

</script>

</body>
</html>
